<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/edit-profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Edit Profile</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="project-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading project...</p>
            </div>
        </div>
    </div>

    <!-- Bid Modal -->
    <div id="bid-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Submit Your Bid</h2>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div id="bid-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>
            
            <form id="bid-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bid Amount ($)</label>
                    <input type="number" id="bid-amount" required min="0" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Proposal</label>
                    <textarea id="bid-proposal" required rows="5" placeholder="Explain your approach, experience, and why you're the best fit for this project..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estimated Timeline</label>
                    <input type="text" id="bid-timeline" required placeholder="e.g., 4-6 weeks" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancel-bid" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button type="submit" id="submit-bid-btn" class="flex-1 px-4 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Submit Bid</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script src="/public/js/governance.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentProject = null;

        if (!projectId) {
            window.location.href = '/projects.html';
        }

        async function loadProject() {
            try {
                const response = await authFetch(`/projects/${projectId}`);
                const data = await response.json();
                currentProject = data.project;
                displayProject(currentProject);
            } catch (error) {
                console.error('Error loading project:', error);
                document.getElementById('project-content').innerHTML = '<div class="text-center py-12 text-red-500">Failed to load project</div>';
            }
        }

        function displayProject(project) {
            const isOwner = project.owner._id === user.id;
            const userHasBid = project.bids?.some(bid => bid.user._id === user.id);

            document.getElementById('project-content').innerHTML = `
                <!-- Main Content -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Project Header -->
                    <div class="bg-white rounded-lg border border-gray-200 p-8">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h1 class="text-3xl font-bold text-gray-900 mb-2">${project.title}</h1>
                                <div class="flex items-center gap-2">
                                    <span class="px-3 py-1 text-sm font-medium rounded-full ${
                                        project.status === 'open' ? 'bg-green-50 text-green-700' :
                                        project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                        project.status === 'completed' ? 'bg-gray-100 text-gray-700' :
                                        'bg-red-50 text-red-700'
                                    }">${project.status.replace('_', ' ')}</span>
                                    <span class="text-sm text-gray-500">Posted ${formatDate(project.createdAt)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Project Details -->
                        <div class="prose max-w-none mb-6">
                            <h3 class="text-lg font-semibold text-gray-900 mb-2">Description</h3>
                            <p class="text-gray-700">${project.description}</p>
                        </div>

                        ${project.requirements && project.requirements.length > 0 ? `
                            <div class="mb-6">
                                <h3 class="text-lg font-semibold text-gray-900 mb-3">Requirements</h3>
                                <ul class="space-y-2">
                                    ${project.requirements.map(req => `<li class="flex items-start gap-2 text-gray-700"><svg class="w-5 h-5 text-green-500 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${req}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${project.skills && project.skills.length > 0 ? `
                            <div class="mb-6">
                                <h3 class="text-lg font-semibold text-gray-900 mb-3">Required Skills</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${project.skills.map(skill => `<span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">${skill}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${!isOwner && project.status === 'open' && !userHasBid ? `
                            <button id="open-bid-modal" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 mt-6">Submit Bid</button>
                        ` : userHasBid ? `
                            <div class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg mt-6">You've already submitted a bid for this project</div>
                        ` : ''}
                    </div>

                    <!-- Bids Section -->
                    ${project.bids && project.bids.length > 0 ? `
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-xl font-bold text-gray-900 mb-6">Bids (${project.bids.length})</h2>
                            <div class="space-y-4">
                                ${project.bids.map(bid => `
                                    <div class="border border-gray-200 rounded-lg p-6 ${bid.status === 'accepted' ? 'bg-green-50 border-green-200' : ''}">
                                        <div class="flex items-start justify-between mb-4">
                                            <div class="flex items-center gap-3">
                                                ${getAvatarHTML(bid.user, 'w-12 h-12')}
                                                <div>
                                                    <div class="flex items-center gap-2">
                                                        <h3 class="font-semibold text-gray-900">${bid.user.firstName} ${bid.user.lastName}</h3>
                                                        ${bid.status === 'accepted' ? '<span class="px-2 py-1 bg-green-500 text-white text-xs rounded">Accepted</span>' : ''}
                                                    </div>
                                                    ${bid.user.company ? `<p class="text-sm text-gray-600">${bid.user.company}</p>` : ''}
                                                    ${bid.user.rating ? `<div class="flex items-center gap-1 text-sm"><span class="text-yellow-500">★</span><span>${bid.user.rating.toFixed(1)}</span></div>` : ''}
                                                </div>
                                            </div>
                                            <div class="text-right">
                                                <p class="text-2xl font-bold text-gray-900">${formatCurrency(bid.amount)}</p>
                                                <p class="text-sm text-gray-500">${bid.timeline}</p>
                                            </div>
                                        </div>
                                        <p class="text-gray-700 mb-4">${bid.proposal}</p>
                                        <div class="flex items-center justify-between text-sm text-gray-500">
                                            <span>Submitted ${formatDate(bid.createdAt)}</span>
                                            ${isOwner && bid.status === 'pending' && project.status === 'open' ? `
                                                <button onclick="acceptBid('${bid._id}')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Accept Bid</button>
                                            ` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    <!-- Open Governance: Tabs for In-Progress Projects -->
                    ${project.status === 'in_progress' && (isOwner || project.acceptedContractor?._id === user.id) ? `
                        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                            <div class="border-b border-gray-200">
                                <nav class="flex">
                                    <button onclick="showGovernanceTab('milestones')" id="tab-milestones" class="governance-tab px-6 py-3 text-sm font-medium border-b-2 border-gray-900 text-gray-900">
                                        Milestones
                                    </button>
                                    <button onclick="showGovernanceTab('changes')" id="tab-changes" class="governance-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                                        Change Orders
                                    </button>
                                    <button onclick="showGovernanceTab('activity')" id="tab-activity" class="governance-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                                        Activity Log
                                    </button>
                                </nav>
                            </div>
                            
                            <div id="governance-content" class="p-6">
                                <!-- Content loaded by JavaScript -->
                            </div>
                        </div>
                    ` : ''}
                </div>

                <!-- Sidebar -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- Project Info Card -->
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <h3 class="font-semibold text-gray-900 mb-4">Project Details</h3>
                        <div class="space-y-4">
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Budget</p>
                                <p class="text-2xl font-bold text-gray-900">${formatCurrency(project.budget)}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Location</p>
                                <p class="font-medium text-gray-900">${project.location}</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600 mb-1">Category</p>
                                <p class="font-medium text-gray-900">${project.category}</p>
                            </div>
                            ${project.startDate ? `
                                <div>
                                    <p class="text-sm text-gray-600 mb-1">Start Date</p>
                                    <p class="font-medium text-gray-900">${new Date(project.startDate).toLocaleDateString()}</p>
                                </div>
                            ` : ''}
                            ${project.endDate ? `
                                <div>
                                    <p class="text-sm text-gray-600 mb-1">End Date</p>
                                    <p class="font-medium text-gray-900">${new Date(project.endDate).toLocaleDateString()}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <!-- Open Governance: Negotiation Phase Tracker -->
                    ${project.status === 'in_progress' || project.negotiationPhase !== 'not_started' ? `
                        <div class="bg-white rounded-lg border border-gray-200 p-6">
                            <h3 class="font-semibold text-gray-900 mb-4">Negotiation Progress</h3>
                            <div class="space-y-3">
                                ${renderNegotiationPhase(project.negotiationPhase || 'not_started')}
                                <div class="mt-4 space-y-2">
                                    <div class="flex items-center text-xs ${project.negotiationPhase === 'scope_discussion' || project.negotiationPhase === 'timeline_alignment' || project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? 'text-green-600' : 'text-gray-400'}">
                                        <span class="mr-2">${project.negotiationPhase === 'scope_discussion' || project.negotiationPhase === 'timeline_alignment' || project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? '✓' : '○'}</span>
                                        Scope Aligned
                                    </div>
                                    <div class="flex items-center text-xs ${project.negotiationPhase === 'timeline_alignment' || project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? 'text-green-600' : 'text-gray-400'}">
                                        <span class="mr-2">${project.negotiationPhase === 'timeline_alignment' || project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? '✓' : '○'}</span>
                                        Timeline Confirmed
                                    </div>
                                    <div class="flex items-center text-xs ${project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? 'text-green-600' : 'text-gray-400'}">
                                        <span class="mr-2">${project.negotiationPhase === 'budget_agreement' || project.negotiationPhase === 'finalized' ? '✓' : '○'}</span>
                                        Budget Agreed
                                    </div>
                                    <div class="flex items-center text-xs ${project.negotiationPhase === 'finalized' ? 'text-green-600' : 'text-gray-400'}">
                                        <span class="mr-2">${project.negotiationPhase === 'finalized' ? '✓' : '○'}</span>
                                        Contract Finalized
                                    </div>
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    <!-- Client Info Card -->
                    <div class="bg-white rounded-lg border border-gray-200 p-6">
                        <h3 class="font-semibold text-gray-900 mb-4">Client</h3>
                        <div class="flex items-center gap-3 mb-4">
                            ${getAvatarHTML(project.owner, 'w-12 h-12')}
                            <div>
                                <p class="font-medium text-gray-900">${project.owner.firstName} ${project.owner.lastName}</p>
                                ${project.owner.company ? `<p class="text-sm text-gray-600">${project.owner.company}</p>` : ''}
                            </div>
                        </div>
                        ${project.owner.location ? `<p class="text-sm text-gray-600 mb-2">📍 ${project.owner.location}</p>` : ''}
                        <a href="/profile.html?id=${project.owner._id}" class="block w-full text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 mb-2">View Profile</a>
                        ${!isOwner ? `<a href="/messages.html?user=${project.owner._id}" class="block w-full text-center px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Send Message</a>` : ''}
                    </div>
                </div>
            `;

            // Attach event listeners
            const bidBtn = document.getElementById('open-bid-modal');
            if (bidBtn) {
                bidBtn.addEventListener('click', () => {
                    document.getElementById('bid-modal').classList.remove('hidden');
                });
            }
        }

        // Bid modal handlers
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('bid-modal').classList.add('hidden');
        });

        document.getElementById('cancel-bid').addEventListener('click', () => {
            document.getElementById('bid-modal').classList.add('hidden');
        });

        document.getElementById('bid-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const amount = document.getElementById('bid-amount').value;
            const proposal = document.getElementById('bid-proposal').value;
            const timeline = document.getElementById('bid-timeline').value;
            
            const btn = document.getElementById('submit-bid-btn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            try {
                const response = await authFetch(`/projects/${projectId}/bids`, {
                    method: 'POST',
                    body: JSON.stringify({ amount, proposal, timeline })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to submit bid');
                }
                
                document.getElementById('bid-modal').classList.add('hidden');
                alert('Bid submitted successfully!');
                loadProject(); // Reload project
            } catch (error) {
                const errorDiv = document.getElementById('bid-error');
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Submit Bid';
            }
        });

        async function acceptBid(bidId) {
            if (!confirm('Are you sure you want to accept this bid? This will reject all other bids.')) {
                return;
            }
            
            try {
                const response = await authFetch(`/projects/${projectId}/bids/${bidId}/accept`, {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to accept bid');
                }
                
                alert('Bid accepted successfully!');
                loadProject(); // Reload project
            } catch (error) {
                alert(error.message);
            }
        }

        loadProject();
        
        // Open Governance Tab Management
        let currentGovernanceTab = 'milestones';
        
        async function showGovernanceTab(tab) {
            currentGovernanceTab = tab;
            
            // Update tab styling
            document.querySelectorAll('.governance-tab').forEach(t => {
                t.classList.remove('border-gray-900', 'text-gray-900');
                t.classList.add('border-transparent', 'text-gray-600');
            });
            document.getElementById(`tab-${tab}`).classList.remove('border-transparent', 'text-gray-600');
            document.getElementById(`tab-${tab}`).classList.add('border-gray-900', 'text-gray-900');
            
            const content = document.getElementById('governance-content');
            
            if (tab === 'milestones') {
                await loadMilestones(content);
            } else if (tab === 'changes') {
                await loadChangeOrders(content);
            } else if (tab === 'activity') {
                await loadActivityLog(content);
            }
        }
        
        async function loadMilestones(container) {
            const isOwner = currentProject.owner._id === user.id;
            const isContractor = currentProject.acceptedContractor?._id === user.id;
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-semibold text-gray-900">Project Milestones</h3>
                        ${isOwner || isContractor ? `
                            <button onclick="showAddMilestoneModal()" class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">
                                + Add Milestone
                            </button>
                        ` : ''}
                    </div>
                    
                    ${currentProject.milestones && currentProject.milestones.length > 0 ? 
                        currentProject.milestones.map(m => renderMilestone(m, projectId, isContractor, isOwner)).join('') :
                        '<p class="text-center text-gray-500 py-8">No milestones defined yet. Add milestones to track progress and payments.</p>'
                    }
                </div>
            `;
        }
        
        async function loadChangeOrders(container) {
            const isOwner = currentProject.owner._id === user.id;
            const isContractor = currentProject.acceptedContractor?._id === user.id;
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-semibold text-gray-900">Change Orders</h3>
                        ${isOwner || isContractor ? `
                            <button onclick="showAddChangeOrderModal()" class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">
                                + Request Change
                            </button>
                        ` : ''}
                    </div>
                    
                    ${currentProject.changeOrders && currentProject.changeOrders.length > 0 ?
                        currentProject.changeOrders.map(c => renderChangeOrder(c, projectId, (isOwner || isContractor), user.id)).join('') :
                        '<p class="text-center text-gray-500 py-8">No change orders yet. Use change orders to formally request scope, budget, or timeline changes.</p>'
                    }
                </div>
            `;
        }
        
        async function loadActivityLog(container) {
            try {
                const response = await authFetch(`/projects/${projectId}/activity`);
                const data = await response.json();
                
                container.innerHTML = `
                    <div class="space-y-0">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4 px-4">Complete Activity History</h3>
                        <p class="text-sm text-gray-600 mb-6 px-4">Transparent log of all project decisions and updates for accountability.</p>
                        ${data.activityLog && data.activityLog.length > 0 ?
                            data.activityLog.map(entry => renderActivityLogEntry(entry)).join('') :
                            '<p class="text-center text-gray-500 py-8">No activity yet</p>'
                        }
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<p class="text-red-500 text-center py-8">Failed to load activity log</p>';
            }
        }
        
        function showAddMilestoneModal() {
            const modal = prompt('Milestone Title:');
            if (!modal) return;
            
            const description = prompt('Description (optional):');
            const amount = prompt('Payment Amount ($):');
            const dueDate = prompt('Due Date (YYYY-MM-DD):');
            
            authFetch(`/projects/${projectId}/milestones`, {
                method: 'POST',
                body: JSON.stringify({
                    title: modal,
                    description,
                    amount: amount ? parseFloat(amount) : 0,
                    dueDate: dueDate || null
                })
            }).then(() => {
                alert('Milestone added!');
                location.reload();
            }).catch(err => {
                alert('Failed to add milestone');
            });
        }
        
        function showAddChangeOrderModal() {
            const title = prompt('Change Order Title:');
            if (!title) return;
            
            const description = prompt('Detailed Description:');
            const budgetImpact = prompt('Budget Impact ($, use + or -):');
            const timelineImpact = prompt('Timeline Impact (e.g., +2 weeks):');
            
            authFetch(`/projects/${projectId}/change-orders`, {
                method: 'POST',
                body: JSON.stringify({
                    title,
                    description,
                    budgetImpact: budgetImpact ? parseFloat(budgetImpact) : 0,
                    timelineImpact
                })
            }).then(() => {
                alert('Change order submitted!');
                location.reload();
            }).catch(err => {
                alert('Failed to submit change order');
            });
        }
        
        // Initialize governance tab if project is in progress
        window.addEventListener('load', () => {
            if (currentProject && currentProject.status === 'in_progress') {
                showGovernanceTab('milestones');
            }
        });
    </script>
</body>
</html>
