<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Profile - Genovad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-10 px-4">
    <div class="w-full max-w-3xl">
      <div class="text-center mb-8">
        <img src="/public/logo-wordmark.png" alt="Genovad" class="h-20 mx-auto" />
        <h1 class="text-3xl font-bold text-gray-900 mt-4">Complete your account</h1>
        <p class="text-gray-600 mt-2" id="onboarding-subtitle">Add your contact details so your community can find you.</p>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl p-8">
        <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded"></div>
        <form id="onboarding-form" class="space-y-6">
          <div>
            <h2 class="text-lg font-semibold text-gray-900 mb-3">Contact information</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone *</label>
                <input id="phone" type="tel" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title / Role</label>
                <input id="title" type="text" placeholder="Owner, Estimator, PM..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
            </div>
          </div>

          <div>
            <h2 class="text-lg font-semibold text-gray-900 mb-3">Address (optional)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Street address</label>
                <input id="street" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                <input id="city" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
                <input id="state" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ZIP</label>
                <input id="zip" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
            </div>
          </div>

          <div>
            <h2 class="text-lg font-semibold text-gray-900 mb-3">Social media (optional)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Website</label>
                <input id="website" type="url" placeholder="https://" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">LinkedIn</label>
                <input id="linkedin" type="url" placeholder="https://linkedin.com/in/..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Instagram</label>
                <input id="instagram" type="url" placeholder="https://instagram.com/..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent" />
              </div>
            </div>
          </div>

          <button id="save-btn" type="submit" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">Save and continue</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/public/js/auth.js"></script>
  <script>
    if (!requireAuth()) {
      throw new Error('Not authenticated');
    }

    const user = getCurrentUser();
    if (user?.onboardingCompleted) {
      window.location.href = '/community-hub.html';
    }

    const roleLabel = (user?.role || 'owner') === 'owner' ? 'Owner' : 'Vendor';
    document.getElementById('onboarding-subtitle').textContent = `${roleLabel} profile setup: add contact details so communities can work with you quickly.`;

    document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const city = document.getElementById('city').value.trim();
      const state = document.getElementById('state').value.trim();
      const street = document.getElementById('street').value.trim();
      const zip = document.getElementById('zip').value.trim();
      const locationBits = [street, city, state, zip].filter(Boolean);

      const payload = {
        phone: document.getElementById('phone').value.trim(),
        title: document.getElementById('title').value.trim(),
        city,
        state,
        location: locationBits.join(', '),
        links: {
          website: document.getElementById('website').value.trim(),
          linkedin: document.getElementById('linkedin').value.trim(),
          instagram: document.getElementById('instagram').value.trim()
        },
        onboardingCompleted: true
      };

      try {
        const res = await authFetch('/api/users/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Failed to save profile');
        }

        const updatedUser = { ...getCurrentUser(), ...data.user, onboardingCompleted: true };
        setCurrentUser(updatedUser);
        window.location.href = '/community-hub.html';
      } catch (error) {
        showError(error.message || 'Failed to save profile');
        btn.disabled = false;
        btn.textContent = 'Save and continue';
      }
    });
  </script>
</body>
</html>
