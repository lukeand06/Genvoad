<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Community - Genovad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <main class="max-w-xl mx-auto px-4 py-10">
    <a href="/community-hub.html" class="inline-flex items-center text-sm text-gray-600 hover:text-gray-900 mb-4">← Back to Community Hub</a>

    <section class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Create a community</h1>
        <p class="text-sm text-gray-600 mt-1">Small + quick setup. You can always edit details later.</p>
      </div>

      <div id="feedback" class="hidden text-sm rounded-lg px-3 py-2"></div>

      <div>
        <label for="community-name-input" class="block text-sm font-medium text-gray-700 mb-1">Community name</label>
        <input id="community-name-input" type="text" maxlength="100" placeholder="e.g. Atlanta Builders Circle" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg" />
      </div>

      <div>
        <label for="community-description-input" class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
        <textarea id="community-description-input" rows="3" maxlength="500" placeholder="What is this community about?" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg resize-none"></textarea>
      </div>

      <div>
        <label for="community-invites-input" class="block text-sm font-medium text-gray-700 mb-1">Invite emails (optional)</label>
        <textarea id="community-invites-input" rows="4" placeholder="one@email.com, two@email.com" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg resize-none"></textarea>
        <p class="text-xs text-gray-500 mt-1">Use commas or new lines. Registered users get direct invites; unregistered users receive an email invite flow.</p>
      </div>

      <button id="create-community-submit" class="w-full px-4 py-2 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Create community</button>
    </section>
  </main>

  <script src="/public/js/auth.js"></script>
  <script>
    if (!requireAuth()) {
      throw new Error('Not authenticated');
    }

    const nameInput = document.getElementById('community-name-input');
    const descriptionInput = document.getElementById('community-description-input');
    const invitesInput = document.getElementById('community-invites-input');
    const submitBtn = document.getElementById('create-community-submit');
    const feedback = document.getElementById('feedback');

    submitBtn.addEventListener('click', createCommunity);

    function parseInviteEmails(rawText) {
      if (!rawText) return [];

      const candidates = rawText
        .split(/[\n,;]+/)
        .map(item => item.trim().toLowerCase())
        .filter(Boolean);

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const unique = new Set();

      candidates.forEach(email => {
        if (emailPattern.test(email)) {
          unique.add(email);
        }
      });

      return Array.from(unique);
    }

    function setFeedback(message, kind = 'error') {
      feedback.textContent = message;
      feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-green-50', 'text-green-700', 'border-green-200', 'border');
      feedback.classList.add('border');

      if (kind === 'success') {
        feedback.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
      } else {
        feedback.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
      }
    }

    async function createCommunity() {
      const name = (nameInput?.value || '').trim();
      const description = (descriptionInput?.value || '').trim();
      const inviteEmails = parseInviteEmails(invitesInput?.value || '');

      if (!name) {
        setFeedback('Community name is required');
        return;
      }

      const originalBtnText = submitBtn.textContent;

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating...';
        feedback.classList.add('hidden');

        const res = await authFetch('/api/companies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            legalName: name,
            type: 'other',
            size: '1-10',
            description: description || 'Community created from Community Hub'
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create community');

        let inviteSuccessCount = 0;
        let inviteFailed = [];

        if (inviteEmails.length > 0 && data?.company?._id) {
          const inviteResults = await Promise.allSettled(
            inviteEmails.map(email => authFetch(`/api/companies/${data.company._id}/invite`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, role: 'member' })
            }))
          );

          for (let i = 0; i < inviteResults.length; i += 1) {
            const result = inviteResults[i];
            const email = inviteEmails[i];

            if (result.status === 'fulfilled') {
              const resp = result.value;
              if (resp.ok) {
                inviteSuccessCount += 1;
              } else {
                let errMsg = 'Failed to invite';
                try {
                  const errData = await resp.json();
                  errMsg = errData.error || errMsg;
                } catch (_) {}
                inviteFailed.push(`${email} (${errMsg})`);
              }
            } else {
              inviteFailed.push(`${email} (Request failed)`);
            }
          }
        }

        if (inviteEmails.length > 0 && inviteFailed.length > 0) {
          setFeedback(`Community created. ${inviteSuccessCount}/${inviteEmails.length} invites sent. Failed: ${inviteFailed.join(', ')}`, 'success');
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
          return;
        }

        setFeedback('Community created successfully. Redirecting to Community Hub...', 'success');
        setTimeout(() => {
          window.location.href = '/community-hub.html';
        }, 700);
      } catch (error) {
        setFeedback(error.message || 'Failed to create community');
      } finally {
        if (submitBtn.disabled) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
        }
      }
    }
  </script>
</body>
</html>
