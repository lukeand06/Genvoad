<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In (Vendor) - Genovad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center">
          <img src="/public/logo-wordmark.png" alt="Genovad" class="h-12 w-auto">
        </a>
        <h2 class="mt-6 text-3xl font-bold text-gray-900">Sign in as Vendor</h2>
        <p class="mt-2 text-sm text-gray-600">Find work and submit bids</p>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
        <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
          </div>
          <button type="submit" id="login-btn" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">Sign In</button>
        </form>
        <div class="mt-6 text-center text-sm">
          <span class="text-gray-600">Need a vendor account?</span>
          <a href="vendor-signup.html" class="text-gray-900 font-medium hover:underline ml-1">Sign up</a>
        </div>
      </div>
    </div>
  </div>


  <script src="/public/js/auth.js"></script>
  <script>
    setActivePlatform('genovad');
    redirectIfAuth();
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value?.trim();
      const password = document.getElementById('password').value?.trim();
      
      // Validate inputs
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }
      
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const body = { email, password, role: 'vendor' };
        console.log('Login request:', { email, role: 'vendor' }); // Debug
        
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `Login failed (HTTP ${response.status})`);
        setToken(data.token);
        setCurrentUser(data.user);
        setActivePlatform('genovad');
        window.location.href = getPostAuthRoute(data.user);
      } catch (err) {
        console.error('Login error:', err);
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
