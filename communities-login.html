<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Genovad Communities</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
      <div class="text-center mb-10">
        <a href="index.html" class="inline-flex items-center">
          <img src="/public/logo-wordmark.png" alt="Genovad" class="h-24 w-auto">
        </a>
        <p class="mt-4 text-xs uppercase tracking-widest text-gray-500">Genovad Communities</p>
        <h2 class="mt-2 text-3xl font-bold text-gray-900">Welcome back</h2>
        <p class="mt-2 text-sm text-gray-600">Sign in to enter <span class="font-semibold text-gray-900">exclusive Communities</span></p>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
        <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded"></div>

        <div class="mb-6 grid grid-cols-2 gap-3" id="role-toggle">
          <button data-role="owner" class="role-pill px-4 py-2 rounded-lg border border-gray-900 bg-gray-900 text-white font-semibold transition">Owner</button>
          <button data-role="vendor" class="role-pill px-4 py-2 rounded-lg border border-gray-200 text-gray-700 font-semibold hover:border-emerald-400 hover:bg-emerald-50 transition">Vendor</button>
        </div>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
          </div>
          <button type="submit" id="login-btn" class="w-full bg-gray-900 text-white py-2.5 rounded-lg font-semibold hover:bg-gray-800 transition">Sign In to Communities</button>
        </form>

        <div class="mt-4 rounded-lg border border-gray-200 bg-gray-50 p-3 text-xs text-gray-600">
          After login, you can join by invite/access code or continue in your existing communities.
        </div>

        <div class="mt-6 text-center text-sm">
          <span class="text-gray-600">Need an account?</span>
          <a href="signup.html" class="text-gray-900 font-medium hover:underline ml-1">Sign up</a>
        </div>

        <div class="mt-4 text-center text-sm">
          <a href="/login.html" class="text-gray-600 hover:text-gray-900 hover:underline">Use Genovad Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/public/js/auth.js"></script>
  <script>
    let selectedRole = 'owner';

    window.addEventListener('load', () => {
      setActivePlatform('communities');
      redirectIfAuth();

      const rolePills = document.querySelectorAll('.role-pill');
      rolePills.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          selectedRole = btn.dataset.role || 'owner';
          rolePills.forEach(b => b.classList.remove('bg-gray-900', 'text-white', 'border-gray-900'));
          rolePills.forEach(b => b.classList.add('border-gray-200', 'text-gray-700', 'hover:border-emerald-400', 'hover:bg-emerald-50'));
          btn.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
          btn.classList.remove('border-gray-200', 'text-gray-700', 'hover:border-emerald-400', 'hover:bg-emerald-50');
        });
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value?.trim();
        const password = document.getElementById('password').value?.trim();

        if (!email || !password) {
          showError('Please enter both email and password');
          return;
        }

        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
          const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, role: selectedRole })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || `Login failed (HTTP ${response.status})`);

          setToken(data.token);
          setCurrentUser(data.user);
          setActivePlatform('communities');
          setActiveRole(data.user.activeRole || data.user.role || selectedRole);
          window.location.href = getPostAuthRoute(data.user, 'communities');
        } catch (error) {
          showError(error.message || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Sign In to Communities';
        }
      });
    });
  </script>
</body>
</html>
