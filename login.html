<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Genovad - Access your construction project network and opportunities.">
    <meta name="keywords" content="construction, contractors, vendors, projects, bidding, network, login">
    <meta name="author" content="Genovad">
    <meta name="robots" content="index, follow">
    <meta name="canonical" href="https://www.genovad.com/login.html">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.genovad.com/login.html">
    <meta property="og:title" content="Sign In - Genovad">
    <meta property="og:description" content="Sign in to Genovad and manage your construction projects.">
    <meta property="og:image" content="https://www.genovad.com/public/og-image.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.genovad.com/login.html">
    <meta property="twitter:title" content="Sign In - Genovad">
    <meta property="twitter:description" content="Sign in to Genovad and manage your construction projects.">
    <meta property="twitter:image" content="https://www.genovad.com/public/og-image.png">
    
    <title>Sign In - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js" defer></script>
    <script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center space-x-2">
                    <svg class="w-10 h-10" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="8" fill="#166534"/>
                        <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <span class="text-2xl font-bold text-gray-900">Genovad</span>
                </a>
                <h2 class="mt-6 text-3xl font-bold text-gray-900">Welcome back</h2>
                <p class="mt-2 text-sm text-gray-600">Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>

                <!-- Role toggle at top -->
                <div class="mb-6 grid grid-cols-2 gap-3" id="role-toggle">
                    <button data-role="owner" class="role-pill px-4 py-3 rounded-lg border border-gray-900 bg-gray-900 text-white font-semibold transition">Project Owner</button>
                    <button data-role="vendor" class="role-pill px-4 py-3 rounded-lg border border-gray-200 text-gray-700 font-semibold hover:border-emerald-400 hover:bg-emerald-50 transition">Vendor / Service Provider</button>
                </div>
                
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <button type="submit" id="login-btn" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                        Sign In
                    </button>
                </form>

                <!-- Social login section - hidden until configured
                <div class="flex items-center my-6">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="px-3 text-xs text-gray-500 uppercase tracking-[0.2em]">or</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <div class="space-y-3" id="social-buttons">
                    <div id="google-signin" class="w-full"></div>
                    <button id="microsoft-signin" class="w-full border border-gray-300 text-gray-900 py-3 rounded-lg font-medium hover:bg-gray-50 flex items-center justify-center gap-2">
                        <span>Continue with Microsoft</span>
                    </button>
                    <button id="apple-signin" class="w-full border border-gray-900 text-gray-900 py-3 rounded-lg font-medium hover:bg-gray-900 hover:text-white transition flex items-center justify-center gap-2">
                        <span>Sign in with Apple</span>
                    </button>
                </div>
                -->

                <div class="mt-6 text-center text-sm">
                    <span class="text-gray-600">Don't have an account?</span>
                    <a href="signup.html" class="text-gray-900 font-medium hover:underline ml-1">Sign up</a>
                </div>
            </div>
        </div>
    </div>


    <script src="/public/js/auth.js"></script>
    <script>
        let selectedRole = 'owner';

        window.addEventListener('load', () => {
            redirectIfAuth();

            let authConfig = { providers: {}, clientIds: {} };

            const disableButton = (btn, text) => {
                if (!btn) return;
                btn.disabled = true;
                btn.textContent = text;
                btn.classList.add('opacity-60', 'cursor-not-allowed');
            };

            // Social login temporarily disabled - uncomment to enable
            // const loadAuthConfig = async () => { ... };
            // loadAuthConfig();

            // Role toggle handlers (no modal; direct selection)
            const rolePills = document.querySelectorAll('.role-pill');
            rolePills.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const role = btn.dataset.role;
                    selectedRole = role;
                    rolePills.forEach(b => b.classList.remove('bg-gray-900','text-white','border-gray-900'));
                    rolePills.forEach(b => b.classList.add('border-gray-200','text-gray-700','hover:border-emerald-400','hover:bg-emerald-50'));
                    btn.classList.add('bg-gray-900','text-white','border-gray-900');
                    btn.classList.remove('border-gray-200','text-gray-700','hover:border-emerald-400','hover:bg-emerald-50');
                });
            });

            const handleSocial = async (provider, token, buttonEl) => {
                if (!token) {
                    showError('Missing provider token');
                    return;
                }

                if (buttonEl) {
                    buttonEl.dataset.defaultLabel = buttonEl.dataset.defaultLabel || buttonEl.textContent;
                    buttonEl.disabled = true;
                    buttonEl.textContent = 'Signing in...';
                }

                try {
                    const res = await fetch(`${API_URL}/auth/social`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ provider, idToken: token, role: selectedRole })
                    });

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Social login failed');

                    setToken(data.token);
                    setCurrentUser(data.user);
                    setActiveRole(data.user.activeRole || data.user.role || selectedRole);
                    window.location.href = '/dashboard.html';
                } catch (err) {
                    showError(err.message || 'Social login failed');
                } finally {
                    if (buttonEl) {
                        buttonEl.disabled = false;
                        buttonEl.textContent = buttonEl.dataset.defaultLabel || 'Continue';
                    }
                }
            };

            const initGoogle = (clientId) => {
                const googleContainer = document.getElementById('google-signin');
                if (!window.google || !google.accounts || !googleContainer) {
                    disableButton(googleContainer, 'Google unavailable');
                    return;
                }
                google.accounts.id.initialize({
                    client_id: clientId,
                    callback: (response) => handleSocial('google', response.credential)
                });
                google.accounts.id.renderButton(
                    googleContainer,
                    { theme: 'outline', size: 'large', text: 'continue_with', width: 360 }
                );
            };

            const initMicrosoft = (clientId) => {
                const msButton = document.getElementById('microsoft-signin');
                if (!window.msal || !msButton) {
                    disableButton(msButton, 'Microsoft unavailable');
                    return;
                }

                const msalInstance = new msal.PublicClientApplication({
                    auth: {
                        clientId,
                        redirectUri: window.location.origin
                    }
                });

                msButton.dataset.defaultLabel = msButton.textContent;
                msButton.addEventListener('click', async () => {
                    try {
                        const result = await msalInstance.loginPopup({ scopes: ['openid', 'profile', 'email'] });
                        await handleSocial('microsoft', result.idToken, msButton);
                    } catch (err) {
                        showError(err.message || 'Microsoft sign-in failed');
                    }
                });
            };

            const initApple = (clientId) => {
                const appleButton = document.getElementById('apple-signin');
                if (!window.AppleID || !appleButton) {
                    disableButton(appleButton, 'Apple unavailable');
                    return;
                }

                AppleID.auth.init({
                    clientId,
                    scope: 'name email',
                    redirectURI: window.location.origin,
                    usePopup: true
                });

                appleButton.dataset.defaultLabel = appleButton.textContent;
                appleButton.addEventListener('click', async () => {
                    try {
                        const response = await AppleID.auth.signIn();
                        const idToken = response?.authorization?.id_token;
                        await handleSocial('apple', idToken, appleButton);
                    } catch (err) {
                        if (err?.error !== 'popup_closed_by_user') {
                            showError(err?.error || 'Apple sign-in failed');
                        }
                    }
                });
            };

            const loadAuthConfig = async () => {
                try {
                    const res = await fetch(`${API_URL}/auth/config`);
                    authConfig = await res.json();

                    if (authConfig.providers.google && authConfig.clientIds.google) {
                        initGoogle(authConfig.clientIds.google);
                    } else {
                        disableButton(document.querySelector('#google-signin'), 'Google not configured');
                    }

                    if (authConfig.providers.microsoft && authConfig.clientIds.microsoft) {
                        initMicrosoft(authConfig.clientIds.microsoft);
                    } else {
                        disableButton(document.getElementById('microsoft-signin'), 'Microsoft not configured');
                    }

                    if (authConfig.providers.apple && authConfig.clientIds.apple) {
                        initApple(authConfig.clientIds.apple);
                    } else {
                        disableButton(document.getElementById('apple-signin'), 'Apple not configured');
                    }
                } catch (err) {
                    console.error('Auth config load failed', err);
                    disableButton(document.getElementById('microsoft-signin'), 'SSO unavailable');
                    disableButton(document.getElementById('apple-signin'), 'SSO unavailable');
                    disableButton(document.querySelector('#google-signin'), 'SSO unavailable');
                }
            };

            // Social login temporarily disabled - uncomment loadAuthConfig() to enable
            // loadAuthConfig();

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value?.trim();
                const password = document.getElementById('password').value?.trim();
                
                // Validate inputs
                if (!email || !password) {
                    showError('Please enter both email and password');
                    return;
                }
                
                const btn = document.getElementById('login-btn');
                btn.disabled = true;
                btn.textContent = 'Signing in...';
                
                try {
                    const body = { email, password, role: selectedRole };
                    console.log('Login request:', { email, role: selectedRole }); // Debug
                    
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || `Login failed (HTTP ${response.status})`);
                    }

                    // Set token and user
                    setToken(data.token);
                    setCurrentUser(data.user);
                    setActiveRole(data.user.activeRole || data.user.role || selectedRole);
                    window.location.href = '/dashboard.html';
                } catch (error) {
                    console.error('Login error:', error);
                    showError(error.message);
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });
        });
    </script>
</body>
</html>
