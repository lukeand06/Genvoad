<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation (same as dashboard) -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg mr-2">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" id="nav-cta-button" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn" class="flex items-center space-x-2">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/edit-profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Edit Profile</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-40 md:hidden">
        <div class="fixed inset-0 bg-black bg-opacity-50" id="mobile-menu-backdrop"></div>
        <div class="fixed top-0 left-0 w-64 h-full bg-white shadow-lg overflow-y-auto">
            <div class="p-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Menu</h3>
            </div>
            <nav class="p-4 space-y-2">
                <a href="/dashboard.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                <a href="/projects.html" class="block px-4 py-3 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg hover:bg-gray-100">Projects</a>
                <a href="/messages.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                <a href="/browse.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                <a href="/notifications.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Notifications</a>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <a href="/create-project.html" class="block w-full px-4 py-3 text-center text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800">Post Project</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Projects</h1>
                <p class="text-gray-600 mt-1" id="projects-subtitle">Browse projects or track your bids</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-lg border border-gray-200 mb-6">
            <nav class="flex">
                <button id="tab-my" class="project-tab px-6 py-3 text-sm font-medium border-b-2 border-gray-900 text-gray-900" style="display:none;">My Projects</button>
                <button id="tab-browse" class="project-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">Browse Projects</button>
            </nav>
        </div>

        <!-- Filters -->
        <div id="filters-section" class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="search-input" placeholder="Search projects..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select id="category-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        <option value="">All Categories</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Industrial">Industrial</option>
                        <option value="Renovation">Renovation</option>
                        <option value="Landscaping">Landscaping</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="status-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        <option value="">All Status</option>
                        <option value="open" selected>Open</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="filter-btn" class="w-full bg-gray-900 text-white px-4 py-2 rounded-lg font-medium hover:bg-gray-800">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Projects Grid -->
        <div id="projects-container" class="grid grid-cols-1 gap-6">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading projects...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        const userId = user._id || user.id;
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        // Role-based nav button
        const isVendor = user.role === 'vendor';
        const navCta = document.getElementById('nav-cta-button');
        if (isVendor && navCta) {
            navCta.textContent = 'Find Work';
            navCta.href = '/browse.html';
        }

        // Role-based tab and subtitle
        const myTab = document.getElementById('tab-my');
        const subtitle = document.getElementById('projects-subtitle');
        if (isVendor) {
            myTab.textContent = 'My Bids';
            myTab.style.display = 'block';
            subtitle.textContent = 'Browse projects and track your bids';
        } else {
            myTab.textContent = 'My Posted Projects';
            myTab.style.display = 'block';
            subtitle.textContent = 'Browse projects and manage your postings';
        }

        // User menu toggle
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Mobile Menu Handler
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuBackdrop = document.getElementById('mobile-menu-backdrop');
        const mobileMenuLinks = mobileMenu.querySelectorAll('a');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
        
        mobileMenuBackdrop.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
        });
        
        mobileMenuLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
            });
        });

        let allProjects = [];
        let currentTab = 'my';

        async function loadProjects() {
            try {
                const status = document.getElementById('status-filter').value;
                const category = document.getElementById('category-filter').value;
                const params = new URLSearchParams();
                if (status) params.set('status', status);
                if (category) params.set('category', category);
                const url = params.toString() ? `/api/projects?${params.toString()}` : '/api/projects';

                const res = await authFetch(url);
                const ct = res.headers.get('content-type') || '';
                if (!res.ok || !ct.includes('application/json')) {
                    let err;
                    try { err = await res.json(); } catch {}
                    throw new Error((err && (err.error || err.message)) || `Failed to load projects (HTTP ${res.status})`);
                }
                const data = await res.json();
                allProjects = data.projects || [];
                filterProjects(); // apply search locally
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projects-container').innerHTML = `<div class="text-center py-12 text-red-500">${error.message || 'Failed to load projects'}</div>`;
            }
        }

        function displayProjects(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">No projects found</p></div>';
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-xl font-semibold text-gray-900">${project.title}</h3>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${
                                    project.status === 'open' ? 'bg-green-50 text-green-700' :
                                    project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                    project.status === 'completed' ? 'bg-gray-100 text-gray-700' :
                                    'bg-red-50 text-red-700'
                                }">${project.status.replace('_', ' ')}</span>
                            </div>
                            <p class="text-gray-600 mb-4">${project.description || ''}</p>
                            
                            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    ${project.location || ''}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Budget: ${formatCurrency(project.budget || 0)}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                    </svg>
                                    ${project.category || ''}
                                </span>
                                ${(project.meetingDate || project.startDate || project.endDate) ? `
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    ${project.meetingDate ? `Meeting: ${new Date(project.meetingDate).toLocaleString()}` : (project.startDate && project.endDate) ? `Schedule: ${new Date(project.startDate).toLocaleDateString()} - ${new Date(project.endDate).toLocaleDateString()}` : project.startDate ? `Start: ${new Date(project.startDate).toLocaleDateString()}` : project.endDate ? `End: ${new Date(project.endDate).toLocaleDateString()}` : ''}
                                </span>
                                ` : ''}
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                                    </svg>
                                    ${project.bids?.length || 0} bids
                                </span>
                            </div>

                            ${project.skills && project.skills.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${project.skills.map(skill => `<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">${skill}</span>`).join('')}
                                </div>
                            ` : ''}

                            <div class="flex items-center gap-3">
                                ${project.owner ? `
                                    <div class="flex items-center gap-2">
                                        ${getAvatarHTML(project.owner, 'w-8 h-8')}
                                        <div class="text-sm min-w-0 flex-1">
                                            <div class="flex items-center gap-1.5">
                                                <p class="font-medium text-gray-900 truncate">${project.owner.company || `${project.owner.firstName} ${project.owner.lastName}`}</p>
                                                ${getVerificationBadge(project.owner, 'small')}
                                            </div>
                                            ${project.owner.company ? `<p class="text-gray-500 text-xs truncate">${project.owner.firstName} ${project.owner.lastName}</p>` : ''}
                                        </div>
                                    </div>
                                ` : ''}
                                <span class="text-sm text-gray-500 ml-auto whitespace-nowrap">${formatDate(project.createdAt)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-4 pt-4 border-t border-gray-200">
                        <a href="/project-detail.html?id=${project._id}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Details</a>
                        ${project.status === 'open' && (project.owner && project.owner._id !== user.id) ? `
                            <a href="/project-detail.html?id=${project._id}#bid" class="flex-1 text-center px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Submit Bid</a>
                        ` : ''}
                        ${(project.owner && project.owner._id !== user.id) ? `
                            <a href="/messages.html?user=${project.owner._id}&projectId=${project._id}&projectTitle=${encodeURIComponent(project.title)}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Message Client</a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterProjects() {
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            
            const filtered = allProjects.filter(project => {
                const title = (project.title || '').toLowerCase();
                const desc = (project.description || '').toLowerCase();
                const matchesSearch = !search || title.includes(search) || desc.includes(search);
                return matchesSearch;
            });

            displayProjects(filtered);
        }

        document.getElementById('filter-btn').addEventListener('click', loadProjects);
        document.getElementById('search-input').addEventListener('input', filterProjects);

        // Tab switching
        document.getElementById('tab-browse').addEventListener('click', () => {
            currentTab = 'browse';
            updateTabs();
            loadProjects();
        });

        document.getElementById('tab-my').addEventListener('click', () => {
            currentTab = 'my';
            updateTabs();
            if (isVendor) {
                loadMyBids();
            } else {
                loadMyProjects();
            }
        });

        function updateTabs() {
            const tabs = document.querySelectorAll('.project-tab');
            tabs.forEach(t => {
                t.classList.remove('border-gray-900', 'text-gray-900');
                t.classList.add('border-transparent', 'text-gray-600');
            });
            
            const activeTab = currentTab === 'browse' ? 'tab-browse' : 'tab-my';
            const tab = document.getElementById(activeTab);
            tab.classList.remove('border-transparent', 'text-gray-600');
            tab.classList.add('border-gray-900', 'text-gray-900');
            
            // Show/hide filters
            document.getElementById('filters-section').style.display = currentTab === 'browse' ? 'block' : 'none';
        }

        async function loadMyProjects() {
            try {
                const response = await authFetch('/api/projects');
                if (!response.ok) {
                    const ct = response.headers.get('content-type') || '';
                    const err = ct.includes('application/json') ? await response.json() : null;
                    throw new Error((err && (err.error || err.message)) || `Failed to load projects (HTTP ${response.status})`);
                }
                const data = await response.json();
                
                // Filter projects owned by current user
                const userId = user._id || user.id;
                const myProjects = (data.projects || []).filter(p => 
                    p.owner && (p.owner._id === userId || p.owner === userId)
                );
                
                displayMyProjects(myProjects);
            } catch (error) {
                console.error('Error loading my projects:', error);
                document.getElementById('projects-container').innerHTML = `<div class="text-center py-12 text-red-500">${error.message}</div>`;
            }
        }

        function displayMyProjects(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">You haven\'t posted any projects yet</p><a href="/create-project.html" class="text-blue-600 hover:underline">Post your first project</a></div>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const statusColor = project.status === 'open' ? 'bg-green-50 text-green-700 border-green-200' :
                                   project.status === 'in_progress' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                   project.status === 'completed' ? 'bg-gray-100 text-gray-700 border-gray-200' :
                                   'bg-red-50 text-red-700 border-red-200';
                const bidsCount = project.bids?.length || 0;
                const pendingBids = (project.bids || []).filter(b => b.status === 'pending').length;
                const acceptedBid = (project.bids || []).find(b => b.status === 'accepted');
                
                return `
                <div class="bg-white rounded-lg border-2 ${project.status === 'in_progress' ? 'border-blue-300' : 'border-gray-200'} p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-xl font-semibold text-gray-900">${project.title}</h3>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${statusColor} border">
                                    ${project.status.replace('_', ' ')}
                                </span>
                            </div>
                            <p class="text-gray-600 mb-4">${project.description || ''}</p>
                            
                            <!-- Project Stats -->
                            <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4">
                                <div class="grid grid-cols-3 gap-4">
                                    <div>
                                        <div class="text-2xl font-bold text-gray-900">${bidsCount}</div>
                                        <div class="text-sm text-gray-600">Total Bids</div>
                                    </div>
                                    <div>
                                        <div class="text-2xl font-bold text-yellow-600">${pendingBids}</div>
                                        <div class="text-sm text-gray-600">Pending Review</div>
                                    </div>
                                    <div>
                                        <div class="text-2xl font-bold ${acceptedBid ? 'text-green-600' : 'text-gray-400'}">${acceptedBid ? '1' : '0'}</div>
                                        <div class="text-sm text-gray-600">Accepted</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    ${project.location || ''}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Budget: ${formatCurrency(project.budget || 0)}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                    </svg>
                                    ${project.category || ''}
                                </span>
                                ${(project.meetingDate || project.startDate || project.endDate) ? `
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    ${project.meetingDate ? `Meeting: ${new Date(project.meetingDate).toLocaleString()}` : (project.startDate && project.endDate) ? `Schedule: ${new Date(project.startDate).toLocaleDateString()} - ${new Date(project.endDate).toLocaleDateString()}` : project.startDate ? `Start: ${new Date(project.startDate).toLocaleDateString()}` : project.endDate ? `End: ${new Date(project.endDate).toLocaleDateString()}` : ''}
                                </span>
                                ` : ''}
                                <span class="text-gray-500">Posted ${formatDate(project.createdAt)}</span>
                            </div>

                            ${acceptedBid ? `
                                <div class="bg-green-50 border border-green-200 rounded-lg p-3 mb-4">
                                    <div class="flex items-center gap-2 mb-2">
                                        <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                        <div class="flex items-center gap-1.5">
                                            <span class="text-sm font-medium text-green-900">Vendor Selected: ${acceptedBid.user.company || `${acceptedBid.user.firstName} ${acceptedBid.user.lastName}`}</span>
                                            ${getVerificationBadge(acceptedBid.user, 'small')}
                                        </div>
                                    </div>
                                    <div class="text-sm text-green-800"><strong>Accepted Bid:</strong> ${formatCurrency(acceptedBid.amount)}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mt-4 pt-4 border-t border-gray-200">
                        <a href="/project-detail.html?id=${project._id}" class="flex-1 text-center px-3 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">View Details</a>
                        ${project.status === 'open' && bidsCount > 0 ? `
                            <a href="/project-detail.html?id=${project._id}#bids" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Review Bids (${pendingBids})</a>
                        ` : ''}
                        ${project.status === 'open' ? `
                            <button onclick="inviteToBid('${project._id}')" class="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50" title="Invite specific vendors">
                                <svg class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                Invite Vendor
                            </button>
                            <button onclick="closeProject('${project._id}', 'cancelled')" class="px-3 py-2 border border-red-300 rounded-lg text-sm font-medium text-red-700 hover:bg-red-50">Close</button>
                        ` : ''}
                        ${project.status === 'in_progress' ? `
                            <button onclick="closeProject('${project._id}', 'completed')" class="px-3 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Mark Complete</button>
                        ` : ''}
                    </div>
                </div>
            `;
            }).join('');
        }

        async function inviteToBid(projectId) {
            try {
                const project = allProjects.find(p => p._id === projectId);
                if (!project) return;
                
                // Prompt for email or name
                const searchQuery = prompt('Enter vendor name or email to invite:');
                if (!searchQuery || searchQuery.trim().length < 2) return;
                
                // Search for user
                const res = await authFetch(`/api/users/search?q=${encodeURIComponent(searchQuery.trim())}`);
                const data = await res.json();
                
                if (data.length === 0) {
                    alert('No users found with that name or email.');
                    return;
                }
                
                // If multiple results, show selection
                let selectedUser;
                if (data.length === 1) {
                    selectedUser = data[0];
                } else {
                    let options = 'Multiple users found. Select one:\n\n';
                    data.forEach((u, i) => {
                        options += `${i + 1}. ${u.name} (${u.email})${u.company ? ` - ${u.company}` : ''}${!u.isRegistered ? ' [Not on Genovad]' : ''}\n`;
                    });
                    const selection = prompt(options + '\nEnter number (1-' + data.length + '):');
                    const idx = parseInt(selection) - 1;
                    if (idx < 0 || idx >= data.length) {
                        alert('Invalid selection');
                        return;
                    }
                    selectedUser = data[idx];
                }
                
                // Send invitation
                if (!selectedUser.isRegistered) {
                    // Send email invitation
                    await authFetch('/api/messages/email-invite', {
                        method: 'POST',
                        body: JSON.stringify({
                            email: selectedUser.email,
                            subject: `Bid Invitation: ${project.title}`,
                            message: `I'd like to invite you to bid on my project: "${project.title}". Budget: ${formatCurrency(project.budget)}, Location: ${project.location}. Join Genovad to view details and submit your bid!`,
                            projectId: projectId
                        })
                    });
                    alert(`Email invitation sent to ${selectedUser.email}!`);
                } else {
                    // Send in-app message
                    await authFetch('/api/messages', {
                        method: 'POST',
                        body: JSON.stringify({
                            recipient: selectedUser._id,
                            content: `I'd like to invite you to bid on my project: "${project.title}". Budget: ${formatCurrency(project.budget)}, Location: ${project.location}. Check it out and submit your bid if interested!`,
                            type: 'bid_invitation',
                            project: projectId
                        })
                    });
                    alert(`Invitation sent to ${selectedUser.name}!`);
                }
            } catch (e) {
                console.error('Invite error:', e);
                alert('Failed to send invitation: ' + e.message);
            }
        }

        async function closeProject(projectId, newStatus) {
            try {
                const action = newStatus === 'completed' ? 'mark this project as complete' : 'close this project';
                if (!confirm(`Are you sure you want to ${action}?`)) return;
                
                // Use the project update endpoint if it exists, or create a new one
                const res = await authFetch(`/api/projects/${projectId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    alert(data.error || 'Failed to update project');
                    return;
                }
                
                alert(`Project ${newStatus === 'completed' ? 'completed' : 'closed'} successfully`);
                loadMyProjects();
            } catch (e) {
                console.error('Close project error', e);
                alert('Failed to update project');
            }
        }

        async function loadMyBids() {
            try {
                const response = await authFetch('/api/projects');
                if (!response.ok) {
                    const ct = response.headers.get('content-type') || '';
                    const err = ct.includes('application/json') ? await response.json() : null;
                    throw new Error((err && (err.error || err.message)) || `Failed to load bids (HTTP ${response.status})`);
                }
                const data = await response.json();
                
                // Filter projects where user has bid
                const projectsWithMyBids = (data.projects || []).filter(p => 
                    (p.bids || []).some(bid => (bid.user && bid.user._id ? bid.user._id : bid.user) === user.id)
                );
                
                displayMyBids(projectsWithMyBids);
            } catch (error) {
                console.error('Error loading my bids:', error);
                document.getElementById('projects-container').innerHTML = `<div class="text-center py-12 text-red-500">${error.message}</div>`;
            }
        }

        function displayMyBids(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">You haven\'t submitted any bids yet</p><br><a href="#" onclick="document.getElementById(\'tab-browse\').click(); return false;" class="text-blue-600 hover:underline font-medium">Browse projects to bid on</a></div>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const myBid = project.bids.find(bid => (bid.user && bid.user._id ? bid.user._id : bid.user) === user.id);
                const statusColor = myBid.status === 'accepted' ? 'bg-green-50 text-green-700 border-green-200' :
                                   myBid.status === 'rejected' ? 'bg-red-50 text-red-700 border-red-200' :
                                   'bg-yellow-50 text-yellow-700 border-yellow-200';
                const statusText = myBid.status === 'pending' ? 'Under Review' : myBid.status.charAt(0).toUpperCase() + myBid.status.slice(1);
                
                return `
                <div class="bg-white rounded-lg border-2 ${myBid.status === 'accepted' ? 'border-green-300' : 'border-gray-200'} p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-xl font-semibold text-gray-900">${project.title}</h3>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${statusColor} border">
                                    ${statusText}
                                </span>
                            </div>
                            <p class="text-gray-600 mb-4">${project.description}</p>
                            
                            <!-- My Bid Details -->
                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-blue-900">Your Bid</span>
                                    <span class="text-xl font-bold text-blue-900">${formatCurrency(myBid.amount)}</span>
                                </div>
                                <div class="text-sm text-blue-800 mb-2">
                                    <strong>Timeline:</strong> ${myBid.timeline}
                                </div>
                                <div class="text-sm text-blue-800">
                                    <strong>Submitted:</strong> ${formatDate(myBid.createdAt)}
                                </div>
                                ${myBid.proposal ? `
                                    <details class="mt-2">
                                        <summary class="text-sm font-medium text-blue-900 cursor-pointer">View Proposal</summary>
                                        <p class="text-sm text-blue-800 mt-2">${myBid.proposal}</p>
                                    </details>
                                ` : ''}
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    ${project.location}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Budget: ${formatCurrency(project.budget)}
                                </span>
                                ${(project.meetingDate || project.startDate || project.endDate) ? `
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    ${project.meetingDate ? `Meeting: ${new Date(project.meetingDate).toLocaleString()}` : (project.startDate && project.endDate) ? `Schedule: ${new Date(project.startDate).toLocaleDateString()} - ${new Date(project.endDate).toLocaleDateString()}` : project.startDate ? `Start: ${new Date(project.startDate).toLocaleDateString()}` : project.endDate ? `End: ${new Date(project.endDate).toLocaleDateString()}` : ''}
                                </span>
                                ` : ''}
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                                    </svg>
                                    ${project.bids?.length || 0} total bids
                                </span>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${
                                    project.status === 'open' ? 'bg-green-50 text-green-700' :
                                    project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                    project.status === 'completed' ? 'bg-gray-100 text-gray-700' :
                                    'bg-red-50 text-red-700'
                                }">${project.status.replace('_', ' ')}</span>
                            </div>

                            <div class="flex items-center gap-3">
                                ${project.owner ? `
                                    <div class="flex items-center gap-2">
                                        ${getAvatarHTML(project.owner, 'w-8 h-8')}
                                        <div class="text-sm min-w-0 flex-1">
                                            <div class="flex items-center gap-1.5">
                                                <p class="font-medium text-gray-900 truncate">${project.owner.company || `${project.owner.firstName} ${project.owner.lastName}`}</p>
                                                ${getVerificationBadge(project.owner, 'small')}
                                            </div>
                                            ${project.owner.company ? `<p class="text-gray-500 text-xs truncate">${project.owner.firstName} ${project.owner.lastName}</p>` : ''}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-4 pt-4 border-t border-gray-200">
                        <a href="/project-detail.html?id=${project._id}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Project</a>
                        ${myBid.status === 'accepted' ? `
                            <a href="/messages.html?user=${project.owner._id}&projectId=${project._id}" class="flex-1 text-center px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Go to Project Chat</a>
                        ` : `
                            <button onclick="editBid('${project._id}', '${myBid._id}')" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Edit Bid</button>
                            <button onclick="withdrawBid('${project._id}', '${myBid._id}')" class="px-4 py-2 border border-red-300 rounded-lg text-sm font-medium text-red-700 hover:bg-red-50">Withdraw</button>
                        `}
                    </div>
                </div>
            `;
            }).join('');
        }

        async function editBid(projectId, bidId) {
            try {
                const amountStr = prompt('Enter new bid amount (USD):');
                if (amountStr === null) return; // cancelled
                const amount = Number(amountStr);
                if (Number.isNaN(amount) || amount <= 0) { alert('Invalid amount'); return; }

                const timeline = prompt('Enter new timeline (e.g., 6 weeks):');
                if (timeline === null) return;

                const proposal = prompt('Update proposal notes (optional):');
                if (proposal === null) return;

                const res = await authFetch(`/api/projects/${projectId}/bids/${bidId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, timeline, proposal })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Failed to update bid'); return; }
                alert('Bid updated');
                loadMyBids();
            } catch (e) {
                console.error('Edit bid error', e);
                alert('Failed to update bid');
            }
        }

        async function withdrawBid(projectId, bidId) {
            try {
                if (!confirm('Withdraw your bid? This cannot be undone.')) return;
                const res = await authFetch(`/api/projects/${projectId}/bids/${bidId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Failed to withdraw bid'); return; }
                alert('Bid withdrawn');
                loadMyBids();
            } catch (e) {
                console.error('Withdraw bid error', e);
                alert('Failed to withdraw bid');
            }
        }

        // Load appropriate tab on page load
        if (isVendor) {
            loadMyBids();
        } else {
            loadMyProjects();
        }
        updateTabs();
    </script>
</body>
