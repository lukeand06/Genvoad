<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation (same as dashboard) -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn" class="flex items-center space-x-2">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/edit-profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Edit Profile</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Browse Projects</h1>
                <p class="text-gray-600 mt-1">Find projects that match your skills</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="search-input" placeholder="Search projects..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select id="category-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        <option value="">All Categories</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Industrial">Industrial</option>
                        <option value="Renovation">Renovation</option>
                        <option value="Landscaping">Landscaping</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="status-filter" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="filter-btn" class="w-full bg-gray-900 text-white px-4 py-2 rounded-lg font-medium hover:bg-gray-800">Apply Filters</button>
                </div>
            </div>
        </div>

        <!-- Projects Grid -->
        <div id="projects-container" class="grid grid-cols-1 gap-6">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading projects...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');

        // User menu toggle
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        let allProjects = [];

        async function loadProjects() {
            try {
                const response = await authFetch('/projects');
                const data = await response.json();
                allProjects = data.projects;
                displayProjects(allProjects);
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projects-container').innerHTML = '<div class="text-center py-12 text-red-500">Failed to load projects</div>';
            }
        }

        function displayProjects(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">No projects found</p></div>';
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-xl font-semibold text-gray-900">${project.title}</h3>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${
                                    project.status === 'open' ? 'bg-green-50 text-green-700' :
                                    project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                    project.status === 'completed' ? 'bg-gray-100 text-gray-700' :
                                    'bg-red-50 text-red-700'
                                }">${project.status.replace('_', ' ')}</span>
                            </div>
                            <p class="text-gray-600 mb-4">${project.description}</p>
                            
                            <div class="flex flex-wrap items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    ${project.location}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Budget: ${formatCurrency(project.budget)}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                    </svg>
                                    ${project.category}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                                    </svg>
                                    ${project.bids?.length || 0} bids
                                </span>
                            </div>

                            ${project.skills && project.skills.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${project.skills.map(skill => `<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">${skill}</span>`).join('')}
                                </div>
                            ` : ''}

                            <div class="flex items-center gap-3">
                                ${project.owner ? `
                                    <div class="flex items-center gap-2">
                                        ${getAvatarHTML(project.owner, 'w-8 h-8')}
                                        <div class="text-sm">
                                            <p class="font-medium text-gray-900">${project.owner.firstName} ${project.owner.lastName}</p>
                                            ${project.owner.company ? `<p class="text-gray-500">${project.owner.company}</p>` : ''}
                                        </div>
                                    </div>
                                ` : ''}
                                <span class="text-sm text-gray-500 ml-auto">${formatDate(project.createdAt)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-4 pt-4 border-t border-gray-200">
                        <a href="/project-detail.html?id=${project._id}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Details</a>
                        ${project.status === 'open' && project.owner._id !== user.id ? `
                            <a href="/project-detail.html?id=${project._id}#bid" class="flex-1 text-center px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Submit Bid</a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterProjects() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            const status = document.getElementById('status-filter').value;

            const filtered = allProjects.filter(project => {
                const matchesSearch = !search || 
                    project.title.toLowerCase().includes(search) || 
                    project.description.toLowerCase().includes(search);
                const matchesCategory = !category || project.category === category;
                const matchesStatus = !status || project.status === status;
                
                return matchesSearch && matchesCategory && matchesStatus;
            });

            displayProjects(filtered);
        }

        document.getElementById('filter-btn').addEventListener('click', filterProjects);
        document.getElementById('search-input').addEventListener('input', filterProjects);

        loadProjects();
    </script>
</body>
</html>
