<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/dashboard.html" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Cancel</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Post a New Project</h1>
            <p class="text-gray-600 mt-1">Fill in the details to find the right contractor</p>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 p-8">
            <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>
            
            <form id="project-form" class="space-y-6">
                <!-- Basic Info -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Project Title *</label>
                    <input type="text" id="title" required placeholder="e.g., Kitchen Renovation with Modern Fixtures" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                    <textarea id="description" required rows="5" placeholder="Describe your project in detail. Include goals, scope, timeline, and any specific requirements..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                        <select id="category" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                            <option value="">Select Category</option>
                            <option value="Residential">Residential</option>
                            <option value="Commercial">Commercial</option>
                            <option value="Industrial">Industrial</option>
                            <option value="Renovation">Renovation</option>
                            <option value="Landscaping">Landscaping</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="HVAC">HVAC</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Budget ($) *</label>
                        <input type="number" id="budget" required min="0" step="0.01" placeholder="10000" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location *</label>
                    <input type="text" id="location" required placeholder="City, State" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                        <input type="date" id="startDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
                        <input type="date" id="endDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <!-- Meeting Details -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Initial Meeting Date (optional)</label>
                        <input type="datetime-local" id="meetingDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Zoom Link (optional)</label>
                        <input type="url" id="zoomLink" placeholder="https://zoom.us/j/..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <!-- File Attachments -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Attach Files (optional)</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-gray-400 transition" id="file-drop-zone">
                        <input type="file" id="file-input" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.zip" class="hidden">
                        <div>
                            <svg class="mx-auto h-12 w-12 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            <p class="text-sm text-gray-600">Drag files here or <span class="text-gray-900 font-medium">click to browse</span></p>
                            <p class="text-xs text-gray-500 mt-1">PDF, Word, Excel, Images, ZIP up to 10MB each</p>
                        </div>
                    </div>
                    <div id="file-list" class="mt-4 space-y-2"></div>
                </div>

                <!-- Skills -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Required Skills</label>
                    <input type="text" id="skills" placeholder="e.g., Plumbing, Electrical, Carpentry (comma-separated)" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    <p class="mt-1 text-xs text-gray-500">Separate skills with commas</p>
                </div>

                <!-- Requirements -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Project Requirements</label>
                    <div id="requirements-container" class="space-y-2">
                        <div class="flex gap-2">
                            <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg requirement-input" placeholder="Enter a requirement">
                            <button type="button" onclick="addRequirement()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">+</button>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-6 border-t border-gray-200">
                    <a href="/dashboard.html" class="flex-1 text-center px-6 py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50">Cancel</a>
                    <button type="submit" id="submit-btn" class="flex-1 px-6 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Post Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        let selectedFiles = [];

        // File upload handling
        const fileDropZone = document.getElementById('file-drop-zone');
        const fileInput = document.getElementById('file-input');

        fileDropZone.addEventListener('click', () => fileInput.click());

        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('border-gray-900', 'bg-gray-50');
        });

        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('border-gray-900', 'bg-gray-50');
        });

        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('border-gray-900', 'bg-gray-50');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (const file of files) {
                if (file.size > 10 * 1024 * 1024) {
                    alert(`File ${file.name} is too large (max 10MB)`);
                    continue;
                }
                if (!['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/vnd.ms-excel', 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'image/jpeg', 'image/png', 'application/zip'].includes(file.type) && !file.name.match(/\.(pdf|doc|docx|xls|xlsx|jpg|jpeg|png|zip)$/i)) {
                    alert(`File type not supported: ${file.name}`);
                    continue;
                }
                selectedFiles.push(file);
            }
            displayFiles();
        }

        function displayFiles() {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = selectedFiles.map((file, idx) => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <span class="text-sm text-gray-700">📎 ${file.name}</span>
                    <button type="button" onclick="removeFile(${idx})" class="text-red-600 hover:text-red-700 text-sm font-medium">Remove</button>
                </div>
            `).join('');
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            displayFiles();
        }

        function addRequirement() {
            const container = document.getElementById('requirements-container');
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `
                <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg requirement-input" placeholder="Enter a requirement">
                <button type="button" onclick="this.parentElement.remove()" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200">−</button>
            `;
            container.appendChild(div);
        }

        document.getElementById('project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const category = document.getElementById('category').value;
            const budget = document.getElementById('budget').value;
            const location = document.getElementById('location').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const skillsInput = document.getElementById('skills').value;
            const meetingDate = document.getElementById('meetingDate').value;
            const zoomLink = document.getElementById('zoomLink').value;
            
            const skills = skillsInput ? skillsInput.split(',').map(s => s.trim()).filter(s => s) : [];
            
            const requirementInputs = document.querySelectorAll('.requirement-input');
            const requirements = Array.from(requirementInputs)
                .map(input => input.value.trim())
                .filter(val => val);
            
            const projectData = {
                title,
                description,
                category,
                budget: parseFloat(budget),
                location,
                skills,
                requirements,
                meetingDate: meetingDate || null,
                zoomLink: zoomLink || null
            };
            
            if (startDate) projectData.startDate = startDate;
            if (endDate) projectData.endDate = endDate;
            
            // If there are files, use FormData for multipart upload
            if (selectedFiles.length > 0) {
                const formData = new FormData();
                for (const [key, value] of Object.entries(projectData)) {
                    if (Array.isArray(value)) {
                        value.forEach((item, idx) => formData.append(`${key}[${idx}]`, item));
                    } else {
                        formData.append(key, value);
                    }
                }
                selectedFiles.forEach((file, idx) => {
                    formData.append(`attachments`, file);
                });
                submitProjectWithFiles(formData);
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            
            try {
                const response = await authFetch('/projects', {
                    method: 'POST',
                    body: JSON.stringify(projectData)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create project');
                }
                
                window.location.href = `/project-detail.html?id=${data.project._id}`;
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Post Project';
            }
        });

        async function submitProjectWithFiles(formData) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                const token = getToken();
                const response = await fetch(`${API_URL}/projects`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create project');
                }

                window.location.href = `/project-detail.html?id=${data.project._id}`;
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Post Project';
            }
        }
    </script>
</body>
</html>
