<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genovad Communities</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="h-16 flex items-center justify-between">
        <a href="/dashboard.html" class="flex items-center gap-3">
          <img src="/public/logo-icon.png" alt="Genovad" class="h-10 w-auto" />
          <span class="text-sm text-gray-500 hidden sm:inline">Main Platform</span>
        </a>
        <div class="flex items-center gap-2">
          <a href="/dashboard.html" class="px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg">Back to Explore</a>
          <a href="/community-hub.html" class="px-3 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-800">Open Communities</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <section class="bg-white border border-gray-200 rounded-2xl p-8">
      <p class="text-xs uppercase tracking-wide text-gray-500">Exclusive Subsection</p>
      <h1 class="mt-2 text-3xl font-bold text-gray-900">Genovad Communities</h1>
      <p class="mt-3 text-gray-600">
        Communities is a dedicated collaboration area for invite-based groups, member-only activity, and shared internal coordination.
      </p>
      <div class="mt-6 flex flex-wrap gap-3">
        <a href="/community-hub.html" class="px-5 py-2.5 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Enter Communities</a>
        <a href="/create-community.html" class="px-5 py-2.5 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50">Create Community</a>
      </div>
    </section>
  </main>

  <script src="/public/js/auth.js"></script>
  <script>
    setActivePlatform('communities');

    if (isAuthenticated()) {
      const user = getCurrentUser();

      if (!user?.onboardingCompleted) {
        window.location.href = '/onboarding-profile.html';
      } else {
        window.location.href = '/community-hub.html';
      }
    }
  </script>
</body>
</html>
