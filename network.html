<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People - Genovad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-6">
          <a href="/community-hub.html" class="inline-flex items-center text-gray-600 hover:text-gray-900" title="Back to Community Home">
            <span class="text-xl leading-none">←</span>
          </a>
          <a href="/dashboard.html" class="flex items-center">
            <img src="/public/logo-icon.png" alt="Genovad" class="h-10 w-auto" />
          </a>
          <div class="hidden md:flex gap-1">
            <a href="/company.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">Community</a>
            <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">Feed</a>
            <a href="/network.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">People</a>
            <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">Messages</a>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <a href="/settings.html" class="px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">Settings</a>
          <button id="logout-btn" class="px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg">Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
    <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded"></div>

    <section class="bg-white border border-gray-200 rounded-xl p-6">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">People</h1>
          <p id="people-subtitle" class="text-sm text-gray-600 mt-1">Members in your active community.</p>
        </div>
        <div class="flex gap-2">
          <input id="people-search" type="text" placeholder="Filter by name/company" class="px-3 py-2 border border-gray-300 rounded-lg text-sm" />
          <select id="people-role-filter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="all">All roles</option>
            <option value="owner">Owners</option>
            <option value="vendor">Vendors</option>
          </select>
        </div>
      </div>
      <div id="people-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <p class="text-gray-500">Loading members...</p>
      </div>
    </section>
  </main>

  <script src="/public/js/auth.js"></script>
  <script>
    if (!requireAuth()) {
      throw new Error('Not authenticated');
    }

    if (!requireCommunityMembership('/community-hub.html')) {
      throw new Error('Community membership required');
    }

    const state = {
      activeCommunityId: getPrimaryCommunityId(),
      members: []
    };

    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('people-search').addEventListener('input', renderMembers);
    document.getElementById('people-role-filter').addEventListener('change', renderMembers);

    async function loadPeoplePage() {
      if (!state.activeCommunityId) {
        window.location.href = '/community-hub.html?join-required=true';
        return;
      }

      await loadMembers(state.activeCommunityId);
    }

    async function loadMembers(companyId) {
      try {
        const res = await authFetch(`/api/companies/${companyId}/members`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load members');

        state.members = data.members || [];
        renderMembers();
      } catch (error) {
        showError(error.message || 'Failed to load members');
      }
    }

    function renderMembers() {
      const search = document.getElementById('people-search').value.trim().toLowerCase();
      const role = document.getElementById('people-role-filter').value;
      const host = document.getElementById('people-list');

      let list = [...state.members];

      if (role !== 'all') {
        list = list.filter(member => (member.role || '').toLowerCase() === role);
      }

      if (search) {
        list = list.filter(member => {
          const fullName = `${member.firstName || ''} ${member.lastName || ''}`.toLowerCase();
          const company = (member.company || '').toLowerCase();
          return fullName.includes(search) || company.includes(search);
        });
      }

      if (!list.length) {
        host.innerHTML = '<p class="text-gray-500">No members match your filters.</p>';
        return;
      }

      host.innerHTML = list.map(member => `
        <article class="border border-gray-200 rounded-lg p-4 bg-white">
          <div class="flex items-center gap-3">
            <div>${getAvatarHTML(member, 'w-10 h-10')}</div>
            <div>
              <h3 class="font-semibold text-gray-900">${member.firstName || ''} ${member.lastName || ''}</h3>
              <p class="text-sm text-gray-600">${member.company || 'No company set'}</p>
            </div>
          </div>
          <div class="mt-3 text-xs text-gray-500 flex gap-2">
            <span class="px-2 py-1 bg-gray-100 rounded-full">${(member.role || 'member').toUpperCase()}</span>
            <span class="px-2 py-1 bg-gray-100 rounded-full">${member.companyRole || 'member'}</span>
          </div>
        </article>
      `).join('');
    }

    loadPeoplePage();
  </script>
</body>
</html>
