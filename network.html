<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People - Genovad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }

    .mobile-bottom-nav .bottom-nav-link {
      min-height: 0 !important;
      display: block !important;
      white-space: nowrap;
    }

    .mobile-bottom-nav .bottom-nav-row {
      display: flex !important;
      flex-direction: row !important;
      align-items: center;
      justify-content: space-between;
    }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-8">
          <a href="/dashboard.html" class="flex items-center">
            <img src="/public/logo-icon.png?v=2" alt="Genovad" class="h-12 w-auto" onerror="console.error('Logo failed to load:', this.src)">
          </a>
          <div class="hidden md:flex space-x-1">
            <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Feed</a>
            <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Companies</a>
            <a href="/network.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">People</a>
            <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
            <a href="/communities.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Communities</a>
          </div>
        </div>

        <div class="flex items-center space-x-4">
          <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
          </a>
          <a href="/browse.html" id="cta-button" class="inline-flex items-center bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Browse Companies</a>
          <div class="relative" id="user-menu">
            <button id="user-menu-btn" class="flex items-center space-x-2">
              <div id="user-avatar"></div>
            </button>
            <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
              <div class="px-4 py-3 border-b border-gray-100">
                <p class="text-xs text-gray-500 uppercase tracking-wide">Current Role</p>
                <p class="text-sm font-semibold text-gray-900 capitalize mt-1" id="current-role">Owner</p>
              </div>
              <div id="role-switcher" class="px-2 py-2 border-b border-gray-100"></div>
              <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
              <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
              <button id="feedback-btn" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Send Feedback</button>
              <hr class="my-1">
              <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8 space-y-6">
    <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded"></div>

    <section class="bg-white border border-gray-200 rounded-xl p-6">
      <div class="max-w-6xl mx-auto mb-6">
        <div class="text-center">
          <h1 class="text-3xl font-bold text-gray-900">Finding People</h1>
          <p class="text-sm text-gray-600 mt-1">Discover owners and vendors across Genovad.</p>
        </div>

        <div class="mt-4 rounded-xl border border-gray-200 bg-gray-50 p-4">
          <div class="flex items-center justify-between gap-3">
            <p class="text-xs font-medium uppercase tracking-wide text-gray-600">People Filters</p>
          </div>

          <div class="mt-3 space-y-3">
            <input id="people-search" type="text" placeholder="Search name, company, title, bio, skills, services, location" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white" />

            <div class="flex flex-wrap items-center justify-between gap-3">
              <div id="people-role-pills" class="inline-flex rounded-lg border border-gray-300 bg-white p-1">
                <button type="button" class="role-pill px-3 py-1.5 text-xs font-medium rounded-md bg-gray-900 text-white" data-role="all">All</button>
                <button type="button" class="role-pill px-3 py-1.5 text-xs font-medium rounded-md text-gray-700 hover:bg-gray-100" data-role="owner">Owners</button>
                <button type="button" class="role-pill px-3 py-1.5 text-xs font-medium rounded-md text-gray-700 hover:bg-gray-100" data-role="vendor">Vendors</button>
              </div>
              <button id="people-clear-filters" class="px-3 py-1.5 text-xs font-medium text-gray-700 border border-gray-300 rounded-lg bg-white hover:bg-gray-100">Clear filters</button>
            </div>

            <input id="people-skill-filter" type="text" placeholder="Skill or service keyword" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white" />
          </div>

          <p id="people-results-summary" class="text-xs text-gray-600 mt-3 text-center">Loading people...</p>
        </div>
      </div>

      <div id="people-list" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <p class="text-gray-500">Loading people...</p>
      </div>
    </section>
  </main>

  <div id="person-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-gray-200 flex items-center justify-between">
        <h2 class="text-xl font-semibold text-gray-900">Person Profile</h2>
        <button id="close-person-modal" class="text-gray-500 hover:text-gray-700">✕</button>
      </div>
      <div id="person-modal-content" class="p-6"></div>
    </div>
  </div>

  <div class="mobile-bottom-nav md:hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-1.5rem)] max-w-md">
    <div class="bg-white border border-gray-200 shadow-lg rounded-2xl px-2 py-1.5">
      <div class="bottom-nav-row gap-1 text-center text-xs font-medium">
        <a href="/dashboard.html" class="bottom-nav-link flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Feed</a>
        <a href="/browse.html" class="bottom-nav-link flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Companies</a>
        <a href="/network.html" class="bottom-nav-link flex-1 px-2 py-2 rounded-xl bg-gray-900 text-white">People</a>
        <a href="/messages.html" class="bottom-nav-link flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Messages</a>
      </div>
    </div>
  </div>

  <script src="/public/js/auth.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    const user = getCurrentUser();
    document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
    const currentRole = getUserRole();
    const currentRoleEl = document.getElementById('current-role');
    if (currentRoleEl) currentRoleEl.textContent = currentRole;
    const roleSwitcher = document.getElementById('role-switcher');
    if (roleSwitcher) {
      roleSwitcher.innerHTML = `<div class="px-3 py-2 text-sm text-gray-700">Account Type: <span class="font-semibold capitalize">${currentRole}</span></div>`;
    }

    const state = {
      users: [],
      filtered: [],
      role: 'all'
    };

    const esc = (v) => String(v || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('user-menu-btn').addEventListener('click', () => {
      document.getElementById('user-dropdown').classList.toggle('hidden');
    });

    document.getElementById('people-search').addEventListener('input', renderPeople);
    document.getElementById('people-skill-filter').addEventListener('input', renderPeople);
    document.getElementById('people-clear-filters').addEventListener('click', clearFilters);

    document.querySelectorAll('.role-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        state.role = btn.dataset.role || 'all';
        document.querySelectorAll('.role-pill').forEach(p => {
          const active = p.dataset.role === state.role;
          p.classList.toggle('bg-gray-900', active);
          p.classList.toggle('text-white', active);
          p.classList.toggle('text-gray-700', !active);
          p.classList.toggle('hover:bg-gray-100', !active);
        });
        renderPeople();
      });
    });

    document.getElementById('close-person-modal').addEventListener('click', () => {
      document.getElementById('person-modal').classList.add('hidden');
    });

    document.getElementById('person-modal').addEventListener('click', (e) => {
      if (e.target.id === 'person-modal') document.getElementById('person-modal').classList.add('hidden');
    });

    function clearFilters() {
      document.getElementById('people-search').value = '';
      document.getElementById('people-skill-filter').value = '';
      state.role = 'all';
      document.querySelectorAll('.role-pill').forEach(p => {
        const active = p.dataset.role === 'all';
        p.classList.toggle('bg-gray-900', active);
        p.classList.toggle('text-white', active);
        p.classList.toggle('text-gray-700', !active);
        p.classList.toggle('hover:bg-gray-100', !active);
      });
      renderPeople();
    }

    function getRoleBadge(member) {
      const role = (member.role || 'member').toLowerCase();
      if (role === 'owner') return { text: 'OWNER', cls: 'bg-amber-100 text-amber-700' };
      if (role === 'vendor') return { text: 'VENDOR', cls: 'bg-emerald-100 text-emerald-700' };
      return { text: role.toUpperCase(), cls: 'bg-gray-100 text-gray-700' };
    }

    function renderPeople() {
      const search = document.getElementById('people-search').value.trim().toLowerCase();
      const skillKeyword = document.getElementById('people-skill-filter').value.trim().toLowerCase();
      const host = document.getElementById('people-list');
      const summary = document.getElementById('people-results-summary');

      let list = [...state.users];

      if (state.role !== 'all') {
        list = list.filter(member => (member.role || '').toLowerCase() === state.role);
      }

      if (skillKeyword) {
        list = list.filter(member => {
          const searchable = [
            ...(member.skills || []),
            ...(member.services || []),
            member.title,
            member.bio
          ].filter(Boolean).join(' ').toLowerCase();
          return searchable.includes(skillKeyword);
        });
      }

      if (search) {
        const terms = search.split(/\s+/).filter(Boolean);
        list = list.filter(member => {
          const fullName = `${member.firstName || ''} ${member.lastName || ''}`;
          const location = member.location || [member.city, member.state].filter(Boolean).join(', ');
          const haystack = [
            fullName,
            member.email,
            member.company,
            member.title,
            member.bio,
            location,
            member.role,
            ...(member.skills || []),
            ...(member.services || [])
          ].filter(Boolean).join(' ').toLowerCase();
          return terms.every(term => haystack.includes(term));
        });
      }

      state.filtered = list;
      if (summary) summary.textContent = `${list.length} of ${state.users.length} people shown`;

      if (!list.length) {
        host.innerHTML = '<p class="text-gray-500">No people match your filters.</p>';
        return;
      }

      host.innerHTML = list.map((member, idx) => {
        const skills = (member.skills || []).slice(0, 3);
        const location = member.location || [member.city, member.state].filter(Boolean).join(', ') || 'Location not set';
        const roleBadge = getRoleBadge(member);
        const rating = Number(member.rating || 0);

        return `
          <article class="border border-gray-200 rounded-xl p-4 bg-white hover:shadow-md transition cursor-pointer" data-person-idx="${idx}">
            <div class="flex items-start gap-3">
              <div>${getAvatarHTML(member, 'w-12 h-12')}</div>
              <div class="min-w-0 flex-1">
                <h3 class="font-semibold text-gray-900 truncate">${esc(member.firstName)} ${esc(member.lastName)}</h3>
                <p class="text-sm text-gray-600 truncate">${esc(member.title || member.company || 'Genovad member')}</p>
                <p class="text-xs text-gray-500 truncate mt-0.5">${esc(location)}</p>
              </div>
            </div>
            <p class="text-sm text-gray-700 mt-3 line-clamp-2">${esc(member.bio || 'No bio added yet.')}</p>
            <div class="mt-3 text-xs text-gray-500 flex flex-wrap gap-2">
              <span class="px-2 py-1 rounded-full ${roleBadge.cls}">${esc(roleBadge.text)}</span>
              ${member.yearsExperience ? `<span class="px-2 py-1 bg-gray-100 rounded-full">${esc(member.yearsExperience)} yrs exp</span>` : ''}
              ${(rating > 0) ? `<span class="px-2 py-1 bg-gray-100 rounded-full">⭐ ${rating.toFixed(1)}</span>` : ''}
            </div>
            <div class="mt-3 flex flex-wrap gap-2">
              ${skills.map(s => `<span class="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full">${esc(s)}</span>`).join('')}
            </div>
          </article>
        `;
      }).join('');

      host.querySelectorAll('[data-person-idx]').forEach(el => {
        el.addEventListener('click', () => {
          const member = state.filtered[Number(el.dataset.personIdx)];
          openPersonModal(member);
        });
      });
    }

    function linkHtml(label, url) {
      if (!url) return '';
      const href = url.startsWith('http') ? url : `https://${url}`;
      return `<a href="${esc(href)}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">${esc(label)}</a>`;
    }

    function openPersonModal(member) {
      const content = document.getElementById('person-modal-content');
      const fullName = `${member.firstName || ''} ${member.lastName || ''}`.trim();
      const location = member.location || [member.city, member.state].filter(Boolean).join(', ') || 'Not provided';
      const roleBadge = getRoleBadge(member);
      const profileId = member?._id || member?.id || '';
      const profileUrl = profileId ? `/profile.html?id=${profileId}` : '/profile.html';

      content.innerHTML = `
        <div class="flex items-start justify-between gap-4 mb-6">
          <div class="flex items-start gap-4 min-w-0">
            <div>${getAvatarHTML(member, 'w-16 h-16')}</div>
            <div class="min-w-0">
              <h3 class="text-2xl font-bold text-gray-900">${esc(fullName)}</h3>
              <p class="text-gray-600">${esc(member.title || 'Genovad member')}</p>
              <div class="mt-2 flex gap-2 text-xs flex-wrap">
                <span class="px-2 py-1 rounded-full ${roleBadge.cls}">${esc(roleBadge.text)}</span>
              </div>
            </div>
          </div>
          <a href="${profileUrl}" class="inline-flex shrink-0 px-3 py-2 text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800">Go to Profile</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-6">
          <div class="border border-gray-200 rounded-lg p-4">
            <p class="text-gray-500 mb-1">Company</p>
            <p class="text-gray-900">${esc(member.company || 'Not set')}</p>
          </div>
          <div class="border border-gray-200 rounded-lg p-4">
            <p class="text-gray-500 mb-1">Location</p>
            <p class="text-gray-900">${esc(location)}</p>
          </div>
          <div class="border border-gray-200 rounded-lg p-4">
            <p class="text-gray-500 mb-1">Experience</p>
            <p class="text-gray-900">${member.yearsExperience ? `${esc(member.yearsExperience)} years` : 'Not provided'}</p>
          </div>
          <div class="border border-gray-200 rounded-lg p-4">
            <p class="text-gray-500 mb-1">Stats</p>
            <p class="text-gray-900">${esc(member.projectsCompleted || 0)} projects • ${esc(member.reviewCount || 0)} reviews • ⭐ ${esc((Number(member.rating || 0)).toFixed(1))}</p>
          </div>
        </div>

        <div class="mb-6">
          <h4 class="font-semibold text-gray-900 mb-2">Bio</h4>
          <p class="text-gray-700">${esc(member.bio || 'No bio provided.')}</p>
        </div>

        <div class="mb-6">
          <h4 class="font-semibold text-gray-900 mb-2">Skills</h4>
          <div class="flex flex-wrap gap-2">
            ${(member.skills || []).length ? (member.skills || []).map(s => `<span class="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-full">${esc(s)}</span>`).join('') : '<p class="text-gray-500 text-sm">No skills listed.</p>'}
          </div>
        </div>

        <div class="mb-6">
          <h4 class="font-semibold text-gray-900 mb-2">Services</h4>
          <div class="flex flex-wrap gap-2">
            ${(member.services || []).length ? (member.services || []).map(s => `<span class="text-xs px-2 py-1 bg-green-50 text-green-700 rounded-full">${esc(s)}</span>`).join('') : '<p class="text-gray-500 text-sm">No services listed.</p>'}
          </div>
        </div>

        <div>
          <h4 class="font-semibold text-gray-900 mb-2">Links</h4>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
            ${linkHtml('Website', member.links?.website) || '<span class="text-gray-500">Website: not provided</span>'}
            ${linkHtml('LinkedIn', member.links?.linkedin) || '<span class="text-gray-500">LinkedIn: not provided</span>'}
            ${linkHtml('GitHub', member.links?.github) || '<span class="text-gray-500">GitHub: not provided</span>'}
            ${linkHtml('Instagram', member.links?.instagram) || '<span class="text-gray-500">Instagram: not provided</span>'}
          </div>
        </div>
      `;

      document.getElementById('person-modal').classList.remove('hidden');
    }

    async function loadPeoplePage() {
      try {
        const res = await authFetch('/api/users');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load people');

        const userId = (getCurrentUser()?._id || getCurrentUser()?.id || '').toString();
        state.users = (data.users || []).filter(u => (u._id || '').toString() !== userId);
        renderPeople();
      } catch (error) {
        const msg = document.getElementById('error-message');
        msg.textContent = error.message || 'Failed to load people';
        msg.classList.remove('hidden');
      }
    }

    loadPeoplePage();
  </script>
</body>
</html>
