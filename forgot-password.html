<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/public/css/mobile-optimizations.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/public/logo-icon.png">
    <link rel="apple-touch-icon" href="/public/logo-icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <!-- Logo -->
            <div class="text-center mb-12">
                <a href="index.html" class="inline-flex items-center">
                    <img src="/public/logo-wordmark.png" alt="Genovad" class="h-32 w-auto">
                </a>
                <h2 class="mt-8 text-3xl font-bold text-gray-900">Forgot Password?</h2>
                <p class="mt-2 text-sm text-gray-600">Enter your email and we'll send you a reset link</p>
            </div>

            <!-- Forgot Password Form -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded"></div>
                <div id="success-message" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-2 rounded"></div>

                <form id="forgot-password-form" class="space-y-6">
                    <!-- Role Selection -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Account Type</label>
                        <select id="role" name="role" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                            <option value="">Select account type</option>
                            <option value="owner">Project Owner</option>
                            <option value="vendor">Service Provider</option>
                        </select>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                            placeholder="you@example.com">
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submit-btn"
                        class="w-full bg-gray-900 text-white py-3 px-4 rounded-lg font-semibold hover:bg-gray-800 transition">
                        Send Reset Link
                    </button>
                </form>

                <!-- Back to Login -->
                <div class="mt-6 text-center">
                    <a href="/login.html" class="text-sm text-gray-600 hover:text-gray-900">
                        ← Back to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgot-password-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;

            if (!email || !role) {
                showError('Please fill in all fields');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            hideMessages();

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, role })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('If an account exists with that email, a password reset link has been sent. Please check your inbox.');
                    form.reset();
                } else {
                    showError(data.error || 'Failed to send reset link');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
        }

        function hideMessages() {
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
        }
    </script>
</body>
</html>
