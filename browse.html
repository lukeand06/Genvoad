<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg mr-2">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" id="nav-cta-button" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-40 md:hidden">
        <div class="fixed inset-0 bg-black bg-opacity-50" id="mobile-menu-backdrop"></div>
        <div class="fixed top-0 left-0 w-64 h-full bg-white shadow-lg overflow-y-auto">
            <div class="p-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Menu</h3>
            </div>
            <nav class="p-4 space-y-2">
                <a href="/dashboard.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                <a href="/projects.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                <a href="/messages.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                <a href="/browse.html" class="block px-4 py-3 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg hover:bg-gray-100">Browse</a>
                <a href="/notifications.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Notifications</a>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <a href="/create-project.html" class="block w-full px-4 py-3 text-center text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800">Post Project</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Browse</h1>
            <p class="text-gray-600 mt-2" id="browse-subtitle">See your partners, their projects, and discover new service providers</p>
        </div>


        <!-- Search Bar -->
        <div class="bg-white rounded-lg border border-gray-200 p-4 mb-8">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="search-input" placeholder="Search by name, skills, or company..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                <button id="toggle-filters-btn" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 flex items-center justify-center gap-2 whitespace-nowrap">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                    </svg>
                    Filters
                </button>
                <button id="search-btn" class="px-6 py-2 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800 whitespace-nowrap">Search</button>
            </div>

            <!-- Expandable Filter Panel -->
            <div id="filter-panel" class="hidden border-t border-gray-200 pt-4 mt-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                    <!-- Account Type Filter -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase">Account Type</label>
                        <select id="filter-role" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent text-sm">
                            <option value="">All Types</option>
                            <option value="owner">Project Owners</option>
                            <option value="vendor">Service Providers</option>
                        </select>
                    </div>

                    <!-- Location Filter -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase">Location</label>
                        <input type="text" id="filter-location" placeholder="City or State" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent text-sm">
                    </div>

                    <!-- Min. Experience Filter -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase">Experience</label>
                        <select id="filter-experience" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent text-sm">
                            <option value="">Any</option>
                            <option value="1">1+ years</option>
                            <option value="3">3+ years</option>
                            <option value="5">5+ years</option>
                            <option value="10">10+ years</option>
                        </select>
                    </div>

                    <!-- Rating Filter -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase">Rating</label>
                        <select id="filter-rating" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent text-sm">
                            <option value="">Any</option>
                            <option value="4">4+ stars</option>
                            <option value="4.5">4.5+ stars</option>
                            <option value="5">5 stars</option>
                        </select>
                    </div>

                    <!-- Verified Filter -->
                    <div class="flex items-end">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="verified-only" class="w-4 h-4 text-gray-900 border-gray-300 rounded focus:ring-gray-900">
                            <span class="text-sm font-medium text-gray-700">Verified Only</span>
                        </label>
                    </div>
                </div>
                <div class="mt-3 flex justify-end">
                    <button id="clear-filters-btn" class="text-sm font-medium text-gray-600 hover:text-gray-900">Clear All</button>
                </div>
            </div>
        </div>

        <!-- Discovery Sections -->
        <div id="network-content" class="space-y-10">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading recommendations...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        // Role-based subtitle and nav
        const isVendor = user.role === 'vendor';
        const subtitle = document.getElementById('browse-subtitle');
        const navCta = document.getElementById('nav-cta-button');
        
        if (isVendor) {
            subtitle.textContent = 'Discover project owners, expand your network, and explore new opportunities';
            if (navCta) {
                navCta.textContent = 'Find Work';
                navCta.href = '/browse.html';
            }
        } else {
            subtitle.textContent = 'Discover talented professionals, vendors, and experts to grow your network';
        }
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Mobile Menu Handler
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuBackdrop = document.getElementById('mobile-menu-backdrop');
        const mobileMenuLinks = mobileMenu.querySelectorAll('a');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
        
        mobileMenuBackdrop.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
        });
        
        mobileMenuLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
            });
        });

        let discoveryData = {};
        let allBrowse = [];

        async function loadDiscovery() {
            try {
                const search = (document.getElementById('search-input').value || '').trim();
                const role = document.getElementById('filter-role').value || '';
                const location = (document.getElementById('filter-location').value || '').trim();
                const minExperience = document.getElementById('filter-experience').value || '';
                const minRating = document.getElementById('filter-rating').value || '';
                const verified = document.getElementById('verified-only').checked ? 'true' : '';

                // Build query string
                const params = new URLSearchParams();
                if (search) params.append('search', search);
                if (role) params.append('role', role);
                if (location) params.append('location', location);
                if (minExperience) params.append('minExperience', minExperience);
                if (minRating) params.append('minRating', minRating);
                if (verified) params.append('verified', verified);

                const url = `/api/discovery${params.toString() ? '?' + params.toString() : ''}`;
                const res = await authFetch(url);
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Failed to load recommendations');
                }

                discoveryData = await res.json();
                allBrowse = discoveryData.browse || [];
                displayDiscovery();
            } catch (error) {
                console.error('Error loading discovery:', error);
                document.getElementById('network-content').innerHTML = `
                    <div class="col-span-full text-center py-12 text-red-500">
                        <p>${error.message || 'Failed to load recommendations'}</p>
                    </div>
                `;
            }
        }

        function renderPersonCard(person) {
            const locationLabel = [person.city, person.state].filter(Boolean).join(', ') || person.location || '';
            const skillsHTML = person.skills && person.skills.length > 0 ? `
                <div class="flex flex-wrap gap-1.5 mb-3">
                    ${person.skills.slice(0, 3).map(skill => `<span class="px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded-full font-medium">${skill}</span>`).join('')}
                    ${person.skills.length > 3 ? `<span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-full">+${person.skills.length - 3}</span>` : ''}
                </div>
            ` : '';

            const ratingHTML = (person.rating || person.reviewCount) ? `
                <div class="flex items-center gap-1.5 mb-2">
                    <div class="flex items-center">
                        ${[...Array(5)].map((_, i) => `
                            <svg class="w-3.5 h-3.5 ${i < Math.floor(person.rating || 0) ? 'text-yellow-400' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                            </svg>
                        `).join('')}
                    </div>
                    <span class="text-sm font-semibold text-gray-900">${(person.rating || 0).toFixed(1)}</span>
                    <span class="text-xs text-gray-600">(${person.reviewCount || 0})</span>
                </div>
            ` : '';

            const reasonHTML = person.reason ? `<p class="text-xs text-blue-600 font-medium mb-2">✓ ${person.reason}</p>` : '';

            return `
                <div class="bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md transition-shadow flex flex-col h-full">
                    <div class="flex items-start gap-3 mb-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-semibold text-gray-900 truncate">${person.company || `${person.firstName} ${person.lastName}`}</h3>
                                ${getVerificationBadge(person, 'small')}
                            </div>
                            ${person.company ? `<p class="text-sm text-gray-600 truncate">${person.firstName} ${person.lastName}</p>` : (person.title ? `<p class="text-sm text-gray-600 truncate">${person.title}</p>` : '')}
                        </div>
                        <div class="flex-shrink-0">
                            ${getAvatarHTML(person, 'w-10 h-10')}
                        </div>
                    </div>

                    ${reasonHTML}
                    ${ratingHTML}
                    
                    ${person.bio ? `<p class="text-sm text-gray-600 mb-3 line-clamp-2">${person.bio}</p>` : ''}

                    ${locationLabel ? `
                        <p class="text-xs text-gray-500 flex items-center gap-1.5 mb-3">
                            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            </svg>
                            ${locationLabel}
                        </p>
                    ` : ''}

                    ${person.yearsExperience ? `
                        <p class="text-xs text-gray-600 mb-3"><span class="font-medium">${person.yearsExperience}+</span> years experience</p>
                    ` : ''}
                    
                    ${skillsHTML}
                    
                    <div class="flex gap-2 pt-3 border-t border-gray-200 mt-auto">
                        <a href="/profile.html?id=${person._id}" class="flex-1 text-center px-3 py-2 border border-gray-300 rounded-lg text-xs font-medium text-gray-700 hover:bg-gray-50 transition">View Profile</a>
                        <a href="/messages.html?user=${person._id}" class="flex-1 text-center px-3 py-2 bg-gray-900 text-white rounded-lg text-xs font-medium hover:bg-gray-800 transition">Contact</a>
                    </div>
                </div>
            `;
        }

        function displayDiscovery() {
            const container = document.getElementById('network-content');
            let html = '';

            // Top Picks Section
            if (discoveryData.topPicks && discoveryData.topPicks.length > 0) {
                html += `
                    <div>
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                <svg class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                                </svg>
                                Top Matches
                            </h2>
                            <p class="text-gray-600 text-sm mt-1">Highly recommended based on your profile and activity</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${discoveryData.topPicks.map(p => renderPersonCard(p)).join('')}
                        </div>
                    </div>
                `;
            }

            // People You Might Know Section
            if (discoveryData.mightKnow && discoveryData.mightKnow.length > 0) {
                html += `
                    <div>
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                <svg class="w-6 h-6 text-blue-500" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                                </svg>
                                People You Might Know
                            </h2>
                            <p class="text-gray-600 text-sm mt-1">Based on location, skills, and mutual interests</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${discoveryData.mightKnow.map(p => renderPersonCard(p)).join('')}
                        </div>
                    </div>
                `;
            }

            // Recently Active Section
            if (discoveryData.activeToday && discoveryData.activeToday.length > 0) {
                html += `
                    <div>
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                <svg class="w-6 h-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1m2 1v2.5M2 7l2 1m-2-1l2-1m2 1v2.5"/>
                                </svg>
                                Recently Active
                            </h2>
                            <p class="text-gray-600 text-sm mt-1">People who've been active recently</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${discoveryData.activeToday.map(p => renderPersonCard(p)).join('')}
                        </div>
                    </div>
                `;
            }

            // Browse All Section
            if (allBrowse.length > 0) {
                html += `
                    <div>
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                <svg class="w-6 h-6 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                                </svg>
                                Browse All
                            </h2>
                            <p class="text-gray-600 text-sm mt-1">All professionals matching your criteria</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${allBrowse.map(p => renderPersonCard(p)).join('')}
                        </div>
                    </div>
                `;
            }

            if (!html) {
                html = `
                    <div class="col-span-full text-center py-16">
                        <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <p class="text-gray-500 text-lg">No one found matching your criteria</p>
                        <p class="text-gray-400 text-sm mt-2">Try adjusting your filters or search terms</p>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Filter and search handlers
        document.getElementById('search-btn').addEventListener('click', loadDiscovery);
        
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadDiscovery();
            }
        });

        document.getElementById('toggle-filters-btn').addEventListener('click', () => {
            document.getElementById('filter-panel').classList.toggle('hidden');
        });

        document.getElementById('clear-filters-btn').addEventListener('click', () => {
            document.getElementById('filter-role').value = '';
            document.getElementById('filter-location').value = '';
            document.getElementById('filter-experience').value = '';
            document.getElementById('filter-rating').value = '';
            document.getElementById('verified-only').checked = false;
            loadDiscovery();
        });

        // Apply filters on change
        ['filter-role', 'filter-experience', 'filter-rating'].forEach(id => {
            document.getElementById(id).addEventListener('change', loadDiscovery);
        });

        document.getElementById('verified-only').addEventListener('change', loadDiscovery);

        // Debounced location and search filters
        let filterTimeout;
        ['filter-location', 'search-input'].forEach(id => {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('input', () => {
                    clearTimeout(filterTimeout);
                    filterTimeout = setTimeout(loadDiscovery, 500);
                });
            }
        });

        // Initial load
        loadDiscovery();
    </script>
</body>
</html>
