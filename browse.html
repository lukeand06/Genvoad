<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Professionals - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Browse Professionals</h1>
            <p class="text-gray-600 mt-1">Find skilled contractors and service providers</p>
        </div>

        <!-- Search & Filters -->
        <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="search-input" placeholder="Search by name, company, or location..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Skills</label>
                    <input type="text" id="skills-filter" placeholder="e.g., Plumbing, Electrical" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">City / Area</label>
                    <input type="text" id="city-filter" placeholder="e.g., Miami, FL" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>
                <div class="flex items-end justify-between gap-2">
                    <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                        <input type="checkbox" id="registered-filter" class="h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900">
                        Registered vendors only
                    </label>
                    <button id="search-btn" class="bg-gray-900 text-white px-4 py-2 rounded-lg font-medium hover:bg-gray-800">Search</button>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="users-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">
                <p class="text-gray-500">Loading professionals...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const currentUser = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        let allUsers = [];
        let partnerIds = new Set();

        async function loadPartners() {
            try {
                const res = await authFetch('/api/partners');
                if (!res.ok) {
                    const ct = res.headers.get('content-type') || '';
                    const err = ct.includes('application/json') ? await res.json() : null;
                    throw new Error((err && (err.error || err.message)) || `Failed to load partners (HTTP ${res.status})`);
                }
                const data = await res.json();
                partnerIds = new Set((data.partners || []).map(p => p._id));
            } catch (e) {
                console.error('Failed to load partners', e);
                document.getElementById('partners-list').innerHTML = '<p class="text-xs text-red-500">Failed to load partners</p>';
            }
        }

        async function loadUsers(params = {}) {
            try {
                const queryString = new URLSearchParams(params).toString();
                const response = await authFetch(`/api/users?${queryString}`);
                if (!response.ok) {
                    const ct = response.headers.get('content-type') || '';
                    const err = ct.includes('application/json') ? await response.json() : null;
                    throw new Error((err && (err.error || err.message)) || `Failed to load professionals (HTTP ${response.status})`);
                }
                const data = await response.json();
                allUsers = (data.users || []).filter(u => u._id !== currentUser.id); // Exclude current user
                displayUsers(allUsers);
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-container').innerHTML = `<div class="col-span-full text-center py-12 text-red-500">${error.message}</div>`;
            }
        }

        function displayUsers(users) {
            const container = document.getElementById('users-container');
            
            if (users.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500">No professionals found</p></div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="flex items-start gap-4 mb-4">
                        ${getAvatarHTML(user, 'w-16 h-16')}
                        <div class="flex-1 min-w-0">
                            ${user.company ? `<h3 class="font-semibold text-gray-900 mb-1">${user.company}</h3>` : ''}
                            <p class="text-sm text-gray-700 mb-1">${user.firstName} ${user.lastName}</p>
                            ${user.title ? `<p class="text-xs text-gray-600 mb-1">${user.title}</p>` : ''}
                        </div>
                    </div>

                    ${user.location ? `
                        <div class="flex items-center gap-2 text-sm text-gray-600 mb-3">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <span>${user.location}</span>
                        </div>
                    ` : ''}

                    ${user.bio ? `<p class="text-sm text-gray-600 mb-2 line-clamp-2">${user.bio}</p>` : ''}

                    <div class="text-xs text-gray-600 mb-3">
                        ${user.registrarId ? `<div class="flex items-center gap-2 text-green-700">✅ Registered: <span class="font-medium">${user.registrarId}</span></div>` : '<div class="flex items-center gap-2 text-gray-500">ℹ️ Not registered</div>'}
                        ${user.city || user.state ? `<div class="mt-1">📍 ${[user.city, user.state].filter(Boolean).join(', ')}</div>` : ''}
                    </div>

                    <div class="flex items-center gap-4 mb-4 text-sm">
                        ${user.rating ? `
                            <div class="flex items-center gap-1">
                                <span class="text-yellow-500">★</span>
                                <span class="font-medium">${user.rating.toFixed(1)}</span>
                                <span class="text-gray-500">(${user.reviewCount || 0})</span>
                            </div>
                        ` : ''}
                        ${user.projectsCompleted ? `
                            <div class="text-gray-600">
                                ${user.projectsCompleted} projects
                            </div>
                        ` : ''}
                        ${user.yearsExperience ? `
                            <div class="text-gray-600">
                                ${user.yearsExperience} years
                            </div>
                        ` : ''}
                    </div>

                    ${user.skills && user.skills.length > 0 ? `
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${user.skills.slice(0, 3).map(skill => `<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">${skill}</span>`).join('')}
                            ${user.skills.length > 3 ? `<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded">+${user.skills.length - 3}</span>` : ''}
                        </div>
                    ` : ''}

                    <div class="flex gap-2">
                        <a href="/profile.html?id=${user._id}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Profile</a>
                        <a href="/messages.html?user=${user._id}" class="flex-1 text-center px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Message</a>
                    </div>
                    <button ${partnerIds.has(user._id) ? 'disabled' : ''} onclick="addPartner('${user._id}')" class="mt-3 w-full ${partnerIds.has(user._id) ? 'bg-gray-100 text-gray-500' : 'bg-blue-600 text-white hover:bg-blue-700'} px-4 py-2 rounded-lg text-sm font-medium">${partnerIds.has(user._id) ? 'Partner Added' : 'Add as Partner'}</button>
                </div>
            `).join('');
        }

        function performSearch() {
            const search = document.getElementById('search-input').value;
            const skills = document.getElementById('skills-filter').value;
            const city = document.getElementById('city-filter').value;
            const registered = document.getElementById('registered-filter').checked;
            
            const params = {};
            if (search) params.search = search;
            if (skills) params.skills = skills;
            if (city) params.city = city;
            if (registered) params.registeredOnly = true;
            
            loadUsers(params);
        }

        document.getElementById('search-btn').addEventListener('click', performSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        window.addPartner = async (partnerId) => {
            try {
                const res = await authFetch(`/api/partners/${partnerId}`, { method: 'POST' });
                if (!res.ok) {
                    const ct = res.headers.get('content-type') || '';
                    const err = ct.includes('application/json') ? await res.json() : null;
                    throw new Error((err && (err.error || err.message)) || `Failed to add partner (HTTP ${res.status})`);
                }
                partnerIds.add(partnerId);
                displayUsers(allUsers);
            } catch (err) {
                alert(err.message || 'Failed to add partner');
            }
        };

        (async () => {
            await loadPartners();
            await loadUsers();
        })();
    </script>
</body>
</html>
