<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" id="nav-cta-button" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Browse</h1>
            <p class="text-gray-600 mt-2" id="browse-subtitle">See your partners, their projects, and discover new service providers</p>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-lg border border-gray-200 mb-6">
            <nav class="flex border-b border-gray-200">
                <button id="tab-partners" class="network-tab px-6 py-3 text-sm font-medium border-b-2 border-gray-900 text-gray-900">My Partners</button>
                <button id="tab-featured" class="network-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">Featured Services</button>
                <button id="tab-projects" class="network-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">Partners' Projects</button>
            </nav>
        </div>

        <!-- Search -->
        <div class="bg-white rounded-lg border border-gray-200 p-4 mb-6">
            <div class="flex gap-4">
                <input type="text" id="search-input" placeholder="Search partners or services..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                <button id="search-btn" class="px-6 py-2 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Search</button>
            </div>
        </div>

        <!-- Content Container -->
        <div id="network-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">
                <p class="text-gray-500">Loading...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        // Role-based subtitle and nav
        const isVendor = user.role === 'vendor';
        const subtitle = document.getElementById('browse-subtitle');
        const navCta = document.getElementById('nav-cta-button');
        
        if (isVendor) {
            subtitle.textContent = 'Find project owners, build your network, and discover new opportunities';
            if (navCta) {
                navCta.textContent = 'Find Work';
                navCta.href = '/browse.html';
            }
        } else {
            subtitle.textContent = 'See your partners, their projects, and discover new service providers';
        }
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        let partners = [];
        let featuredServices = [];
        let partnerProjects = [];
        let currentTab = 'partners';

        async function loadPartners() {
            try {
                const res = await authFetch('/api/partners');
                const ct = res.headers.get('content-type') || '';
                if (!res.ok || !ct.includes('application/json')) {
                    let err;
                    try { err = await res.json(); } catch {}
                    throw new Error((err && (err.error || err.message)) || `Failed to load partners (HTTP ${res.status})`);
                }
                const data = await res.json();
                partners = data.partners || [];
                displayPartners();
            } catch (error) {
                console.error('Error loading partners:', error);
                document.getElementById('network-content').innerHTML = `<div class="col-span-full text-center py-12 text-red-500">${error.message || 'Failed to load partners'}</div>`;
            }
        }

        async function loadFeaturedServices() {
            try {
                const res = await authFetch('/api/users');
                const ct = res.headers.get('content-type') || '';
                if (!res.ok || !ct.includes('application/json')) {
                    let err;
                    try { err = await res.json(); } catch {}
                    throw new Error((err && (err.error || err.message)) || `Failed to load featured services (HTTP ${res.status})`);
                }
                const data = await res.json();
                featuredServices = (data.users || []).filter(u => u.role === 'vendor' || (u.skills && u.skills.length > 0)).slice(0, 12);
                displayFeaturedServices();
            } catch (error) {
                console.error('Error loading featured services:', error);
                document.getElementById('network-content').innerHTML = `<div class="col-span-full text-center py-12 text-red-500">${error.message || 'Failed to load services'}</div>`;
            }
        }

        async function loadPartnerProjects() {
            try {
                if (!partners || partners.length === 0) {
                    await loadPartners();
                }
                const res = await authFetch('/api/projects');
                const ct = res.headers.get('content-type') || '';
                if (!res.ok || !ct.includes('application/json')) {
                    let err;
                    try { err = await res.json(); } catch {}
                    throw new Error((err && (err.error || err.message)) || `Failed to load projects (HTTP ${res.status})`);
                }
                const data = await res.json();
                const allProjects = data.projects || [];
                const partnerIds = new Set(partners.map(c => c._id));
                partnerProjects = allProjects.filter(p => partnerIds.has(p.owner?._id));
                displayPartnerProjects();
            } catch (error) {
                console.error('Error loading partner projects:', error);
                document.getElementById('network-content').innerHTML = `<div class="col-span-full text-center py-12 text-red-500">${error.message || 'Failed to load projects'}</div>`;
            }
        }

        function displayPartners() {
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            const filtered = partners.filter(partner => {
                const name = `${partner.firstName} ${partner.lastName}`.toLowerCase();
                const company = (partner.company || '').toLowerCase();
                return !search || name.includes(search) || company.includes(search);
            });

            const container = document.getElementById('network-content');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500">No partners yet. Browse professionals to build your network.</p></div>';
                return;
            }

            container.innerHTML = filtered.map(conn => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-3">
                                ${getAvatarHTML(conn, 'w-12 h-12')}
                                <div class="flex-1">
                                    <h3 class="font-semibold text-gray-900">${conn.firstName} ${conn.lastName}</h3>
                                    ${conn.company ? `<p class="text-sm text-gray-600">${conn.company}</p>` : ''}
                                </div>
                            </div>
                            ${conn.title ? `<p class="text-sm text-gray-700 mb-2">${conn.title}</p>` : ''}
                            ${conn.bio ? `<p class="text-sm text-gray-600 mb-3 line-clamp-2">${conn.bio}</p>` : ''}
                            
                            ${conn.skills && conn.skills.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${conn.skills.slice(0, 3).map(skill => `<span class=\"px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded\">${skill}</span>`).join('')}
                                    ${conn.skills.length > 3 ? `<span class=\"px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded\">+${conn.skills.length - 3}</span>` : ''}
                                </div>
                            ` : ''}
                            
                            ${(conn.city || conn.state || conn.location) ? `
                                <p class="text-xs text-gray-500 flex items-center gap-1 mb-4">
                                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    </svg>
                                    ${[conn.city, conn.state].filter(Boolean).join(', ') || conn.location}
                                </p>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="flex gap-2 pt-4 border-t border-gray-200">
                        <a href="/profile.html?id=${conn._id}" class="flex-1 text-center px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Profile</a>
                        <a href="/messages.html?user=${conn._id}" class="flex-1 text-center px-3 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Message</a>
                    </div>
                </div>
            `).join('');
        }

        function displayFeaturedServices() {
            const container = document.getElementById('network-content');
            if (featuredServices.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500">No featured services available.</p></div>';
                return;
            }

            container.innerHTML = featuredServices.map(service => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-3">
                                ${getAvatarHTML(service, 'w-12 h-12')}
                                <div class="flex-1">
                                    <h3 class="font-semibold text-gray-900">${service.firstName} ${service.lastName}</h3>
                                    ${service.company ? `<p class="text-sm text-gray-600">${service.company}</p>` : ''}
                                </div>
                            </div>
                            ${service.title ? `<p class="text-sm text-gray-700 mb-2">${service.title}</p>` : ''}
                            ${service.bio ? `<p class="text-sm text-gray-600 mb-3 line-clamp-2">${service.bio}</p>` : ''}
                            
                            ${service.skills && service.skills.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${service.skills.slice(0, 3).map(skill => `<span class=\"px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded\">${skill}</span>`).join('')}
                                    ${service.skills.length > 3 ? `<span class=\"px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded\">+${service.skills.length - 3}</span>` : ''}
                                </div>
                            ` : ''}
                            
                            ${(service.rating || service.reviewCount) ? `
                                <div class="flex items-center gap-1 mb-3">
                                    <span class="text-sm font-medium text-gray-900">${(service.rating || 0).toFixed(1)}</span>
                                    <span class="text-xs text-gray-600">(${service.reviewCount || 0} reviews)</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="flex gap-2 pt-4 border-t border-gray-200">
                        <a href="/profile.html?id=${service._id}" class="flex-1 text-center px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Profile</a>
                        <a href="/messages.html?user=${service._id}" class="flex-1 text-center px-3 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Contact</a>
                    </div>
                </div>
            `).join('');
        }

        function displayPartnerProjects() {
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            const filtered = partnerProjects.filter(proj => {
                const title = (proj.title || '').toLowerCase();
                const desc = (proj.description || '').toLowerCase();
                return !search || title.includes(search) || desc.includes(search);
            });

            const container = document.getElementById('network-content');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12"><p class="text-gray-500">Your partners haven\'t posted any projects yet.</p></div>';
                return;
            }

            container.innerHTML = filtered.map(project => `
                <div class="bg-white rounded-lg border border-gray-200 p-6 hover:shadow-md transition">
                    <div class="mb-3">
                        <div class="flex items-center gap-2 mb-2">
                            <h3 class="text-lg font-semibold text-gray-900">${project.title}</h3>
                            <span class="px-2 py-1 text-xs font-medium rounded-full ${
                                project.status === 'open' ? 'bg-green-50 text-green-700' :
                                project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                'bg-gray-100 text-gray-700'
                            }">${(project.status || 'open').replace('_', ' ')}</span>
                        </div>
                        <p class="text-sm text-gray-600 line-clamp-2">${project.description || ''}</p>
                    </div>
                    
                    <div class="flex flex-wrap gap-3 text-sm text-gray-600 mb-4">
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Budget: ${formatCurrency(project.budget || 0)}
                        </span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                            ${project.bids?.length || 0} bids
                        </span>
                    </div>
                    
                    ${project.owner ? `
                        <div class="mb-4 p-3 bg-gray-50 rounded-lg">
                            <p class="text-xs text-gray-600 mb-2">Posted by</p>
                            <div class="flex items-center gap-2">
                                ${getAvatarHTML(project.owner, 'w-8 h-8')}
                                <div>
                                    <p class="text-sm font-medium text-gray-900">${project.owner.firstName} ${project.owner.lastName}</p>
                                    ${project.owner.company ? `<p class="text-xs text-gray-600">${project.owner.company}</p>` : ''}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                    
                    <a href="/project-detail.html?id=${project._id}" class="block w-full text-center px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">View Project</a>
                </div>
            `).join('');
        }

        // Tab switching
        document.getElementById('tab-partners').addEventListener('click', () => {
            currentTab = 'partners';
            updateTabs();
            loadPartners();
        });

        document.getElementById('tab-featured').addEventListener('click', () => {
            currentTab = 'featured';
            updateTabs();
            loadFeaturedServices();
        });

        document.getElementById('tab-projects').addEventListener('click', () => {
            currentTab = 'projects';
            updateTabs();
            loadPartnerProjects();
        });

        function updateTabs() {
            const tabs = document.querySelectorAll('.network-tab');
            tabs.forEach(t => {
                t.classList.remove('border-gray-900', 'text-gray-900');
                t.classList.add('border-transparent', 'text-gray-600');
            });
            
            const activeTab = currentTab === 'partners' ? 'tab-partners' : 
                             currentTab === 'featured' ? 'tab-featured' : 'tab-projects';
            const tab = document.getElementById(activeTab);
            tab.classList.remove('border-transparent', 'text-gray-600');
            tab.classList.add('border-gray-900', 'text-gray-900');
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            if (currentTab === 'partners') displayPartners();
            else if (currentTab === 'featured') displayFeaturedServices();
            else displayPartnerProjects();
        });

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });

        // Initial load
        loadPartners();
    </script>
</body>
</html>
