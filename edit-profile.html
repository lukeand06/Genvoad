<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/profile.html" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Cancel</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Edit Profile</h1>
            <p class="text-gray-600 mt-1">Update your information to showcase your expertise</p>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 p-8">
            <div id="success-message" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded"></div>
            <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>
            
            <form id="profile-form" class="space-y-6">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" id="firstName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" id="lastName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
                    <textarea id="bio" rows="4" placeholder="Tell others about yourself, your experience, and what makes you unique..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
                </div>

                <!-- Professional Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                        <input type="text" id="title" placeholder="e.g., General Contractor" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
                        <input type="text" id="company" placeholder="Your company name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                        <input type="text" id="location" placeholder="City, State" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                        <input type="tel" id="phone" placeholder="+1 (555) 123-4567" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                        <input type="text" id="city" placeholder="City" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State/Province</label>
                        <input type="text" id="state" placeholder="State" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Registrar ID</label>
                        <input type="text" id="registrarId" placeholder="License / Registrar ID" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Years of Experience</label>
                    <input type="number" id="yearsExperience" min="0" max="99" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                </div>

                <!-- Links -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Website</label>
                        <input type="url" id="website" placeholder="https://yourcompany.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">LinkedIn</label>
                        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/you" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">GitHub</label>
                        <input type="url" id="github" placeholder="https://github.com/you" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                </div>

                <!-- Skills -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Skills</label>
                    <input type="text" id="skills" placeholder="e.g., Carpentry, Electrical, Plumbing (comma-separated)" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    <p class="mt-1 text-xs text-gray-500">Separate skills with commas</p>
                </div>

                <!-- Services -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Services Offered</label>
                    <input type="text" id="services" placeholder="e.g., Residential Construction, Commercial Renovation (comma-separated)" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    <p class="mt-1 text-xs text-gray-500">Separate services with commas</p>
                </div>

                <!-- Preferences -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-3 p-4 border border-gray-200 rounded-lg">
                        <h3 class="text-sm font-semibold text-gray-900">Visibility & Messaging</h3>
                        <label class="block text-sm text-gray-700">Profile Visibility
                            <select id="profileVisibility" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                                <option value="public">Public</option>
                                <option value="private">Private</option>
                            </select>
                        </label>
                        <label class="block text-sm text-gray-700">Allow Messages From
                            <select id="allowMessagesFrom" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                                <option value="all">Everyone</option>
                                <option value="partners">Partners only</option>
                            </select>
                        </label>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" id="smsOptIn" class="h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900">
                            SMS notifications
                        </label>
                    </div>
                    <div class="space-y-3 p-4 border border-gray-200 rounded-lg">
                        <h3 class="text-sm font-semibold text-gray-900">Notifications & Display</h3>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" id="notifyMessages" class="h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900" checked>
                            Message notifications
                        </label>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" id="notifyProjects" class="h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900" checked>
                            Project updates
                        </label>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                            <input type="checkbox" id="notifyPartners" class="h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900" checked>
                            Partner requests
                        </label>
                        <label class="block text-sm text-gray-700">Theme
                            <select id="theme" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                                <option value="system">System</option>
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>
                        </label>
                        <label class="block text-sm text-gray-700">Language
                            <select id="language" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                                <option value="en">English</option>
                                <option value="es">Spanish</option>
                            </select>
                        </label>
                        <label class="block text-sm text-gray-700">Timezone
                            <input type="text" id="timezone" placeholder="e.g., America/Los_Angeles" class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        </label>
                    </div>
                </div>

                <div class="flex gap-4 pt-6 border-t border-gray-200">
                    <button type="button" id="delete-btn" class="px-4 py-3 border border-red-200 text-red-700 rounded-lg font-medium hover:bg-red-50">Delete Profile</button>
                    <a href="/profile.html" class="flex-1 text-center px-6 py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50">Cancel</a>
                    <button type="submit" id="save-btn" class="flex-1 px-6 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();

        // Load current profile data
        async function loadProfile() {
            try {
                const response = await authFetch(`/users/${user.id}`);
                const data = await response.json();
                const profile = data.user;

                // Populate form
                document.getElementById('firstName').value = profile.firstName || '';
                document.getElementById('lastName').value = profile.lastName || '';
                document.getElementById('bio').value = profile.bio || '';
                document.getElementById('title').value = profile.title || '';
                document.getElementById('company').value = profile.company || '';
                document.getElementById('location').value = profile.location || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('city').value = profile.city || '';
                document.getElementById('state').value = profile.state || '';
                document.getElementById('registrarId').value = profile.registrarId || '';
                document.getElementById('yearsExperience').value = profile.yearsExperience || 0;
                document.getElementById('skills').value = profile.skills ? profile.skills.join(', ') : '';
                document.getElementById('services').value = profile.services ? profile.services.join(', ') : '';
                document.getElementById('website').value = profile.links?.website || '';
                document.getElementById('linkedin').value = profile.links?.linkedin || '';
                document.getElementById('github').value = profile.links?.github || '';

                document.getElementById('profileVisibility').value = profile.preferences?.profileVisibility || 'public';
                document.getElementById('allowMessagesFrom').value = profile.preferences?.allowMessagesFrom || 'all';
                document.getElementById('smsOptIn').checked = profile.preferences?.smsOptIn || false;
                document.getElementById('notifyMessages').checked = profile.preferences?.emailNotifications?.messages !== false;
                document.getElementById('notifyProjects').checked = profile.preferences?.emailNotifications?.projectUpdates !== false;
                document.getElementById('notifyPartners').checked = profile.preferences?.emailNotifications?.partnerRequests !== false;
                document.getElementById('theme').value = profile.preferences?.theme || 'system';
                document.getElementById('language').value = profile.preferences?.language || 'en';
                document.getElementById('timezone').value = profile.preferences?.timezone || 'America/Los_Angeles';
            } catch (error) {
                console.error('Error loading profile:', error);
                showError('Failed to load profile');
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const bio = document.getElementById('bio').value;
            const title = document.getElementById('title').value;
            const company = document.getElementById('company').value;
            const location = document.getElementById('location').value;
            const phone = document.getElementById('phone').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            const registrarId = document.getElementById('registrarId').value;
            const yearsExperience = parseInt(document.getElementById('yearsExperience').value) || 0;
            
            const skillsInput = document.getElementById('skills').value;
            const skills = skillsInput ? skillsInput.split(',').map(s => s.trim()).filter(s => s) : [];
            
            const servicesInput = document.getElementById('services').value;
            const services = servicesInput ? servicesInput.split(',').map(s => s.trim()).filter(s => s) : [];

            const links = {
                website: document.getElementById('website').value,
                linkedin: document.getElementById('linkedin').value,
                github: document.getElementById('github').value
            };

            const preferences = {
                profileVisibility: document.getElementById('profileVisibility').value,
                allowMessagesFrom: document.getElementById('allowMessagesFrom').value,
                smsOptIn: document.getElementById('smsOptIn').checked,
                emailNotifications: {
                    projectUpdates: document.getElementById('notifyProjects').checked,
                    partnerRequests: document.getElementById('notifyPartners').checked,
                    messages: document.getElementById('notifyMessages').checked
                },
                theme: document.getElementById('theme').value,
                language: document.getElementById('language').value,
                timezone: document.getElementById('timezone').value
            };
            
            const profileData = {
                firstName,
                lastName,
                bio,
                title,
                company,
                location,
                phone,
                city,
                state,
                registrarId,
                yearsExperience,
                skills,
                services,
                links,
                preferences
            };
            
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            
            try {
                const response = await authFetch('/users/profile', {
                    method: 'PUT',
                    body: JSON.stringify(profileData)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to update profile');
                }
                
                // Update stored user data
                setCurrentUser(data.user);
                
                showSuccess('Profile updated successfully!');
                setTimeout(() => {
                    window.location.href = '/profile.html';
                }, 1500);
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        });

        document.getElementById('delete-btn').addEventListener('click', async () => {
            const confirmed = confirm('Delete your profile? This will hide your account.');
            if (!confirmed) return;
            try {
                const res = await authFetch('/users/profile', { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete');
                logout();
            } catch (err) {
                showError(err.message);
            }
        });

        loadProfile();
    </script>
</body>
</html>
