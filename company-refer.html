<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer a Person - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/community-hub.html" class="flex items-center">
                    <img src="/public/logo-icon.png?v=2" alt="Genovad" class="h-12 w-auto">
                </a>
                <a href="/dashboard.html" class="text-sm font-medium text-gray-600 hover:text-gray-900">Back to Explore</a>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white border border-gray-200 rounded-xl p-6 sm:p-8">
            <div class="mb-6">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">Refer a person</h1>
                <p class="text-gray-600 mt-1">Invite someone to your active community.</p>
            </div>

            <div id="status-message" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

            <div class="mb-6 p-4 bg-gray-50 border border-gray-200 rounded-lg">
                <p class="text-xs uppercase tracking-wide text-gray-500">Active community</p>
                <p id="community-name" class="text-sm font-semibold text-gray-900 mt-1">Loading…</p>
            </div>

            <form id="refer-form" class="space-y-4">
                <div>
                    <label for="invite-email" class="block text-sm font-medium text-gray-900 mb-1">Email</label>
                    <input id="invite-email" type="email" required placeholder="name@example.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg" />
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="invite-role" class="block text-sm font-medium text-gray-900 mb-1">Community role</label>
                        <select id="invite-role" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            <option value="member">Member</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div>
                        <label for="invite-account-type" class="block text-sm font-medium text-gray-900 mb-1">Account type</label>
                        <select id="invite-account-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            <option value="vendor">Vendor</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="invite-message" class="block text-sm font-medium text-gray-900 mb-1">Message (optional)</label>
                    <textarea id="invite-message" rows="4" maxlength="500" placeholder="Add a short note for this invitation" class="w-full px-3 py-2 border border-gray-300 rounded-lg resize-none"></textarea>
                </div>

                <button id="invite-submit" type="submit" class="w-full px-4 py-2.5 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Send referral</button>
            </form>
        </div>
    </main>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        if (!requireCommunityMembership('/community-hub.html')) {
            throw new Error('Community membership required');
        }

        const communityNameEl = document.getElementById('community-name');
        const statusEl = document.getElementById('status-message');
        const form = document.getElementById('refer-form');
        const submitBtn = document.getElementById('invite-submit');

        let activeCommunityId = null;

        function showStatus(message, type = 'info') {
            const styles = {
                success: 'bg-green-50 border border-green-200 text-green-800',
                error: 'bg-red-50 border border-red-200 text-red-700',
                info: 'bg-blue-50 border border-blue-200 text-blue-700'
            };

            statusEl.className = `mb-4 rounded-lg px-4 py-3 text-sm ${styles[type] || styles.info}`;
            statusEl.textContent = message;
            statusEl.classList.remove('hidden');
        }

        async function loadActiveCommunity() {
            try {
                const res = await authFetch('/api/companies/my/company');
                const data = await res.json();

                if (!res.ok || !data?.company?._id) {
                    throw new Error(data?.error || 'Unable to find your active community');
                }

                activeCommunityId = data.company._id;
                communityNameEl.textContent = data.company.name || 'Community';
            } catch (error) {
                showStatus(error.message || 'Failed to load community information', 'error');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (!activeCommunityId) {
                showStatus('No active community selected.', 'error');
                return;
            }

            const email = document.getElementById('invite-email').value.trim();
            const role = document.getElementById('invite-role').value;
            const accountType = document.getElementById('invite-account-type').value;
            const message = document.getElementById('invite-message').value.trim();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const res = await authFetch(`/api/companies/${activeCommunityId}/invite`, {
                    method: 'POST',
                    body: JSON.stringify({ email, role, accountType, message })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data?.error || 'Failed to send referral');
                }

                form.reset();
                showStatus(`Referral sent to ${email}.`, 'success');
            } catch (error) {
                showStatus(error.message || 'Failed to send referral', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send referral';
            }
        });

        loadActiveCommunity();
    </script>
</body>
</html>
