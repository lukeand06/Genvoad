<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Genovad</title>
    <meta name="description" content="Browse and post projects on Genovad" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Optimized font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600&display=swap" rel="stylesheet" /></noscript>
    
    <style>
        :root{
            --bg:#f6f7f8; --surface:#ffffff; --ink:#0b1620; --muted:#5a6975;
            --brand:#146a5a; --brand-2:#1e7a73; --ring:#aee3d8; --chip:#ecf5f3; --chip-text:#256b5b;
            --warn:#b45309; --ok:#0f766e; --shadow:0 10px 40px rgba(16,24,40,.08); --border:#e7efec;
            --spine:#0f6a5d;
        }
        *,*::before,*::after{box-sizing:border-box}
        html,body{height:100%; margin:0}
        body{font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}

        #globalTopBar{display:none !important;}

        .hero{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e8edf2;box-shadow:0 2px 8px rgba(15,23,42,.04)}
        .hero-inner{display:flex;flex-direction:column;gap:4px;max-width:1400px;margin:0 auto;padding:16px 24px}
        .hero h1{margin:0;font:800 24px/1.2 Inter,sans-serif;color:#0b3a32;display:flex;align-items:center;gap:8px}
        .hero h1::before{content:'';width:6px;height:6px;background:#146a5a;border-radius:50%;display:inline-block}
        .hero p{margin:0;font-size:14px;color:#4a5f5a;font-weight:500}

        .page{margin:24px auto 96px;padding:0 16px;display:grid;grid-template-columns:320px minmax(0,1fr);gap:24px;width:100%;max-width:100%}
        .leftCol{display:grid;gap:20px;align-content:start}
        .rightCol{display:grid;gap:20px}

        .side{
            background:linear-gradient(150deg,#f8fbfa 0%,#eef4f2 100%);
            border-radius:16px;padding:16px;border:1px solid #dfe9e6;box-shadow:var(--shadow);
        }
        .logo{font:700 22px Oswald,Inter,sans-serif;letter-spacing:.5px;color:var(--ink);margin:2px 0 10px}
        .side h3{margin:4px 0 12px;font:700 11px Inter,sans-serif;letter-spacing:1.4px;color:#2f4d48;text-transform:uppercase;padding:8px 12px;border:1px solid #dbe8e5;border-radius:10px;background:#ffffffc9}
        .field{display:grid;gap:6px;margin:8px 0 12px;padding:10px 12px;background:#fff;border:1px solid #e6ecea;border-radius:12px;box-shadow:0 4px 12px rgba(16,24,40,.05)}
        .field label{font-size:12px;color:#2f4d48;font-weight:700;letter-spacing:.01em}
        .field input,.field select{height:40px;border:1px solid #e2e9e7;background:#f9fbfb;border-radius:9px;padding:0 12px;font-size:14px;color:var(--ink);width:100%}
        .field input:focus,.field select:focus{outline:none;border-color:#c8e9e2;box-shadow:0 0 0 3px #aee3d873}
        .budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .btn{height:40px;border:none;border-radius:10px;background:var(--brand);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(20,106,90,.25);padding:0 14px}
        .btn:hover{background:var(--brand-2)}
        .btn-ghost{height:40px;border:1px solid #d7e6e3;background:#f6fbfa;color:#125f52;border-radius:10px;font-weight:700;padding:0 14px;cursor:pointer}
        .backBtn{width:100%;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border:1px solid var(--border);background:#fff;color:#0f3f37;border-radius:12px;font-weight:700;cursor:pointer}
        .backBtn:hover{background:#f7fbfa}

        .section{background:var(--surface);border-radius:18px;padding:18px;box-shadow:var(--shadow);overflow:hidden;grid-column:1 / -1}
        .section h2{margin:0 0 6px;font:700 18px Inter;color:#12342f}
        .section p.sub{margin:0 0 16px;color:var(--muted);font-size:13px}

        .grid{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:8px;flex-wrap:nowrap;scroll-snap-type:x mandatory}
        .grid::-webkit-scrollbar{height:8px}
        .grid::-webkit-scrollbar-track{background:#f0f5f3;border-radius:4px}
        .grid::-webkit-scrollbar-thumb{background:#b8d9d1;border-radius:4px}
        .grid::-webkit-scrollbar-thumb:hover{background:#95c5b8}

        .card{
            position:relative;flex:0 0 360px;max-width:360px;min-width:300px;scroll-snap-align:start;
            border:1px solid var(--border);border-radius:16px;background:#fff;overflow:hidden;
            transition:box-shadow .18s ease, border-color .18s ease, transform .18s ease;
            cursor:pointer;display:flex;flex-direction:column;
        }
        .card:hover{border-color:#cfe4de;box-shadow:0 14px 34px rgba(16,24,40,.12);transform:translateY(-2px)}

        .card-header{position:relative;display:flex;flex-direction:column;gap:12px;padding:18px 18px 14px 18px;border-bottom:1px solid #f3f7f6}
        .card-header-top{display:flex;align-items:flex-start;gap:12px}
        .logo-dot{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;flex-shrink:0;font-weight:800;font-size:18px;color:#0f3f37;background:linear-gradient(135deg,#f2f6f5 0%,#e6f0ed 100%);box-shadow:0 4px 12px rgba(18,106,90,.08)}
        .card-header-content{flex:1;min-width:0}
        .title{font:800 16.5px Inter;margin:0 0 6px 0;color:#0e3530;letter-spacing:.3px;line-height:1.3}
        .card-meta-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;background:#ecf5f3;color:#256b5b;border-radius:6px;font-weight:700;font-size:11.5px}
        .status-badge{padding:5px 10px;border-radius:6px;font-weight:700;font-size:11px;border:1px solid}
        .status-open{background:#eefcf6;color:#0d5d4f;border-color:#b8e6d5}
        .status-urgent{background:#fff4ed;color:#8a3b12;border-color:#ffd9c5}
        .status-progress{background:#e0f2fe;color:#075985;border-color:#bae6fd}
        .status-completed{background:#f0fdf4;color:#166534;border-color:#bbf7d0}

        .card-body{flex:1;display:flex;flex-direction:column;gap:14px;padding:16px 18px}
        .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .info-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#f9fbfb;border:1px solid #eef3f1;border-radius:10px}
        .info-item svg{width:16px;height:16px;color:#2d6157;margin-top:2px;flex-shrink:0}
        .info-item-content{flex:1;min-width:0}
        .info-label{font-size:10.5px;font-weight:700;color:#5a6f6b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
        .info-value{font-size:13.5px;font-weight:700;color:#1a4540;word-break:break-word}
        .info-value a{color:#146a5a;text-decoration:none}
        .info-value a:hover{text-decoration:underline}

        .tagstrip{display:flex;gap:6px;flex-wrap:wrap}
        .tag{font-weight:700;font-size:10.5px;color:#1d6457;background:#f0fbf7;border:1px solid #d6ede7;border-radius:6px;padding:5px 9px}

        .desc{color:#4a5c5a;font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        .cta{display:flex;flex-direction:column;gap:8px;padding:14px 18px;background:#fafcfb;border-top:1px solid #f0f5f3}
        .btn-cta{
            height:44px;padding:0 16px;border-radius:10px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
            border:1px solid #cfe3df;background:#fff;color:#125f52;box-shadow:0 2px 8px rgba(20,106,90,.08);
            transition:transform .15s,box-shadow .15s,background .15s,border-color .15s;
        }
        .btn-cta svg{width:18px;height:18px}
        .btn-cta:hover{background:#f2faf7;border-color:#b8ddd5;transform:translateY(-1px);box-shadow:0 4px 14px rgba(20,106,90,.16)}
        .btn-cta.primary{background:linear-gradient(135deg,#146a5a 0%,#1e7a67 100%);color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(20,106,90,.28)}
        .btn-cta.primary:hover{box-shadow:0 10px 28px rgba(20,106,90,.38);transform:translateY(-2px)}

        .skeleton{animation:pulse 1.2s ease-in-out infinite;background:linear-gradient(90deg,#f3f6f5 25%,#e9f1ef 37%,#f3f6f5 63%);background-size:400% 100%}
        @keyframes pulse{0%{background-position:100% 0}100%{background-position:0 0}}
        .sk-card{height:220px;border-radius:16px}
        
        .quick-nav{position:fixed;top:12px;right:12px;z-index:1200;display:flex;gap:6px;flex-wrap:wrap;font-size:13px}
        .quick-nav a{padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:#fff;color:#0f3f37;text-decoration:none;font-weight:700;box-shadow:0 6px 16px rgba(16,24,40,.08);transition:all .15s ease}
        .quick-nav a:hover{background:#f7fbfa;transform:translateY(-1px)}
        .quick-nav a.is-active{background:#ecf5f3;color:#146a5a;border-color:#cfe4de;box-shadow:0 6px 16px rgba(20,106,90,.18)}

        @media (max-width:1080px){
            .page{grid-template-columns:1fr}
            .leftCol,.rightCol{grid-column:1 / -1}
            .card{flex:0 0 320px;max-width:320px;min-width:280px}
        }
        @media (max-width:768px){
            .page{margin:16px auto 72px;padding:0 12px;grid-template-columns:1fr}
            .card{flex:0 0 280px;max-width:300px;min-width:240px}
            .hero-inner{padding:16px}
            .hero h1{font-size:22px}
            .hero p{font-size:13.5px}
        }
        @media (max-width:480px){
            .page{margin:12px auto 60px;padding:0 12px}
            .hero-inner{padding:14px 12px}
            .hero h1{font-size:20px}
            .card{flex:0 0 240px;max-width:260px;min-width:200px}
            .info-grid{grid-template-columns:1fr}
        }
    </style>
</head>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        const userId = user._id || user.id;
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        // Role-based nav button
        const isVendor = user.role === 'vendor';
        const navCta = document.getElementById('nav-cta-button');
        if (isVendor && navCta) {
            navCta.textContent = 'Find Work';
            navCta.href = '/browse.html';
        }

        // Role-based tab and subtitle
        const myTab = document.getElementById('tab-my');
        const subtitle = document.getElementById('projects-subtitle');
        if (isVendor) {
            myTab.textContent = 'My Bids';
            myTab.style.display = 'block';
            subtitle.textContent = 'Browse projects and track your bids';
        } else {
            myTab.textContent = 'My Projects';
            myTab.style.display = 'block';
            subtitle.textContent = 'Browse projects and manage your postings';
        }

        // User menu toggle
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Mobile Menu Handler
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

                const title = (project.title || '').toLowerCase();
                const desc = (project.description || '').toLowerCase();
                const matchesSearch = !search || title.includes(search) || desc.includes(search);
                return matchesSearch;
            });

            displayProjects(filtered);
        }

            const activeTab = currentTab === 'browse' ? 'tab-browse' : 'tab-my';

            tab.classList.remove('border-transparent', 'text-gray-600');
            tab.classList.add('border-gray-900', 'text-gray-900');

        async function closeProject(projectId, newStatus) {
            try {
                const action = newStatus === 'completed' ? 'mark this project as complete' : 'close this project';
                if (!confirm(`Are you sure you want to ${action}?`)) return;
                
                // Use the project update endpoint if it exists, or create a new one
                const res = await authFetch(`/api/projects/${projectId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    alert(data.error || 'Failed to update project');
                    return;
                }
                
                alert(`Project ${newStatus === 'completed' ? 'completed' : 'closed'} successfully`);
                loadMyProjects();
            } catch (e) {
                console.error('Close project error', e);
                alert('Failed to update project');
            }
        }

                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    Budget: ${formatCurrency(project.budget)}
                                </span>
                                ${(project.meetingDate || project.startDate || project.endDate) ? `
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    ${project.meetingDate ? `Meeting: ${new Date(project.meetingDate).toLocaleString()}` : (project.startDate && project.endDate) ? `Schedule: ${new Date(project.startDate).toLocaleDateString()} - ${new Date(project.endDate).toLocaleDateString()}` : project.startDate ? `Start: ${new Date(project.startDate).toLocaleDateString()}` : project.endDate ? `End: ${new Date(project.endDate).toLocaleDateString()}` : ''}
                                </span>
                                ` : ''}
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                                    </svg>
                                    ${project.bids?.length || 0} total bids
                                </span>
                                <span class="px-3 py-1 text-xs font-medium rounded-full ${
                                    project.status === 'open' ? 'bg-green-50 text-green-700' :
                                    project.status === 'in_progress' ? 'bg-blue-50 text-blue-700' :
                                    project.status === 'completed' ? 'bg-gray-100 text-gray-700' :
                                    'bg-red-50 text-red-700'
                                }">${project.status.replace('_', ' ')}</span>
                            </div>

                            <div class="flex items-center gap-3">
                                ${project.owner ? `
                                    <div class="flex items-center gap-2">
                                        ${getAvatarHTML(project.owner, 'w-8 h-8')}
                                        <div class="text-sm min-w-0 flex-1">
                                            <div class="flex items-center gap-1.5">
                                                <p class="font-medium text-gray-900 truncate">${project.owner.company || `${project.owner.firstName} ${project.owner.lastName}`}</p>
                                                ${getVerificationBadge(project.owner, 'small')}
                                            </div>
                                            ${project.owner.company ? `<p class="text-gray-500 text-xs truncate">${project.owner.firstName} ${project.owner.lastName}</p>` : ''}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-4 pt-4 border-t border-gray-200">
                        <a href="/project-detail.html?id=${project._id}" class="flex-1 text-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">View Project</a>
                        ${myBid.status === 'accepted' ? `
                            <a href="/messages.html?user=${project.owner._id}&projectId=${project._id}" class="flex-1 text-center px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">Go to Project Chat</a>
                        ` : `
                            <button onclick="editBid('${project._id}', '${myBid._id}')" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Edit Bid</button>
                            <button onclick="withdrawBid('${project._id}', '${myBid._id}')" class="px-4 py-2 border border-red-300 rounded-lg text-sm font-medium text-red-700 hover:bg-red-50">Withdraw</button>
                        `}
                    </div>
                </div>
            `;
            }).join('');
        }

        async function editBid(projectId, bidId) {
            try {
                const amountStr = prompt('Enter new bid amount (USD):');
                if (amountStr === null) return; // cancelled
                const amount = Number(amountStr);
                if (Number.isNaN(amount) || amount <= 0) { alert('Invalid amount'); return; }

                const timeline = prompt('Enter new timeline (e.g., 6 weeks):');
                if (timeline === null) return;

                const proposal = prompt('Update proposal notes (optional):');
                if (proposal === null) return;

                const res = await authFetch(`/api/projects/${projectId}/bids/${bidId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, timeline, proposal })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Failed to update bid'); return; }
                alert('Bid updated');
                loadMyBids();
            } catch (e) {
                console.error('Edit bid error', e);
                alert('Failed to update bid');
            }
        }

        async function withdrawBid(projectId, bidId) {
            try {
                if (!confirm('Withdraw your bid? This cannot be undone.')) return;
                const res = await authFetch(`/api/projects/${projectId}/bids/${bidId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Failed to withdraw bid'); return; }
                alert('Bid withdrawn');
                loadMyBids();
            } catch (e) {
                console.error('Withdraw bid error', e);
                alert('Failed to withdraw bid');
            }
        }

        // Load appropriate tab on page load
        // Vendors see Browse Projects first, owners see My Projects first
        if (isVendor) {
            document.getElementById('tab-browse').click();
        } else {
            loadMyProjects();
        }
        updateTabs();
        
        // Invite Vendor Modal Functions
        let vendorSearchTimeout;
        let selectedVendor = null;
        
        function showInviteVendorModal() {
            resetInviteVendorForm();
            document.getElementById('invite-vendor-modal').classList.remove('hidden');
        }
        
        function closeInviteVendorModal() {
            document.getElementById('invite-vendor-modal').classList.add('hidden');
            resetInviteVendorForm();
        }
        
        function resetInviteVendorForm() {
            document.getElementById('invite-vendor-form').reset();
            document.getElementById('vendor-search').value = '';
            document.getElementById('vendor-search-results').classList.add('hidden');
            document.getElementById('vendor-search-results').innerHTML = '';
            document.getElementById('selected-vendor-display').classList.add('hidden');
            document.getElementById('selected-vendor-id').value = '';
            document.getElementById('selected-vendor-email').value = '';
            selectedVendor = null;
        }
        
        // Vendor Search with Debounce - Only show partners unless full email typed
        document.getElementById('vendor-search')?.addEventListener('input', async (e) => {
            clearTimeout(vendorSearchTimeout);
            const query = e.target.value.trim();
            
            if (query.length === 0) {
                document.getElementById('vendor-search-results').classList.add('hidden');
                return;
            }
            
            vendorSearchTimeout = setTimeout(async () => {
                try {
                    // Check if it's a full email
                    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(query);
                    
                    if (isEmail) {
                        // If full email, search all vendors
                        const res = await authFetch(`/api/users/search?q=${encodeURIComponent(query)}&role=vendor`);
                        const data = await res.json();
                        
                        if (data.users && data.users.length > 0) {
                            const resultsDiv = document.getElementById('vendor-search-results');
                            resultsDiv.innerHTML = data.users.map(vendor => `
                                <div class="border-b last:border-b-0 border-gray-200 p-3 hover:bg-gray-50 cursor-pointer" onclick="selectVendor('${vendor._id || ''}', '${vendor.email}', '${(vendor.company || `${vendor.firstName || ''} ${vendor.lastName || ''}`).replace(/'/g, "\\'")}')">
                                    <div class="font-medium text-gray-900">${vendor.company || `${vendor.firstName} ${vendor.lastName}`}</div>
                                    <div class="text-sm text-gray-500">${vendor.email}</div>
                                    ${!vendor._id ? '<span class="text-xs text-orange-600">Not registered - will receive invite</span>' : ''}
                                </div>
                            `).join('');
                            resultsDiv.classList.remove('hidden');
                        } else {
                            document.getElementById('vendor-search-results').innerHTML = '<div class="p-3 text-center text-gray-500">No user found with this email</div>';
                            document.getElementById('vendor-search-results').classList.remove('hidden');
                        }
                    } else {
                        // Otherwise only search partners
                        const partnersRes = await authFetch('/api/partners');
                        const partnersData = await partnersRes.json();
                        const partners = partnersData.partners || [];
                        
                        const searchLower = query.toLowerCase();
                        const filtered = partners.filter(p => {
                            const name = `${p.firstName} ${p.lastName}`.toLowerCase();
                            const company = (p.company || '').toLowerCase();
                            return name.includes(searchLower) || company.includes(searchLower);
                        });
                        
                        if (filtered.length > 0) {
                            const resultsDiv = document.getElementById('vendor-search-results');
                            resultsDiv.innerHTML = filtered.map(vendor => `
                                <div class="border-b last:border-b-0 border-gray-200 p-3 hover:bg-gray-50 cursor-pointer" onclick="selectVendor('${vendor._id}', '${vendor.email || ''}', '${(vendor.company || `${vendor.firstName} ${vendor.lastName}`).replace(/'/g, "\\'")}')">
                                    <div class="flex items-center gap-2">
                                        <div class="flex-1">
                                            <div class="font-medium text-gray-900">${vendor.company || `${vendor.firstName} ${vendor.lastName}`}</div>
                                        </div>
                                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">Partner</span>
                                    </div>
                                </div>
                            `).join('');
                            resultsDiv.classList.remove('hidden');
                        } else {
                            document.getElementById('vendor-search-results').innerHTML = '<div class="p-3 text-center text-gray-500">No partners found. Type full email to invite others.</div>';
                            document.getElementById('vendor-search-results').classList.remove('hidden');
                        }
                    }
                } catch (error) {
                    console.error('Vendor search error:', error);
                    document.getElementById('vendor-search-results').innerHTML = '<div class="p-3 text-center text-red-500">Search failed</div>';
                    document.getElementById('vendor-search-results').classList.remove('hidden');
                }
            }, 200);
        });
        
        function selectVendor(vendorId, vendorEmail, vendorName) {
            selectedVendor = { id: vendorId, email: vendorEmail, name: vendorName };
            document.getElementById('selected-vendor-id').value = vendorId;
            document.getElementById('selected-vendor-email').value = vendorEmail;
            document.getElementById('selected-vendor-name').textContent = `${vendorName} (${vendorEmail})`;
            
            document.getElementById('selected-vendor-display').classList.remove('hidden');
            document.getElementById('vendor-search').value = '';
            document.getElementById('vendor-search-results').classList.add('hidden');
        }
        
        function clearVendorSelection() {
            selectedVendor = null;
            document.getElementById('selected-vendor-id').value = '';
            document.getElementById('selected-vendor-email').value = '';
            document.getElementById('selected-vendor-display').classList.add('hidden');
            document.getElementById('vendor-search').value = '';
            document.getElementById('vendor-search').focus();
        }
        
        document.getElementById('clear-vendor-selection')?.addEventListener('click', (e) => {
            e.preventDefault();
            clearVendorSelection();
        });
        
        document.getElementById('invite-vendor-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let vendorId = document.getElementById('selected-vendor-id').value;
            let vendorEmail = document.getElementById('selected-vendor-email').value;
            const message = document.getElementById('vendor-invite-message').value.trim();
            const projectId = document.getElementById('invite-project-id').value;
            const searchInput = document.getElementById('vendor-search').value.trim();
            
            // If no vendor selected but email-like text in search field, use it as email
            if (!vendorId && !vendorEmail && searchInput) {
                if (searchInput.includes('@')) {
                    vendorEmail = searchInput;
                } else {
                    alert('Please select a vendor from search results or enter a valid email address');
                    return;
                }
            }
            
            if (!vendorId && !vendorEmail) {
                alert('Please select a vendor or enter an email address');
                return;
            }
            
            try {
                const res = await authFetch(`/api/projects/${projectId}/invite-vendor`, {
                    method: 'POST',
                    body: JSON.stringify({
                        vendorId: vendorId || null,
                        vendorEmail: vendorEmail || null,
                        message
                    })
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to invite vendor');
                }
                
                alert('Vendor invited successfully!');
                closeInviteVendorModal();
                loadMyProjects();
            } catch (error) {
                alert(error.message || 'Failed to invite vendor');
            }
        });
    </script>
</body>
</html>
