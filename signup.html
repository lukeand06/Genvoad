<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for Genovad - Connect with contractors, vendors, and project owners in the construction industry.">
    <meta name="keywords" content="construction, contractors, vendors, projects, bidding, network">
    <meta name="author" content="Genovad">
    <meta name="robots" content="index, follow">
    <meta name="canonical" href="https://www.genovad.com/signup.html">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.genovad.com/signup.html">
    <meta property="og:title" content="Sign Up - Genovad">
    <meta property="og:description" content="Join Genovad and connect with contractors, vendors, and project owners.">
    <meta property="og:image" content="https://www.genovad.com/public/logo.svg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.genovad.com/signup.html">
    <meta property="twitter:title" content="Sign Up - Genovad">
    <meta property="twitter:description" content="Join Genovad and connect with contractors, vendors, and project owners.">
    <meta property="twitter:image" content="https://www.genovad.com/public/logo.svg">
    
    <title>Sign Up - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center">
                    <img src="/public/logo.svg" alt="Genovad" class="h-12 w-auto">
                </a>
                <h2 class="mt-6 text-3xl font-bold text-gray-900">Create your account</h2>
                <p class="mt-2 text-sm text-gray-600">Join the construction services marketplace</p>
            </div>

            <!-- Signup Form -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded"></div>
                <div id="success-message" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded"></div>
                
                <!-- Step 1: Basic Info -->
                <form id="signup-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                            <input type="text" id="firstName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                            <input type="text" id="lastName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">I am signing up as</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="border border-gray-300 rounded-lg p-4 flex items-start gap-3 cursor-pointer hover:border-emerald-400 hover:bg-emerald-50">
                                <input type="radio" name="role" value="owner" class="mt-1 h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900">
                                <div>
                                    <p class="font-semibold text-gray-900">Project Owner</p>
                                    <p class="text-sm text-gray-600">Post projects, invite bids, and manage contractors.</p>
                                </div>
                            </label>
                            <label class="border border-gray-300 rounded-lg p-4 flex items-start gap-3 cursor-pointer hover:border-emerald-400 hover:bg-emerald-50">
                                <input type="radio" name="role" value="vendor" class="mt-1 h-4 w-4 text-gray-900 border-gray-300 focus:ring-gray-900">
                                <div>
                                    <p class="font-semibold text-gray-900">Vendor / Contractor</p>
                                    <p class="text-sm text-gray-600">Bid on work, negotiate terms, and deliver projects.</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                        <input type="text" id="company" required placeholder="Your company or trade name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                        <p class="mt-1 text-xs text-gray-500">At least 6 characters</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                        <input type="password" id="confirmPassword" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <button type="submit" id="signup-btn" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                        Create Account
                    </button>
                </form>

                <!-- Step 2: Verification (hidden initially) -->
                <div id="verification-form" class="hidden space-y-4">
                    <div class="text-center mb-4">
                        <div class="text-green-500 text-4xl mb-2">✓</div>
                        <h3 class="font-semibold text-lg">Check your email!</h3>
                        <p class="text-sm text-gray-600 mt-2">We've sent a verification code to <span id="verify-email" class="font-medium"></span></p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
                        <input type="text" id="verificationCode" maxlength="6" placeholder="000000" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-center text-2xl font-mono tracking-widest focus:ring-2 focus:ring-gray-900 focus:border-transparent">
                    </div>
                    
                    <button id="verify-btn" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                        Verify Email
                    </button>
                    
                    <div class="text-center space-y-2 pt-2">
                        <button id="resend-code-btn" type="button" class="text-sm text-gray-600 hover:text-gray-900 underline">Didn't receive code? Resend</button>
                        <button id="try-again-btn" type="button" class="block w-full text-sm text-gray-600 hover:text-gray-900 underline">Try creating account again</button>
                    </div>
                </div>

                <div class="mt-6 text-center text-sm">
                    <span class="text-gray-600">Already have an account?</span>
                    <a href="login.html" class="text-gray-900 font-medium hover:underline ml-1">Sign in</a>
                </div>
            </div>
        </div>
    </div>


    <script src="/public/js/auth.js"></script>
    <script>
        redirectIfAuth();

        let userEmail = '';
        let userRole = '';

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const role = document.querySelector('input[name="role"]:checked')?.value;
            const company = document.getElementById('company').value.trim();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!role) {
                showError('Please select Owner or Vendor');
                return;
            }

            if (!company) {
                showError('Please enter your company name');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            
            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, company, role })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Signup failed');
                }
                
                userEmail = email;
                userRole = role;
                document.getElementById('verify-email').textContent = email;
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('verification-form').classList.remove('hidden');
                showSuccess('Account created! Check your email for verification code.');
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        document.getElementById('verify-btn').addEventListener('click', async () => {
            const code = document.getElementById('verificationCode').value;
            
            if (code.length !== 6) {
                showError('Please enter a 6-digit code');
                return;
            }
            
            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            
            try {
                const response = await fetch(`${API_URL}/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, code, role: userRole })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Verification failed');
                }
                
                setToken(data.token);
                setCurrentUser(data.user);
                window.location.href = '/dashboard.html';
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Verify Email';
            }
        });

        document.getElementById('resend-code-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = e.target;
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            try {
                const response = await fetch(`${API_URL}/auth/resend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, role: userRole })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to resend');
                }
                
                showSuccess('Verification code resent! Check your email.');
                btn.textContent = 'Code sent';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = 'Didn\'t receive code? Resend';
                }, 3000);
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Didn\'t receive code? Resend';
            }
        });

        document.getElementById('try-again-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('verification-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('verificationCode').value = '';
            clearError();
            clearSuccess();
            
            // Reset form
            document.getElementById('signup-form').reset();
        });
    </script>
</body>
</html>
