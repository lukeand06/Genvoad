<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Messages - Genovad Communities</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/community-dashboard.html" class="flex items-center gap-3">
          <img src="/public/logo-icon.png" alt="Genovad" class="h-10 w-auto" />
          <span class="text-sm text-gray-500 hidden sm:inline">Communities</span>
        </a>
        <div class="hidden md:flex items-center gap-2 text-sm">
          <a href="/community-dashboard.html" class="px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100">Feed</a>
          <a href="/community-people.html" class="px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-100">Members</a>
          <a href="/community-messages.html" class="px-3 py-2 rounded-lg bg-gray-900 text-white">Messages</a>
          <a href="/community-hub.html" class="px-3 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">Hub</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a href="/community-messages.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Inbox</a>
        <div class="relative" id="user-menu">
          <button id="user-menu-btn" class="flex items-center space-x-2">
            <div id="user-avatar"></div>
          </button>
          <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
            <hr class="my-1">
            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8">
    <h1 class="text-3xl font-bold text-gray-900">Community Messages</h1>
    <p class="text-sm text-gray-600 mt-1">Recent conversation threads for your account.</p>

    <div id="threads" class="mt-5 space-y-3">
      <p class="text-gray-500">Loading conversations...</p>
    </div>

    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-4 text-sm text-gray-600">
      You are in the Communities messaging workspace.
    </div>
  </main>

  <div class="md:hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-1.5rem)] max-w-md">
    <div class="bg-white border border-gray-200 shadow-lg rounded-2xl px-2 py-1.5">
      <div class="flex gap-1 text-center text-xs font-medium">
        <a href="/community-dashboard.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Feed</a>
        <a href="/community-people.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Members</a>
        <a href="/community-messages.html" class="flex-1 px-2 py-2 rounded-xl bg-gray-900 text-white">Messages</a>
        <a href="/community-hub.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Hub</a>
      </div>
    </div>
  </div>

  <script src="/public/js/auth.js"></script>
  <script>
    setActivePlatform('communities');
    if (!requireAuth()) throw new Error('Not authenticated');
    if (!requirePlatform('communities')) throw new Error('Communities platform access only');
    if (!requireCommunityMembership('/community-hub.html')) throw new Error('Community membership required');

    const currentUser = getCurrentUser();
    document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
    document.getElementById('user-menu-btn').addEventListener('click', () => {
      document.getElementById('user-dropdown').classList.toggle('hidden');
    });
    document.getElementById('logout-btn').addEventListener('click', logout);

    async function loadConversations() {
      const host = document.getElementById('threads');
      try {
        const res = await authFetch('/api/messages/conversations');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load conversations');

        const conversations = data.conversations || [];
        if (!conversations.length) {
          host.innerHTML = '<div class="bg-white border border-gray-200 rounded-lg p-4 text-gray-500">No conversations yet.</div>';
          return;
        }

        host.innerHTML = conversations.slice(0, 10).map(conv => {
          const other = conv.otherUser || conv.user || {};
          const name = `${other.firstName || ''} ${other.lastName || ''}`.trim() || other.company || 'User';
          const preview = (typeof conv.lastMessage === 'string' ? conv.lastMessage : conv.lastMessage?.content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<article class="bg-white border border-gray-200 rounded-lg p-4"><h2 class="font-semibold text-gray-900">${name}</h2><p class="text-sm text-gray-600 mt-2">${preview || 'No preview available'}</p></article>`;
        }).join('');
      } catch (e) {
        host.innerHTML = `<div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4">${e.message}</div>`;
      }
    }

    loadConversations();
  </script>
</body>
</html>
