<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/public/css/mobile-optimizations.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .touch-manipulation { touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center">
                        <img src="/public/logo-icon.png?v=2" alt="Genovad" class="h-10 w-auto" onerror="console.error('Logo failed to load:', this.src)">
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <!-- Mobile Menu Button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg mr-2">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                        </svg>
                        <span id="nav-notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" id="cta-button" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn" class="flex items-center space-x-2">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-xs text-gray-500 uppercase tracking-wide">Current Role</p>
                                <p class="text-sm font-semibold text-gray-900 capitalize mt-1" id="current-role">Owner</p>
                            </div>
                            <div id="role-switcher" class="px-2 py-2 border-b border-gray-100">
                                <!-- Role buttons will be inserted here -->
                            </div>
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <button id="feedback-btn" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Send Feedback</button>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Drawer -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-40 md:hidden">
        <div class="fixed inset-0 bg-black bg-opacity-50" id="mobile-menu-backdrop"></div>
        <div class="fixed top-0 left-0 w-64 h-full bg-white shadow-lg overflow-y-auto">
            <div class="p-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Menu</h3>
            </div>
            <nav class="p-4 space-y-2">
                <a href="/dashboard.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                <a href="/projects.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                <a href="/messages.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                <a href="/browse.html" class="block px-4 py-3 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                <a href="/notifications.html" class="block px-4 py-3 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg hover:bg-gray-100">Notifications</a>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <a href="/create-project.html" class="block w-full px-4 py-3 text-center text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800">Post Project</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Notifications</h1>
                <p class="text-gray-600 mt-1">Stay updated with your activity</p>
            </div>
            <button id="mark-all-read" class="text-sm text-gray-600 hover:text-gray-900 font-medium">Mark all as read</button>
        </div>

        <!-- Filter Tabs -->
        <div class="bg-white rounded-lg border border-gray-200 mb-6">
            <nav class="flex overflow-x-auto border-b border-gray-200 scrollbar-hide">
                <button onclick="filterNotifications('all')" id="tab-all" class="notification-tab flex-shrink-0 px-4 sm:px-6 py-3 text-sm font-medium border-b-2 border-gray-900 text-gray-900 whitespace-nowrap">
                    All
                </button>
                <button onclick="filterNotifications('unread')" id="tab-unread" class="notification-tab flex-shrink-0 px-4 sm:px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                    Unread
                </button>
                <button onclick="filterNotifications('partnerships')" id="tab-partnerships" class="notification-tab flex-shrink-0 px-4 sm:px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                    Partnerships
                </button>
                <button onclick="filterNotifications('projects')" id="tab-projects" class="notification-tab flex-shrink-0 px-4 sm:px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                    Projects
                </button>
                <button onclick="filterNotifications('messages')" id="tab-messages" class="notification-tab flex-shrink-0 px-4 sm:px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                    Messages
                </button>
            </nav>
        </div>

        <!-- Notifications List -->
        <div id="notifications-container" class="bg-white rounded-lg border border-gray-200 divide-y divide-gray-200">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading notifications...</p>
            </div>
        </div>
    </div>


    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const user = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(user, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Mobile Menu Handler
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuBackdrop = document.getElementById('mobile-menu-backdrop');
        const mobileMenuLinks = mobileMenu.querySelectorAll('a');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
        
        mobileMenuBackdrop.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
        });
        
        mobileMenuLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
            });
        });

        let allNotifications = [];
        let currentFilter = 'all';

        // Load notifications from API
        async function loadNotifications() {
            try {
                const response = await authFetch('/api/notifications');
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Failed to load notifications');
                
                // Convert API response format to display format
                allNotifications = data.notifications.map(notif => ({
                    id: notif._id,
                    type: notif.type,
                    read: notif.read,
                    timestamp: new Date(notif.createdAt),
                    data: notif.data
                }));
                
                displayNotifications(allNotifications);
                updateBadge();
            } catch (error) {
                console.error('Error loading notifications:', error);
                document.getElementById('notifications-container').innerHTML = '<div class="text-center py-12 text-red-500">Failed to load notifications</div>';
            }
        }

        function displayNotifications(notifications) {
            const container = document.getElementById('notifications-container');
            
            if (notifications.length === 0) {
                container.innerHTML = '<div class="text-center py-12"><p class="text-gray-500">No notifications</p></div>';
                return;
            }

            container.innerHTML = notifications.map(notif => renderNotification(notif)).join('');
        }

        function renderNotification(notif) {
            const bgClass = notif.read ? 'bg-white' : 'bg-blue-50';
            const indicatorClass = notif.read ? 'invisible' : '';
            
            let icon, content, actions = '';
            
            switch(notif.type) {
                case 'partnership_request':
                    icon = `<div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900"><strong>${notif.data.userName}</strong> ${notif.data.userCompany ? `from <strong>${notif.data.userCompany}</strong>` : ''} wants to add you as a partner</p>`;
                    actions = `
                        <div class="flex flex-col sm:flex-row gap-2 mt-3">
                            <button onclick="event.stopPropagation(); acceptPartnership('${notif.data.userId}', '${notif.id}')" class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 active:bg-gray-700 touch-manipulation">Accept</button>
                            <button onclick="event.stopPropagation(); declinePartnership('${notif.data.userId}', '${notif.id}')" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 active:bg-gray-100 touch-manipulation">Decline</button>
                        </div>
                    `;
                    break;
                    
                case 'partnership_accepted':
                    icon = `<div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900"><strong>${notif.data.userName}</strong> ${notif.data.userCompany ? `from <strong>${notif.data.userCompany}</strong>` : ''} accepted your partnership request</p>`;
                    actions = `<a href="/profile.html?id=${notif.data.userId}" class="text-sm text-blue-600 hover:text-blue-700 font-medium mt-2 inline-block">View Profile →</a>`;
                    break;
                    
                case 'bid_accepted':
                    icon = `<div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900">🎉 Your bid of <strong>${formatCurrency(notif.data.amount)}</strong> for <strong>${notif.data.projectTitle}</strong> was accepted!</p>`;
                    actions = `<a href="/project-detail.html?id=${notif.data.projectId}" class="text-sm text-blue-600 hover:text-blue-700 font-medium mt-2 inline-block">View Project →</a>`;
                    break;
                    
                case 'bid_received':
                    icon = `<div class="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900"><strong>${notif.data.bidderName}</strong> placed a bid of <strong>${formatCurrency(notif.data.amount)}</strong> on <strong>${notif.data.projectTitle}</strong></p>`;
                    actions = `<a href="/project-detail.html?id=${notif.data.projectId}" class="text-sm text-blue-600 hover:text-blue-700 font-medium mt-2 inline-block">Review Bid →</a>`;
                    break;
                    
                case 'new_message':
                    icon = `<div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900"><strong>${notif.data.userName}</strong> sent you a message</p><p class="text-sm text-gray-600 mt-1">${notif.data.preview}</p>`;
                    actions = `<a href="/messages.html?user=${notif.data.userId}" class="text-sm text-blue-600 hover:text-blue-700 font-medium mt-2 inline-block">Reply →</a>`;
                    break;

                case 'company_invite_accepted':
                    icon = `<div class="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900"><strong>${notif.data.invitedUserName || 'A teammate'}</strong> accepted your invitation to join <strong>${notif.data.companyName || 'your company'}</strong>${notif.data.inviteRole ? ` as a ${notif.data.inviteRole}` : ''}.</p>`;
                    actions = `<a href="/company.html" class="text-sm text-blue-600 hover:text-blue-700 font-medium mt-2 inline-block">View Company →</a>`;
                    break;
                    
                default:
                    icon = `<div class="w-12 h-12 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </div>`;
                    content = `<p class="text-sm text-gray-900">Notification</p>`;
            }
            
            return `
                <div class="${bgClass} p-4 sm:p-6 hover:bg-gray-50 transition active:bg-gray-100 cursor-pointer" onclick="markAsRead('${notif.id}')">
                    <div class="flex items-start gap-3 sm:gap-4">
                        <div class="flex-shrink-0">${icon}</div>
                        <div class="flex-1 min-w-0">
                            ${content}
                            ${actions}
                            <p class="text-xs text-gray-500 mt-2">${formatDate(notif.timestamp)}</p>
                        </div>
                        <div class="flex-shrink-0 pt-1">
                            <span class="w-2 h-2 bg-blue-600 rounded-full inline-block ${indicatorClass}"></span>
                        </div>
                    </div>
                </div>
            `;
        }

        function filterNotifications(filter) {
            currentFilter = filter;
            
            // Update tabs
            document.querySelectorAll('.notification-tab').forEach(tab => {
                tab.classList.remove('border-gray-900', 'text-gray-900');
                tab.classList.add('border-transparent', 'text-gray-600');
            });
            document.getElementById(`tab-${filter}`).classList.remove('border-transparent', 'text-gray-600');
            document.getElementById(`tab-${filter}`).classList.add('border-gray-900', 'text-gray-900');
            
            // Filter notifications
            let filtered = allNotifications;
            
            if (filter === 'unread') {
                filtered = allNotifications.filter(n => !n.read);
            } else if (filter === 'partnerships') {
                filtered = allNotifications.filter(n => n.type.includes('partnership'));
            } else if (filter === 'projects') {
                filtered = allNotifications.filter(n => n.type.includes('bid') || n.type.includes('project'));
            } else if (filter === 'messages') {
                filtered = allNotifications.filter(n => n.type.includes('message'));
            }
            
            displayNotifications(filtered);
        }

        function markAsRead(notificationId) {
            // Convert to string for comparison since ID comes from onclick
            const idStr = String(notificationId);
            const notif = allNotifications.find(n => String(n.id) === idStr);
            if (notif && !notif.read) {
                notif.read = true;
                
                // Call API to mark as read
                authFetch(`/api/notifications/${idStr}/read`, { method: 'PATCH' })
                    .catch(err => console.error('Failed to mark as read:', err));
                
                filterNotifications(currentFilter);
                updateBadge();
            }
        }

        document.getElementById('mark-all-read').addEventListener('click', async () => {
            try {
                await authFetch('/api/notifications/read-all', { method: 'PATCH' });
                allNotifications.forEach(n => n.read = true);
                filterNotifications(currentFilter);
                updateBadge();
            } catch (err) {
                console.error('Failed to mark all as read:', err);
            }
        });

        async function acceptPartnership(userId, notificationId) {
            try {
                await authFetch(`/partners/${userId}`, { method: 'POST' });
                markAsRead(String(notificationId));
                alert('Partnership accepted!');
                await loadNotifications(); // Refresh notifications
            } catch (err) {
                console.error('Partnership error:', err);
                alert('Failed to accept partnership');
            }
        }

        async function declinePartnership(userId, notificationId) {
            markAsRead(String(notificationId));
            alert('Partnership declined');
            await loadNotifications(); // Refresh notifications
        }

        function updateBadge() {
            const unreadCount = allNotifications.filter(n => !n.read).length;
            const badge = document.getElementById('nav-notification-badge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        loadNotifications();
    </script>
</body>
</html>
