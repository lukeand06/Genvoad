<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Feed - Genovad Communities</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/public/css/mobile-calm-mode.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="notification-toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 max-w-md pointer-events-none"></div>

  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-8">
        <a href="/community-hub.html" class="flex items-center">
          <img src="/public/logo-icon.png?v=2" alt="Genovad" class="h-12 w-auto" />
        </a>

        <div class="hidden md:flex space-x-1">
          <a href="/community-hub.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Hub</a>
          <a href="/community-dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-900 bg-gray-50 rounded-lg">Feed</a>
          <a href="/community-people.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Members</a>
          <a href="/community-messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <a href="/community-messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Inbox</a>
        <div class="relative" id="user-menu">
          <button id="user-menu-btn" class="flex items-center space-x-2">
            <div id="user-avatar"></div>
          </button>
          <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="text-xs text-gray-500 uppercase tracking-wide">Current Role</p>
              <p class="text-sm font-semibold text-gray-900 capitalize mt-1" id="current-role">Owner</p>
            </div>
            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
            <hr class="my-1">
            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8 space-y-6">
    <section class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 sm:p-5">
      <div class="flex items-start justify-between gap-4">
        <div class="min-w-0">
          <p class="text-xs uppercase tracking-wide text-gray-500">Community Feed</p>
          <h1 id="feed-user-name" class="text-lg sm:text-xl font-semibold text-gray-900 truncate">Welcome back</h1>
          <p id="feed-user-meta" class="text-sm text-gray-600 mt-1"></p>
          <p class="text-sm text-gray-700 mt-2">This is your community activity stream, personalized to your profile and your active community.</p>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 sm:p-5">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <div class="md:col-span-2">
          <label for="feed-keyword-filter" class="block text-xs font-semibold uppercase tracking-wide text-gray-600 mb-1">What</label>
          <input id="feed-keyword-filter" type="text" placeholder="Search posts, topics, or people" class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm" />
        </div>
        <div>
          <label for="feed-type-filter" class="block text-xs font-semibold uppercase tracking-wide text-gray-600 mb-1">Type</label>
          <select id="feed-type-filter" class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-white">
            <option value="">All posts</option>
            <option value="post">Posts</option>
            <option value="article">Articles</option>
            <option value="news">News</option>
          </select>
        </div>
        <div class="flex items-end gap-2">
          <button onclick="applyFeedFilters()" class="flex-1 px-4 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Apply</button>
          <button onclick="clearFeedFilters()" class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50">Clear</button>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 gap-6">
      <div class="w-full">
        <div class="bg-white rounded-lg border border-gray-200 mb-6 shadow-sm">
          <div class="p-4 border-b border-gray-200">
            <div class="flex items-center gap-3">
              <div id="user-post-avatar" class="w-10 h-10 rounded-full bg-gray-200"></div>
              <button onclick="openPostModal()" class="flex-1 text-left px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded-full text-gray-500 text-sm cursor-pointer transition">
                Share your thoughts, articles, or news...
              </button>
            </div>
          </div>
          <div class="px-4 py-3 flex justify-between items-center border-t border-gray-200">
            <div class="flex gap-2">
              <button onclick="setPostType('article')" class="flex items-center gap-2 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg text-sm hover:text-blue-600">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Article
              </button>
              <button onclick="setPostType('post')" class="flex items-center gap-2 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg text-sm hover:text-green-600">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h10m7 6H3a2 2 0 01-2-2V7a2 2 0 012-2h3.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293H17a2 2 0 012 2v10a2 2 0 01-2 2z"/>
                </svg>
                Post
              </button>
              <button onclick="setPostType('news')" class="flex items-center gap-2 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg text-sm hover:text-amber-600">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v11l4-4"/>
                </svg>
                News
              </button>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm">
          <div class="p-6 border-b border-gray-200">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold text-gray-900">Feed</h2>
            </div>
          </div>

          <div id="activity-feed" class="divide-y divide-gray-200">
            <div class="p-6 text-center text-gray-500"><p>Loading feed...</p></div>
          </div>

          <div id="load-more-container" class="p-6 text-center border-t border-gray-200 hidden">
            <button onclick="loadMorePosts()" id="load-more-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition">Load More Posts</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="md:hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-1.5rem)] max-w-md">
    <div class="bg-white border border-gray-200 shadow-lg rounded-2xl px-2 py-1.5">
      <div class="flex gap-1 text-center text-xs font-medium">
        <a href="/community-hub.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Hub</a>
        <a href="/community-dashboard.html" class="flex-1 px-2 py-2 rounded-xl bg-gray-900 text-white">Feed</a>
        <a href="/community-people.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Members</a>
        <a href="/community-messages.html" class="flex-1 px-2 py-2 rounded-xl text-gray-600 hover:bg-gray-50">Messages</a>
      </div>
    </div>
  </div>

  <div id="post-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end sm:items-center justify-center p-4">
    <div class="bg-white rounded-t-lg sm:rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-lg">
      <div class="p-6 border-b border-gray-200 flex items-center justify-between sticky top-0 bg-white">
        <h2 class="text-xl font-semibold text-gray-900">Create a Post</h2>
        <button onclick="closePostModal()" class="text-gray-500 hover:text-gray-700">✕</button>
      </div>

      <form id="post-form" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Title (optional)</label>
          <input type="text" id="post-title" maxlength="200" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Post title" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">What's on your mind?</label>
          <textarea id="post-content" rows="6" maxlength="5000" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm resize-none" placeholder="Share an update..." required></textarea>
          <p class="text-xs text-gray-500 mt-1"><span id="char-count">0</span>/5000 characters</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Add Images (optional)</label>
          <input type="file" id="post-images" multiple accept="image/*" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm" />
        </div>
        <div class="flex gap-2 pt-4 border-t border-gray-200">
          <button type="button" onclick="closePostModal()" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">Cancel</button>
          <button type="button" id="post-submit-btn" onclick="createPost()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">Post</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/public/js/auth.js?v=20260202-2"></script>
  <script>
    setActivePlatform('communities');
    if (!requireAuth()) throw new Error('Not authenticated');
    if (!requirePlatform('communities')) throw new Error('Communities platform access only');
    if (!requireCommunityMembership('/community-hub.html')) throw new Error('Community membership required');

    const currentUser = getCurrentUser();
    let currentPostType = 'post';
    let currentFeedFilters = {};
    let feedPage = 1;
    let totalFeedPages = 1;
    let isLoadingFeed = false;

    document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
    document.getElementById('user-post-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
    document.getElementById('current-role').textContent = getUserRole();

    document.getElementById('feed-user-name').textContent = `Welcome back, ${currentUser?.firstName || 'there'}`;
    const roleLabel = (getUserRole() || 'member').toUpperCase();
    const companyLabel = currentUser?.company ? ` • ${currentUser.company}` : '';
    document.getElementById('feed-user-meta').textContent = `${roleLabel}${companyLabel}`;

    document.getElementById('user-menu-btn').addEventListener('click', () => {
      document.getElementById('user-dropdown').classList.toggle('hidden');
    });
    document.getElementById('logout-btn').addEventListener('click', logout);

    document.getElementById('post-content').addEventListener('input', (e) => {
      document.getElementById('char-count').textContent = e.target.value.length;
    });

    function setPostType(type) {
      currentPostType = type;
      openPostModal();
    }

    function openPostModal() {
      document.getElementById('post-modal').classList.remove('hidden');
      document.getElementById('post-content').focus();
    }

    function closePostModal() {
      document.getElementById('post-modal').classList.add('hidden');
      document.getElementById('post-form').reset();
      document.getElementById('char-count').textContent = '0';
      currentPostType = 'post';
    }

    document.getElementById('feed-keyword-filter').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyFeedFilters();
    });

    function applyFeedFilters() {
      const postType = document.getElementById('feed-type-filter').value;
      const keyword = document.getElementById('feed-keyword-filter').value.trim().toLowerCase();
      currentFeedFilters = {};
      if (postType) currentFeedFilters.postType = postType;
      if (keyword) currentFeedFilters.keyword = keyword;
      feedPage = 1;
      loadFeed();
    }

    function clearFeedFilters() {
      currentFeedFilters = {};
      document.getElementById('feed-type-filter').value = '';
      document.getElementById('feed-keyword-filter').value = '';
      feedPage = 1;
      loadFeed();
    }

    function applyClientFeedFilters(posts) {
      let filtered = posts;
      if (currentFeedFilters.postType) {
        filtered = filtered.filter(p => p.type === currentFeedFilters.postType);
      }
      if (currentFeedFilters.keyword) {
        const q = currentFeedFilters.keyword;
        filtered = filtered.filter(p => {
          const title = (p.title || '').toLowerCase();
          const content = (p.content || '').toLowerCase();
          const author = (p.authorName || '').toLowerCase();
          const company = (p.authorCompany || '').toLowerCase();
          return title.includes(q) || content.includes(q) || author.includes(q) || company.includes(q);
        });
      }
      return filtered;
    }

    function getTimeAgo(date) {
      const now = new Date();
      const diff = now - new Date(date);
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return new Date(date).toLocaleDateString();
    }

    function renderPostCard(post) {
      const isLiked = post.isLiked || false;
      const authorName = post.authorName || post.author?.company || 'Member';

      return `
        <div class="p-6 hover:bg-gray-50 transition" data-post-id="${post._id}">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-600 flex items-center justify-center text-white font-semibold">${authorName.charAt(0).toUpperCase()}</div>
            <div class="flex-1">
              <p class="font-medium text-gray-900">${authorName}</p>
              <p class="text-xs text-gray-500">${post.authorCompany ? post.authorCompany + ' • ' : ''}${getTimeAgo(post.createdAt)}</p>
            </div>
          </div>

          ${post.title ? `<h3 class="text-base font-semibold text-gray-900 mb-2">${post.title}</h3>` : ''}
          <p class="text-gray-800 text-sm mb-3 whitespace-pre-wrap">${(post.content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>

          ${post.images && post.images.length ? `
            <div class="mb-4 flex flex-wrap gap-2">
              ${post.images.map(img => `<img src="${img}" alt="Post image" class="max-h-96 rounded-lg object-cover cursor-pointer hover:opacity-90" onclick="openImageModal('${img}')">`).join('')}
            </div>
          ` : ''}

          <div class="flex items-center gap-4 text-gray-600 text-sm pt-3 border-t border-gray-100">
            <button onclick="likePost('${post._id}')" class="flex items-center gap-1 hover:text-red-600 transition ${isLiked ? 'text-red-600' : ''}">❤️ <span>${post.likeCount || 0}</span></button>
            <button onclick="toggleComments('${post._id}')" class="flex items-center gap-1 hover:text-blue-600 transition">💬 <span>${post.commentCount || 0}</span></button>
            <button onclick="sharePost('${post._id}')" class="flex items-center gap-1 hover:text-green-600 transition">Share</button>
          </div>

          <div id="comments-${post._id}" class="hidden mt-4 pt-4 border-t border-gray-100 space-y-3">
            <div class="flex items-center gap-2">
              <input type="text" id="comment-input-${post._id}" placeholder="Write a comment..." class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-sm">
              <button onclick="postComment('${post._id}')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">Post</button>
            </div>
          </div>
        </div>
      `;
    }

    async function createPost() {
      const content = document.getElementById('post-content').value.trim();
      const title = document.getElementById('post-title').value.trim();
      const fileInput = document.getElementById('post-images');
      const submitBtn = document.getElementById('post-submit-btn');

      if (!content) {
        alert('Please write something before posting');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Posting...';

      try {
        const formData = new FormData();
        formData.append('content', content);
        formData.append('title', title);
        formData.append('type', currentPostType);

        if (fileInput.files.length > 0) {
          for (const file of fileInput.files) {
            formData.append('images', file);
          }
        }

        const res = await authFetch('/api/posts', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create post');

        closePostModal();
        await loadFeed();
      } catch (error) {
        alert(error.message || 'Failed to create post');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Post';
      }
    }

    async function loadFeed() {
      if (isLoadingFeed) return;
      isLoadingFeed = true;

      const host = document.getElementById('activity-feed');
      try {
        const res = await authFetch('/api/feed?communityOnly=true&page=1&limit=20');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load feed');

        let posts = applyClientFeedFilters(data.posts || []);

        if (!posts.length) {
          host.innerHTML = '<div class="p-12 text-center text-gray-500"><p class="text-sm">No posts yet. Be the first to share something with your community.</p></div>';
          document.getElementById('load-more-container').classList.add('hidden');
          return;
        }

        host.innerHTML = posts.map(renderPostCard).join('');
        feedPage = 1;
        totalFeedPages = data.pagination?.pages || 1;
        document.getElementById('load-more-container').classList.toggle('hidden', totalFeedPages <= 1);
      } catch (error) {
        host.innerHTML = `<div class="p-6 text-center text-red-500"><p class="text-sm">${error.message || 'Failed to load feed'}</p></div>`;
      } finally {
        isLoadingFeed = false;
      }
    }

    async function loadMorePosts() {
      if (isLoadingFeed || feedPage >= totalFeedPages) return;
      isLoadingFeed = true;

      const loadMoreBtn = document.getElementById('load-more-btn');
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading...';

      try {
        feedPage += 1;
        const res = await authFetch(`/api/feed?communityOnly=true&page=${feedPage}&limit=20`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load more posts');

        let posts = applyClientFeedFilters(data.posts || []);

        if (posts.length) {
          document.getElementById('activity-feed').innerHTML += posts.map(renderPostCard).join('');
        }

        if (feedPage >= totalFeedPages) {
          document.getElementById('load-more-container').classList.add('hidden');
        }
      } catch (error) {
        feedPage -= 1;
      } finally {
        isLoadingFeed = false;
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load More Posts';
      }
    }

    async function likePost(postId) {
      try {
        const res = await authFetch(`/api/posts/${postId}/like`, { method: 'POST' });
        if (!res.ok) throw new Error('Failed to like post');
        await loadFeed();
      } catch (error) {
        console.error(error);
      }
    }

    function toggleComments(postId) {
      const el = document.getElementById(`comments-${postId}`);
      if (el) el.classList.toggle('hidden');
    }

    async function postComment(postId) {
      const input = document.getElementById(`comment-input-${postId}`);
      const content = input.value.trim();
      if (!content) return;

      try {
        const res = await authFetch(`/api/posts/${postId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        if (!res.ok) throw new Error('Failed to post comment');
        input.value = '';
        await loadFeed();
      } catch (error) {
        console.error(error);
      }
    }

    async function sharePost(postId) {
      const shareUrl = `${window.location.origin}/community-dashboard.html?post=${encodeURIComponent(postId)}`;
      try {
        if (navigator.share) {
          await navigator.share({ title: 'Genovad Community Post', text: 'Check out this post in my community.', url: shareUrl });
          return;
        }
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(shareUrl);
          return;
        }
      } catch (_) {}
      window.prompt('Copy this post link:', shareUrl);
    }

    function openImageModal(src) {
      window.open(src, '_blank');
    }

    loadFeed();
  </script>
</body>
</html>
