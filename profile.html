<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8">
                            <path d="M10 14L16 20L10 26V14Z" fill="#166534"/>
                            <path d="M16 14L22 20L16 26V14Z" fill="#166534"/>
                            <path d="M22 14L28 20L22 26V14Z" fill="#166534"/>
                        </svg>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </a>
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-xs text-gray-500 uppercase tracking-wide">Current Role</p>
                                <p class="text-sm font-semibold text-gray-900 capitalize mt-1" id="current-role">Owner</p>
                            </div>
                            <div id="role-switcher" class="px-2 py-2 border-b border-gray-100">
                                <!-- Role buttons will be inserted here -->
                            </div>
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <button id="feedback-btn" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Send Feedback</button>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="profile-content" class="space-y-6">
            <div class="text-center py-12">
                <div class="animate-pulse">
                    <div class="w-20 h-20 bg-gray-300 rounded-full mx-auto mb-4"></div>
                    <div class="h-4 bg-gray-300 rounded w-32 mx-auto mb-2"></div>
                    <div class="h-3 bg-gray-300 rounded w-48 mx-auto"></div>
                </div>
                <p class="text-gray-500 mt-4">Loading profile...</p>
            </div>
        </div>
    </div>


    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        let currentUser = getCurrentUser();
        
        // Validate user has ID, otherwise fetch fresh user data
        if (!currentUser._id && !currentUser.id) {
            console.error('User ID missing from localStorage, redirecting to login...');
            logout();
            throw new Error('Invalid user session');
        }
        
        const currentUserId = currentUser._id || currentUser.id;
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
        
        // Initialize role display
        const roleContainer = document.getElementById('role-switcher');
        const currentRoleLabel = document.getElementById('current-role');
        const userRole = currentUser.role || 'owner';
        if (currentRoleLabel) currentRoleLabel.textContent = userRole.charAt(0).toUpperCase() + userRole.slice(1);
        if (roleContainer) {
            roleContainer.innerHTML = `
                <div class="px-3 py-2 text-sm text-gray-700">Account Type: <span class="font-semibold">${userRole.charAt(0).toUpperCase() + userRole.slice(1)}</span></div>
                <a href="/settings.html#role-ui" class="block w-full px-3 py-2 text-sm font-medium text-gray-700 rounded hover:bg-gray-50">Manage Account Type</a>
            `;
        }
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('id') || currentUserId;
        const isOwnProfile = profileUserId === currentUserId;

        let globalProfile = null;

        async function uploadProfilePicture(event) {
            const file = event.target.files[0];
            if (!file) return;

            console.log('Upload started:', file.name, file.type, file.size);

            // Validate file type
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('Image size must be less than 5MB');
                return;
            }

            // Show loading indicator
            const profileContent = document.getElementById('profile-content');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'upload-loading';
            loadingDiv.className = 'fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center';
            loadingDiv.innerHTML = '<div class="bg-white rounded-lg p-6 text-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-900 mx-auto mb-4"></div><p class="text-gray-900 font-medium">Uploading...</p></div>';
            document.body.appendChild(loadingDiv);

            const formData = new FormData();
            formData.append('avatar', file);

            try {
                console.log('Sending upload request...');
                const response = await authFetch('/api/users/avatar', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to upload profile picture');
                }

                const data = await response.json();
                console.log('Upload successful:', data);
                
                // Update local storage
                const user = getCurrentUser();
                user.avatar = data.avatar;
                localStorage.setItem('user', JSON.stringify(user));

                // Reload profile to show new picture
                location.reload();
            } catch (error) {
                console.error('Error uploading profile picture:', error);
                document.getElementById('upload-loading')?.remove();
                alert('Failed to upload profile picture: ' + error.message);
            }
        }

        async function loadProfile() {
            try {
                const response = await authFetch(`/api/users/${profileUserId}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to load profile');
                }
                const data = await response.json();
                globalProfile = data.user;
                displayProfile(data.user);
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-content').innerHTML = `
                    <div class="text-center py-12">
                        <svg class="w-16 h-16 mx-auto text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <p class="text-red-600 font-medium mb-2">Failed to load profile</p>
                        <p class="text-gray-500 text-sm mb-4">${error.message}</p>
                        <button onclick="location.reload()" class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Reload Page</button>
                    </div>
                `;
            }
        }

        function displayProfile(profile) {
            const container = document.getElementById('profile-content');

            container.innerHTML = `
                <!-- Profile Header Card -->
                <div id="profile-card" class="bg-white rounded-lg border border-gray-200 shadow-sm" style="${profile.profileBackground ? `background: linear-gradient(135deg, ${profile.profileBackground} 0%, ${profile.profileBackground}dd 100%);` : ''}">
                    <!-- Profile Info Section -->
                    <div class="px-6 sm:px-8 py-6">
                        <!-- Avatar & Name -->
                        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-6">
                            <div class="flex flex-col sm:flex-row sm:items-start gap-4 mb-4 sm:mb-0">
                                <div class="relative group">
                                    ${getAvatarHTML(profile, 'w-20 h-20 sm:w-24 sm:h-24 border-4 border-white shadow-lg')}
                                    ${isOwnProfile ? `
                                        <button onclick="document.getElementById('avatar-upload').click()" class="absolute inset-0 bg-black bg-opacity-50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            </svg>
                                        </button>
                                        <input type="file" id="avatar-upload" accept="image/*" capture="user" class="hidden" onchange="uploadProfilePicture(event)">
                                    ` : ''}
                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <h1 class="text-2xl sm:text-3xl font-bold ${profile.profileBackground ? 'text-white' : 'text-gray-900'}">${profile.company || `${profile.firstName} ${profile.lastName}`}</h1>
                                        ${profile.registrarId ? '<svg class="w-6 h-6 text-blue-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : ''}
                                    </div>
                                    ${profile.company ? `<p class="text-base ${profile.profileBackground ? 'text-white/90' : 'text-gray-700'}">${profile.firstName} ${profile.lastName}${profile.title ? ` • ${profile.title}` : ''}</p>` : (profile.title ? `<p class="text-base ${profile.profileBackground ? 'text-white/90' : 'text-gray-700'}">${profile.title}</p>` : '')}
                                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm ${profile.profileBackground ? 'text-white/80' : 'text-gray-600'}">
                                        ${(profile.city || profile.state || profile.location) ? `
                                            <span class="flex items-center gap-1">
                                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                </svg>
                                                ${[profile.city, profile.state].filter(Boolean).join(', ') || profile.location}
                                            </span>
                                        ` : ''}
                                        ${profile.email ? `
                                            <span class="flex items-center gap-1">
                                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                                </svg>
                                                ${profile.email}
                                            </span>
                                        ` : ''}
                                        ${profile.phone ? `
                                            <span class="flex items-center gap-1">
                                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                                </svg>
                                                ${profile.phone}
                                            </span>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Action Buttons -->
                            <div class="flex flex-wrap gap-2 no-print">
                                ${isOwnProfile ? `
                                    <button onclick="toggleBackgroundPicker()" class="flex-1 sm:flex-none px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
                                        </svg>
                                        Background
                                    </button>
                                    <a href="/settings.html" class="flex-1 sm:flex-none px-5 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                        </svg>
                                        Edit Profile
                                    </a>
                                ` : `
                                    <a href="/messages.html?user=${profile._id}" class="flex-1 sm:flex-none px-5 py-2.5 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                                        </svg>
                                        Send Message
                                    </a>
                                    <button id="add-partner-btn" onclick="addAsPartner('${profile._id}')" class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                        </svg>
                                        <span id="partner-btn-text">Add Partner</span>
                                    </button>
                                `}
                            </div>
                        </div>

                        <!-- Background Picker (hidden by default) -->
                        ${isOwnProfile ? `
                        <div id="background-picker" class="hidden mt-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                            <p class="text-sm font-medium text-gray-700 mb-3">Choose Background Color</p>
                            <div class="grid grid-cols-4 sm:grid-cols-8 gap-2">
                                <button onclick="setProfileBackground('none')" class="w-12 h-12 rounded-lg border-2 border-gray-300 bg-white hover:border-gray-900 transition flex items-center justify-center" title="None">
                                    <svg class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                                <button onclick="setProfileBackground('#1e40af')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-blue-800 hover:border-gray-900 transition" title="Blue"></button>
                                <button onclick="setProfileBackground('#059669')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-green-700 hover:border-gray-900 transition" title="Green"></button>
                                <button onclick="setProfileBackground('#dc2626')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-red-600 hover:border-gray-900 transition" title="Red"></button>
                                <button onclick="setProfileBackground('#7c3aed')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-purple-600 hover:border-gray-900 transition" title="Purple"></button>
                                <button onclick="setProfileBackground('#ea580c')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-orange-600 hover:border-gray-900 transition" title="Orange"></button>
                                <button onclick="setProfileBackground('#0891b2')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-cyan-600 hover:border-gray-900 transition" title="Cyan"></button>
                                <button onclick="setProfileBackground('#1f2937')" class="w-12 h-12 rounded-lg border-2 border-transparent bg-gray-800 hover:border-gray-900 transition" title="Dark"></button>
                            </div>
                        </div>
                        ` : ''}
                    </div>

                    <!-- Quick Stats Bar -->
                    <div class="border-t border-gray-200 bg-gray-50">
                        <div class="grid grid-cols-2 sm:grid-cols-4 divide-x divide-gray-200">
                            <div class="p-4 sm:p-6 text-center hover:bg-white transition">
                                <div class="flex items-center gap-1 justify-center mb-1">
                                    ${[1,2,3,4,5].map(i => `<svg class="w-4 h-4 ${i <= Math.round(profile.rating || 0) ? 'text-yellow-400' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}
                                </div>
                                <p class="text-2xl sm:text-3xl font-bold text-gray-900">${profile.rating ? profile.rating.toFixed(1) : '0.0'}</p>
                                <p class="text-xs sm:text-sm text-gray-600 font-medium mt-1">${profile.reviewCount || 0} review${(profile.reviewCount || 0) !== 1 ? 's' : ''}</p>
                            </div>
                            <div class="p-4 sm:p-6 text-center hover:bg-white transition">
                                <svg class="w-8 h-8 mx-auto text-green-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <p class="text-2xl sm:text-3xl font-bold text-gray-900">${profile.projectsCompleted || 0}</p>
                                <p class="text-xs sm:text-sm text-gray-600 font-medium mt-1">completed</p>
                            </div>
                            <div class="p-4 sm:p-6 text-center hover:bg-white transition">
                                <svg class="w-8 h-8 mx-auto text-blue-500 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <p class="text-2xl sm:text-3xl font-bold text-gray-900">${profile.yearsExperience || 0}</p>
                                <p class="text-xs sm:text-sm text-gray-600 font-medium mt-1">years exp.</p>
                            </div>
                            <div class="p-4 sm:p-6 text-center hover:bg-white transition">
                                ${profile.registrarId ? `

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>

                    `;
                    return;
                }
                
                list.innerHTML = projects.map(p => {
                    const statusColors = {
                        'open': 'bg-blue-50 border-blue-200 text-blue-700',
                        'in-progress': 'bg-yellow-50 border-yellow-200 text-yellow-700',
                        'completed': 'bg-green-50 border-green-200 text-green-700',
                        'cancelled': 'bg-gray-50 border-gray-200 text-gray-700'

                    const statusClass = statusColors[p.status] || statusColors['open'];
                    
                    const bidCount = p.bids ? p.bids.length : 0;
                    
                    return `
                        <a href="/project-detail.html?id=${p._id}" class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow bg-white">
                            <div class="flex items-start justify-between gap-3 mb-2">
                                <h3 class="font-semibold text-gray-900 line-clamp-2">${p.title}</h3>
                                <span class="flex-shrink-0 px-2.5 py-1 text-xs font-semibold rounded-full border ${statusClass} capitalize">
                                    ${p.status}
                                </span>
                            </div>
                            
                            <p class="text-sm text-gray-600 line-clamp-2 mb-3">${p.description}</p>
                            
                            <div class="flex items-center justify-between text-xs text-gray-500 mb-3">
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                    ${formatCurrency(p.budget)}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    ${formatDate(p.createdAt)}
                                </span>
                            </div>
                            
                            <div class="flex items-center gap-2 pt-3 border-t border-gray-200">
                                <span class="inline-flex items-center gap-1.5 px-2 py-1 bg-gray-100 rounded text-xs font-medium text-gray-700">
                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                                    </svg>
                                    ${bidCount} ${bidCount === 1 ? 'bid' : 'bids'}
                                </span>
                            </div>
                        </a>
                    `;
                }).join('');
            } catch (e) {
                console.error('Error loading projects:', e);
                document.getElementById('projects-list').innerHTML = '<div class="col-span-full text-center py-8"><p class="text-sm text-red-600">Failed to load projects</p></div>';
            }
        }

        async function loadReviews(userId) {

                const list = document.getElementById('reviews-list-main');
                
                if (!res.ok) { 
                    list.innerHTML = '<div class="text-center py-8"><p class="text-sm text-red-600">Failed to load reviews</p></div>'; 
                    return; 
                }
                
                if (!data.reviews || data.reviews.length === 0) { 
                    list.innerHTML = `
                        <div class="text-center py-12 bg-gray-50 rounded-lg border border-gray-200">
                            <svg class="w-16 h-16 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                            </svg>
                            <p class="text-gray-700 font-semibold mb-1">No reviews yet</p>
                            <p class="text-sm text-gray-500">Be the first to share your experience</p>
                        </div>
                    `; 
                    return;

                    const isMyReview = r.reviewer && (r.reviewer._id || r.reviewer) === currentUserId;

                                ${getAvatarHTML(r.reviewer, 'w-11 h-11 flex-shrink-0')}
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-start justify-between gap-3 mb-2">
                                        <div class="min-w-0">
                                            <div class="flex items-center gap-2 mb-1">
                                                <a href="/profile.html?id=${r.reviewer._id}" class="font-semibold text-gray-900 hover:text-gray-700 transition">
                                                    ${r.reviewer.firstName} ${r.reviewer.lastName}
                                                </a>
                                                ${isMyReview ? '<span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-medium rounded">You</span>' : ''}
                                            </div>
                                            ${r.reviewer.company ? `<p class="text-sm text-gray-600">${r.reviewer.company}</p>` : ''}
                                        </div>
                                        <p class="text-xs text-gray-500 whitespace-nowrap">${formatDate(r.createdAt)}</p>
                                    </div>
                                    
                                    <div class="flex items-center gap-1 mb-2">
                                        ${[1,2,3,4,5].map(i => `<svg class="w-4 h-4 ${i <= r.rating ? 'text-yellow-400' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}
                                        <span class="ml-1 text-sm font-semibold text-gray-900">${r.rating}.0</span>
                                    </div>
                                    
                                    ${r.comment ? `
                                        <p class="text-gray-700 text-sm leading-relaxed mb-3">${r.comment}</p>
                                    ` : ''}
                                    
                                    ${r.project ? `
                                        <div class="inline-flex items-center gap-2 text-xs text-gray-600 bg-gray-100 rounded-md px-3 py-1.5 mb-2">
                                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                            </svg>
                                            <span class="font-medium">${r.project.title}</span>
                                        </div>
                                    ` : ''}
                                    
                                    ${isMyReview ? `
                                        <div class="flex gap-2 pt-3 border-t border-blue-200 no-print">
                                            <button onclick="editReview('${r._id}', ${r.rating}, ${JSON.stringify(r.comment || '')}, '${globalProfile._id}')" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                                </svg>
                                                Edit
                                            </button>
                                            <button onclick="deleteReview('${r._id}', '${globalProfile._id}')" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-700 bg-white border border-red-200 rounded-lg hover:bg-red-50 transition">
                                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                                </svg>
                                                Delete
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('') + `</div>`;
            } catch (e) {
                console.error('Error loading reviews:', e);
                document.getElementById('reviews-list-main').innerHTML = '<div class="text-center py-8"><p class="text-sm text-red-600">Failed to load reviews</p></div>';
            }
        }

        function setupReviewForm(profile) {
            const stars = document.querySelectorAll('#star-input [data-star]');
            let selectedRating = 0;
            
            const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
            
            stars.forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedRating = Number(btn.dataset.star);
                    stars.forEach(b => {
                        const starNum = Number(b.dataset.star);
                        b.classList.toggle('text-yellow-400', starNum <= selectedRating);
                        b.classList.toggle('text-gray-300', starNum > selectedRating);
                    });
                    document.getElementById('rating-text').textContent = selectedRating ? `${ratingLabels[selectedRating]} (${selectedRating} star${selectedRating > 1 ? 's' : ''})` : '';
                });
                
                btn.addEventListener('mouseenter', () => {
                    const hoverNum = Number(btn.dataset.star);
                    stars.forEach(b => {
                        const starNum = Number(b.dataset.star);
                        if (selectedRating === 0) {
                            b.classList.toggle('text-yellow-400', starNum <= hoverNum);
                            b.classList.toggle('text-gray-300', starNum > hoverNum);
                        }
                    });
                });
            });

            document.getElementById('star-input').addEventListener('mouseleave', () => {
                if (selectedRating === 0) {
                    stars.forEach(b => {
                        b.classList.add('text-gray-300');
                        b.classList.remove('text-yellow-400');
                    });
                }
            });

            document.getElementById('submit-review')?.addEventListener('click', async () => {
                try {
                    if (!selectedRating) { 
                        alert('Please select a star rating'); 
                        return; 
                    }
                    
                    // Find eligible completed project
                    const projectsRes = await authFetch(`/api/projects?status=completed`);
                    const projectsData = await projectsRes.json();
                    const eligible = (projectsData.projects || []).find(p => {
                        const me = currentUserId;
                        const other = profile._id;
                        const ownerIsMe = p.owner && (p.owner._id ? p.owner._id : p.owner) === me;
                        const contractorIsMe = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === me;
                        const otherIsOwner = p.owner && (p.owner._id ? p.owner._id : p.owner) === other;
                        const otherIsContractor = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === other;
                        return (ownerIsMe && otherIsContractor) || (contractorIsMe && otherIsOwner);
                    });
                    
                    if (!eligible) { 
                        alert('You can only review companies you\'ve completed projects with.'); 
                        return; 
                    }

                    const comment = document.getElementById('review-comment').value.trim();
                    const submitBtn = document.getElementById('submit-review');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    
                    const res = await authFetch('/api/reviews', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            reviewee: profile._id, 
                            projectId: eligible._id, 
                            rating: selectedRating, 
                            comment 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) { 
                        alert(data.error || 'Failed to submit review'); 
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Submit Review';
                        return; 
                    }
                    
                    alert('✅ Review submitted successfully!');
                    
                    // Reset form
                    selectedRating = 0;
                    stars.forEach(b => {
                        b.classList.add('text-gray-300');
                        b.classList.remove('text-yellow-400');
                    });
                    document.getElementById('review-comment').value = '';
                    document.getElementById('rating-text').textContent = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Review';
                    
                    // Reload reviews
                    loadReviews(profile._id);
                    
                    // Scroll to reviews
                    document.getElementById('reviews-main-section').scrollIntoView({ behavior: 'smooth' });
                } catch (e) {
                    console.error('Review submission error:', e);
                    alert('Failed to submit review. Please try again.');
                    document.getElementById('submit-review').disabled = false;
                    document.getElementById('submit-review').textContent = 'Submit Review';
                }
            });
        }

        async function editReview(reviewId, currentRating, currentComment, revieweeId) {
            try {
                const ratingStr = prompt(`Update rating (1-5 stars):`, String(currentRating));
                if (ratingStr === null) return;
                const rating = Number(ratingStr);
                if (Number.isNaN(rating) || rating < 1 || rating > 5) { 
                    alert('Invalid rating. Must be between 1 and 5.'); 
                    return; 
                }
                const comment = prompt('Update your review (optional):', currentComment || '') ?? '';

                const res = await authFetch(`/api/reviews/${reviewId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating, comment })
                });
                
                const data = await res.json();
                if (!res.ok) { 
                    alert(data.error || 'Failed to update review'); 
                    return; 
                }
                
                alert('✅ Review updated successfully!');
                loadReviews(revieweeId);
            } catch (e) {
                console.error('Edit review error:', e);
                alert('Failed to update review');
            }
        }

        async function deleteReview(reviewId, revieweeId) {
            try {
                if (!confirm('Are you sure you want to delete your review? This action cannot be undone.')) return;
                
                const res = await authFetch(`/api/reviews/${reviewId}`, { method: 'DELETE' });
                if (!res.ok) { 
                    const d = await res.json(); 
                    alert((d && d.error) || 'Failed to delete review'); 
                    return; 
                }
                
                alert('✅ Review deleted successfully');
                loadReviews(revieweeId);
            } catch (e) {
                console.error('Delete review error:', e);
                alert('Failed to delete review');
            }
        }

        function scrollToReviewForm() {
            document.getElementById('review-form-card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function toggleBackgroundPicker() {
            const picker = document.getElementById('background-picker');
            if (picker) {
                picker.classList.toggle('hidden');
            }
        }

        async function setProfileBackground(color) {
            try {
                const backgroundColor = color === 'none' ? null : color;
                
                const response = await authFetch('/api/users/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profileBackground: backgroundColor })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to update background');
                }

                // Update local profile object
                globalProfile.profileBackground = backgroundColor;
                
                // Apply background immediately to card
                const card = document.getElementById('profile-card');
                if (card) {
                    if (backgroundColor) {
                        card.style.background = `linear-gradient(135deg, ${backgroundColor} 0%, ${backgroundColor}dd 100%)`;
                    } else {
                        card.style.background = '';
                    }
                }

                // Reload profile to update text colors
                displayProfile(globalProfile);
                
                // Show success message briefly
                const picker = document.getElementById('background-picker');
                if (picker) {
                    const originalHTML = picker.innerHTML;
                    picker.innerHTML = '<p class="text-sm font-medium text-green-600 text-center py-2">✓ Background updated!</p>';
                    setTimeout(() => {
                        picker.innerHTML = originalHTML;
                    }, 1500);
                }
            } catch (error) {
                console.error('Error updating background:', error);
                alert('Failed to update background: ' + error.message);
            }
        }

        async function addAsPartner(partnerId) {
            try {
                const btn = document.getElementById('add-partner-btn');
                const btnText = document.getElementById('partner-btn-text');
                const originalText = btnText.textContent;
                
                btn.disabled = true;
                btnText.textContent = 'Adding...';
                
                const response = await authFetch(`/api/partners/${partnerId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to add partner');
                }
                
                btnText.textContent = '✓ Partner Added';
                btn.classList.add('bg-green-50', 'text-green-700', 'border-green-300');
                btn.classList.remove('border-gray-300', 'text-gray-700', 'hover:bg-gray-50');
                
                setTimeout(() => {
                    btn.disabled = false;
                }, 2000);
            } catch (error) {
                console.error('Error adding partner:', error);
                const btn = document.getElementById('add-partner-btn');
                const btnText = document.getElementById('partner-btn-text');
                btnText.textContent = 'Add Partner';
                btn.disabled = false;
                alert('Failed to add partner: ' + error.message);
            }
        }

        async function checkPartnerStatus() {
            try {
                if (isOwnProfile) return; // Don't show button on own profile
                
                const response = await authFetch('/api/partners');
                if (!response.ok) return;
                
                const data = await response.json();
                const partners = data.partners || [];
                const isPartner = partners.some(p => p._id === profileUserId);
                
                const btn = document.getElementById('add-partner-btn');
                const btnText = document.getElementById('partner-btn-text');
                
                if (isPartner) {
                    btnText.textContent = '✓ Partner';
                    btn.disabled = true;
                    btn.classList.add('bg-green-50', 'text-green-700', 'border-green-300');
                    btn.classList.remove('border-gray-300', 'text-gray-700', 'hover:bg-gray-50');
                }
            } catch (error) {
                console.error('Error checking partner status:', error);
            }
        }

        loadProfile();
        if (!isOwnProfile) {
            setTimeout(checkPartnerStatus, 500);
        }

    </script>
