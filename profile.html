<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span id="notification-badge" class="hidden absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-medium"></span>
                    </a>
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="profile-content" class="space-y-6">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading profile...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const currentUser = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('id') || currentUser.id;
        const isOwnProfile = profileUserId === currentUser.id;

        async function loadProfile() {
            try {
                const response = await authFetch(`/users/${profileUserId}`);
                const data = await response.json();
                displayProfile(data.user);
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-content').innerHTML = '<div class="text-center py-12 text-red-500">Failed to load profile</div>';
            }
        }

        function displayProfile(profile) {
            const container = document.getElementById('profile-content');

            container.innerHTML = `
                <!-- Profile Header Card -->
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="h-24 bg-gradient-to-r from-gray-900 to-gray-700"></div>
                    <div class="p-6">
                        <div class="flex items-start justify-between -mt-12 mb-4">
                            <div class="flex items-end gap-4">
                                ${getAvatarHTML(profile, 'w-20 h-20 border-4 border-white')}
                                <div class="pt-10">
                                    ${profile.company ? `
                                        <h1 class="text-2xl font-bold text-gray-900">${profile.company}</h1>
                                        <p class="text-base text-gray-600">${profile.firstName} ${profile.lastName}${profile.title ? ` · ${profile.title}` : ''}</p>
                                    ` : `
                                        <h1 class="text-2xl font-bold text-gray-900">${profile.firstName} ${profile.lastName}</h1>
                                        ${profile.title ? `<p class="text-base text-gray-600">${profile.title}</p>` : ''}
                                    `}
                                    ${(profile.city || profile.state) ? `<p class="text-sm text-gray-500 mt-1">${[profile.city, profile.state].filter(Boolean).join(', ')}</p>` : ''}
                                </div>
                            </div>
                            ${isOwnProfile ? `
                                <a href="/settings.html" class="mt-12 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50">Edit Profile</a>
                            ` : `
                                <a href="/messages.html?user=${profile._id}" class="mt-12 px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Message</a>
                            `}
                        </div>
                    </div>

                    <!-- Stats Section -->
                    <div class="border-t border-gray-200 grid grid-cols-4 divide-x divide-gray-200">
                        <div class="p-4 text-center">
                            <p class="text-2xl font-bold text-gray-900">${profile.projectsCompleted || 0}</p>
                            <p class="text-xs text-gray-500 mt-1">Projects</p>
                        </div>
                        <div class="p-4 text-center">
                            <p class="text-2xl font-bold text-gray-900">${profile.rating ? profile.rating.toFixed(1) : '0.0'}</p>
                            <p class="text-xs text-gray-500 mt-1">Rating (${profile.reviewCount || 0})</p>
                        </div>
                        <div class="p-4 text-center">
                            <p class="text-2xl font-bold text-gray-900">${profile.yearsExperience || 0}</p>
                            <p class="text-xs text-gray-500 mt-1">Years Exp.</p>
                        </div>
                        <div class="p-4 text-center">
                            <p class="text-sm font-semibold text-gray-900">${profile.registrarId ? 'Verified' : 'Unverified'}</p>
                            <p class="text-xs text-gray-500 mt-1">${profile.registrarId || 'No Registrar'}</p>
                        </div>
                    </div>
                </div>

                <!-- Content Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Left Column (Main Content) -->
                    <div class="lg:col-span-2 space-y-6">
                        ${profile.bio ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-3">About</h2>
                                <p class="text-gray-700 text-sm leading-relaxed">${profile.bio}</p>
                            </div>
                        ` : ''}

                        ${profile.skills && profile.skills.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-3">Skills</h2>
                                <div class="flex flex-wrap gap-2">
                                    ${profile.skills.map(skill => `<span class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-full text-sm font-medium">${skill}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${profile.services && profile.services.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-3">Services Offered</h2>
                                <div class="flex flex-wrap gap-2">
                                    ${profile.services.map(service => `<span class="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-sm font-medium">${service}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${profile.portfolio && profile.portfolio.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-4">Portfolio</h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${profile.portfolio.map(item => `
                                        <div class="border border-gray-200 rounded-lg overflow-hidden hover:shadow-md transition-shadow">
                                            ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-40 object-cover">` : '<div class="w-full h-40 bg-gray-100 flex items-center justify-center text-gray-400"><svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg></div>'}
                                            <div class="p-3">
                                                <h3 class="font-semibold text-gray-900 text-sm mb-1">${item.title}</h3>
                                                ${item.description ? `<p class="text-xs text-gray-600 line-clamp-2">${item.description}</p>` : ''}
                                                ${item.date ? `<p class="text-xs text-gray-500 mt-1">${formatDate(item.date)}</p>` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Right Column (Sidebar) -->
                    <div class="space-y-6">
                        <!-- Contact Information -->
                        <div class="bg-white rounded-lg border border-gray-200 p-6">
                            <h2 class="text-lg font-semibold text-gray-900 mb-4">Contact</h2>
                            <div class="space-y-3 text-sm">
                                ${profile.email ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-400 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                        </svg>
                                        <span class="text-gray-700">${profile.email}</span>
                                    </div>
                                ` : ''}
                                ${profile.phone ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-400 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                        </svg>
                                        <span class="text-gray-700">${profile.phone}</span>
                                    </div>
                                ` : ''}
                                ${(profile.city || profile.state) ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-400 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        </svg>
                                        <span class="text-gray-700">${[profile.city, profile.state].filter(Boolean).join(', ')}</span>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Links -->
                        ${(profile.links && (profile.links.website || profile.links.linkedin || profile.links.github)) ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-4">Links</h2>
                                <div class="space-y-2.5">
                                    ${profile.links.website ? `
                                        <a href="${profile.links.website}" target="_blank" rel="noopener" class="flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
                                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                                            </svg>
                                            Website
                                        </a>
                                    ` : ''}
                                    ${profile.links.linkedin ? `
                                        <a href="${profile.links.linkedin}" target="_blank" rel="noopener" class="flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
                                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M6.29 18.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0020 3.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.073 4.073 0 01.8 7.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 010 16.407a11.616 11.616 0 006.29 1.84"/>
                                            </svg>
                                            LinkedIn
                                        </a>
                                    ` : ''}
                                    ${profile.links.github ? `
                                        <a href="${profile.links.github}" target="_blank" rel="noopener" class="flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 hover:underline">
                                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z" clip-rule="evenodd"/>
                                            </svg>
                                            GitHub
                                        </a>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Preferences Summary -->
                        ${profile.preferences ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-semibold text-gray-900 mb-4">Preferences</h2>
                                <div class="space-y-2.5 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Profile Visibility</span>
                                        <span class="font-medium text-gray-900 capitalize">${profile.preferences?.profileVisibility || 'Public'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Theme</span>
                                        <span class="font-medium text-gray-900 capitalize">${profile.preferences?.theme || 'System'}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Language</span>
                                        <span class="font-medium text-gray-900 uppercase">${profile.preferences?.language || 'EN'}</span>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <!-- Reviews Section -->
                        <div class="bg-white rounded-lg border border-gray-200 p-6" id="reviews-card">
                            <h2 class="text-lg font-semibold text-gray-900 mb-4">Reviews</h2>
                            <div id="reviews-list" class="space-y-4">
                                <p class="text-sm text-gray-500">Loading reviews...</p>
                            </div>
                            ${!isOwnProfile ? `
                                <div id="review-form" class="mt-5 border-t border-gray-200 pt-4">
                                    <h3 class="text-sm font-medium text-gray-900 mb-2">Leave a review</h3>
                                    <div class="flex items-center gap-1 mb-3" id="star-input">
                                        ${[1,2,3,4,5].map(n => `<button type="button" data-star="${n}" class="w-6 h-6 text-gray-300 hover:text-yellow-400">★</button>`).join('')}
                                    </div>
                                    <textarea id="review-comment" class="w-full border border-gray-300 rounded-lg p-2 text-sm" rows="3" placeholder="Share your experience (optional)"></textarea>
                                    <button id="submit-review" class="mt-3 px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Submit Review</button>
                                    <p id="review-hint" class="text-xs text-gray-500 mt-2"></p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            // Load reviews
            loadReviews(profile._id);

            // Setup review form if viewing someone else
            if (!isOwnProfile) {
                setupReviewForm(profile);
            }
        }

        async function loadReviews(userId) {
            try {
                const res = await authFetch(`/users/${userId}/reviews`);
                const data = await res.json();
                const list = document.getElementById('reviews-list');
                if (!res.ok) { list.innerHTML = '<p class="text-sm text-red-600">Failed to load reviews</p>'; return; }
                if (!data.reviews || data.reviews.length === 0) { list.innerHTML = '<p class="text-sm text-gray-500">No reviews yet</p>'; return; }
                list.innerHTML = data.reviews.map(r => `
                    <div class="flex gap-3">
                        ${getAvatarHTML(r.reviewer, 'w-8 h-8')}
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-900">${r.reviewer.firstName} ${r.reviewer.lastName}</span>
                                <span class="text-xs text-gray-500">${formatDate(r.createdAt)}</span>
                            </div>
                            <div class="text-yellow-500 text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                            ${r.comment ? `<p class="text-sm text-gray-700 mt-1">${r.comment}</p>` : ''}
                            ${r.project ? `<p class="text-xs text-gray-500 mt-1">Project: ${r.project.title}</p>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('reviews-list').innerHTML = '<p class="text-sm text-red-600">Failed to load reviews</p>';
            }
        }

        function setupReviewForm(profile) {
            const stars = document.querySelectorAll('#star-input [data-star]');
            let selected = 0;
            stars.forEach(btn => {
                btn.addEventListener('click', () => {
                    selected = Number(btn.dataset.star);
                    stars.forEach(b => b.classList.toggle('text-yellow-500', Number(b.dataset.star) <= selected));
                    document.getElementById('review-hint').textContent = selected ? `Selected ${selected} star${selected>1?'s':''}` : '';
                });
            });

            document.getElementById('submit-review')?.addEventListener('click', async () => {
                try {
                    if (!selected) { alert('Please select a star rating'); return; }
                    // Determine projectId: permit reviewing only after completion of a project you participated in
                    // Fetch projects where current user is owner or accepted contractor and status completed, with this reviewee as the other party
                    const projectsRes = await authFetch(`/projects?status=completed`);
                    const projectsData = await projectsRes.json();
                    const eligible = (projectsData.projects || []).find(p => {
                        const me = currentUser.id;
                        const other = profile._id;
                        const ownerIsMe = p.owner && (p.owner._id ? p.owner._id : p.owner) === me;
                        const contractorIsMe = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === me;
                        const otherIsOwner = p.owner && (p.owner._id ? p.owner._id : p.owner) === other;
                        const otherIsContractor = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === other;
                        return (ownerIsMe && otherIsContractor) || (contractorIsMe && otherIsOwner);
                    });
                    if (!eligible) { alert('No eligible completed project found to review'); return; }

                    const comment = document.getElementById('review-comment').value.trim();
                    const res = await authFetch('/reviews', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ reviewee: profile._id, projectId: eligible._id, rating: selected, comment })
                    });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || 'Failed to submit review'); return; }
                    alert('Review submitted');
                    loadReviews(profile._id);
                } catch (e) {
                    alert('Failed to submit review');
                }
            });
        }

        loadProfile();
    </script>
</body>
</html>
