<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/edit-profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Edit Profile</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="profile-content" class="space-y-6">
            <div class="text-center py-12">
                <p class="text-gray-500">Loading profile...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const currentUser = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('id') || currentUser.id;
        const isOwnProfile = profileUserId === currentUser.id;

        async function loadProfile() {
            try {
                const response = await authFetch(`/users/${profileUserId}`);
                const data = await response.json();
                displayProfile(data.user);
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-content').innerHTML = '<div class="text-center py-12 text-red-500">Failed to load profile</div>';
            }
        }

        function displayProfile(profile) {
            const container = document.getElementById('profile-content');
            
            container.innerHTML = `
                <!-- Profile Header -->
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <div class="h-32 bg-gradient-to-r from-gray-800 to-gray-700"></div>
                    <div class="px-8 pb-8">
                        <div class="flex items-end justify-between -mt-16 mb-6">
                            <div class="flex items-end gap-4">
                                ${getAvatarHTML(profile, 'w-32 h-32 border-4 border-white')}
                                <div class="mb-2">
                                    <p class="text-xs uppercase tracking-wide text-gray-300">${profile.company ? 'Company' : 'Independent'}</p>
                                    <h1 class="text-3xl font-bold text-gray-50">${profile.company || 'Independent Contractor'}</h1>
                                    <p class="text-lg text-gray-200">${profile.firstName} ${profile.lastName}${profile.title ? ` · ${profile.title}` : ''}</p>
                                    ${(profile.city || profile.state) ? `<p class="text-sm text-gray-200">${[profile.city, profile.state].filter(Boolean).join(', ')}</p>` : ''}
                                </div>
                            </div>
                            ${isOwnProfile ? `
                                <a href="/edit-profile.html" class="px-4 py-2 bg-white text-gray-900 rounded-lg text-sm font-medium shadow hover:bg-gray-50">Edit Profile</a>
                            ` : `
                                <div class="flex gap-2">
                                    <a href="/messages.html?user=${profile._id}" class="px-4 py-2 bg-white text-gray-900 rounded-lg text-sm font-medium shadow hover:bg-gray-50">Message</a>
                                </div>
                            `}
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <div class="p-4 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Projects</p>
                                <p class="text-2xl font-bold text-gray-900">${profile.projectsCompleted || 0}</p>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Rating</p>
                                <p class="text-2xl font-bold text-gray-900">${profile.rating ? profile.rating.toFixed(1) : '0.0'} <span class="text-sm text-gray-500">(${profile.reviewCount || 0})</span></p>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Years Experience</p>
                                <p class="text-2xl font-bold text-gray-900">${profile.yearsExperience || 0}</p>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500">Registrar</p>
                                <p class="text-sm font-semibold text-gray-900">${profile.registrarId || 'Not registered'}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-2 text-sm text-gray-700">
                            ${profile.location ? `<div class="flex items-center gap-2">📍 <span>${profile.location}</span></div>` : ''}
                            ${profile.email ? `<div class="flex items-center gap-2">✉️ <span>${profile.email}</span></div>` : ''}
                            ${profile.phone ? `<div class="flex items-center gap-2">📞 <span>${profile.phone}</span></div>` : ''}
                        </div>
                    </div>
                </div>

                <!-- About -->
                ${profile.bio ? `
                    <div class="bg-white rounded-lg border border-gray-200 p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">About</h2>
                        <p class="text-gray-700">${profile.bio}</p>
                    </div>
                ` : ''}

                <!-- Skills & Services -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${profile.skills && profile.skills.length > 0 ? `
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-xl font-bold text-gray-900 mb-4">Skills</h2>
                            <div class="flex flex-wrap gap-2">
                                ${profile.skills.map(skill => `<span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">${skill}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${profile.services && profile.services.length > 0 ? `
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-xl font-bold text-gray-900 mb-4">Services</h2>
                            <div class="flex flex-wrap gap-2">
                                ${profile.services.map(service => `<span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">${service}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>

                <!-- Links & Preferences -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${(profile.links && (profile.links.website || profile.links.linkedin || profile.links.github)) ? `
                        <div class="bg-white rounded-lg border border-gray-200 p-8">
                            <h2 class="text-xl font-bold text-gray-900 mb-4">Links</h2>
                            <div class="space-y-2 text-sm text-gray-700">
                                ${profile.links.website ? `<a class="block text-blue-600 hover:underline" href="${profile.links.website}" target="_blank" rel="noopener">Website</a>` : ''}
                                ${profile.links.linkedin ? `<a class="block text-blue-600 hover:underline" href="${profile.links.linkedin}" target="_blank" rel="noopener">LinkedIn</a>` : ''}
                                ${profile.links.github ? `<a class="block text-blue-600 hover:underline" href="${profile.links.github}" target="_blank" rel="noopener">GitHub</a>` : ''}
                            </div>
                        </div>
                    ` : ''}

                    <div class="bg-white rounded-lg border border-gray-200 p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">Profile Preferences</h2>
                        <div class="space-y-3 text-sm text-gray-700">
                            <div class="flex justify-between"><span>Visibility</span><span class="font-semibold text-gray-900">${profile.preferences?.profileVisibility || 'public'}</span></div>
                            <div class="flex justify-between"><span>Messages</span><span class="font-semibold text-gray-900">${profile.preferences?.allowMessagesFrom || 'all'}</span></div>
                            <div class="flex justify-between"><span>Notifications</span><span class="font-semibold text-gray-900">${profile.preferences?.emailNotifications?.messages === false ? 'Muted' : 'Enabled'}</span></div>
                            <div class="flex justify-between"><span>Theme</span><span class="font-semibold text-gray-900">${profile.preferences?.theme || 'system'}</span></div>
                            <div class="flex justify-between"><span>Language</span><span class="font-semibold text-gray-900">${profile.preferences?.language || 'en'}</span></div>
                        </div>
                    </div>
                </div>

                <!-- Portfolio -->
                ${profile.portfolio && profile.portfolio.length > 0 ? `
                    <div class="bg-white rounded-lg border border-gray-200 p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Portfolio</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            ${profile.portfolio.map(item => `
                                <div class="border border-gray-200 rounded-lg overflow-hidden">
                                    ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-48 object-cover">` : '<div class="w-full h-48 bg-gray-100"></div>'}
                                    <div class="p-4">
                                        <h3 class="font-semibold text-gray-900 mb-1">${item.title}</h3>
                                        ${item.description ? `<p class="text-sm text-gray-600 mb-2">${item.description}</p>` : ''}
                                        ${item.date ? `<p class="text-xs text-gray-500">${formatDate(item.date)}</p>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
        }

        loadProfile();
    </script>
</body>
</html>
