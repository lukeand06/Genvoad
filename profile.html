<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Genovad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 2; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-clamp: 3; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard.html" class="flex items-center space-x-2">
                        <svg class="w-8 h-8" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="8" fill="#1a1a1a"/>
                            <path d="M12 20L18 14L24 20L30 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M12 26L18 20L24 26L30 20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold text-gray-900">Genovad</span>
                    </a>
                    
                    <div class="hidden md:flex space-x-1">
                        <a href="/dashboard.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Dashboard</a>
                        <a href="/projects.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Projects</a>
                        <a href="/messages.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Messages</a>
                        <a href="/browse.html" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">Browse</a>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="/notifications.html" class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </a>
                    <a href="/create-project.html" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Post Project</a>
                    <div class="relative" id="user-menu">
                        <button id="user-menu-btn">
                            <div id="user-avatar"></div>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                            <a href="/profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">My Profile</a>
                            <a href="/settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                            <hr class="my-1">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="profile-content" class="space-y-6">
            <div class="text-center py-12">
                <div class="animate-pulse">
                    <div class="w-20 h-20 bg-gray-300 rounded-full mx-auto mb-4"></div>
                    <div class="h-4 bg-gray-300 rounded w-32 mx-auto mb-2"></div>
                    <div class="h-3 bg-gray-300 rounded w-48 mx-auto"></div>
                </div>
                <p class="text-gray-500 mt-4">Loading profile...</p>
            </div>
        </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script>
        if (!requireAuth()) {
            throw new Error('Not authenticated');
        }

        const currentUser = getCurrentUser();
        document.getElementById('user-avatar').innerHTML = getAvatarHTML(currentUser, 'w-10 h-10');
        
        document.getElementById('user-menu-btn').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('hidden');
        });
        document.getElementById('logout-btn').addEventListener('click', logout);

        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('id') || currentUser.id;
        const isOwnProfile = profileUserId === currentUser.id;

        let globalProfile = null;

        async function loadProfile() {
            try {
                const response = await authFetch(`/api/users/${profileUserId}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to load profile');
                }
                const data = await response.json();
                globalProfile = data.user;
                displayProfile(data.user);
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profile-content').innerHTML = `
                    <div class="text-center py-12">
                        <svg class="w-16 h-16 mx-auto text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <p class="text-red-600 font-medium mb-2">Failed to load profile</p>
                        <p class="text-gray-500 text-sm mb-4">${error.message}</p>
                        <button onclick="location.reload()" class="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-gray-800">Reload Page</button>
                    </div>
                `;
            }
        }

        function displayProfile(profile) {
            const container = document.getElementById('profile-content');

            container.innerHTML = `
                <!-- Profile Header Card (Indeed-style) -->
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
                    <!-- Background section with overlay for background image compatibility -->
                    <div class="h-40 relative bg-gradient-to-br from-gray-100 to-gray-150 overflow-hidden">
                        ${profile.backgroundImage ? `
                            <img src="${profile.backgroundImage}" alt="background" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/30"></div>
                        ` : `
                            <div class="absolute inset-0 bg-gradient-to-br from-gray-100 to-gray-200"></div>
                        `}
                    </div>
                    <div class="px-6 pb-6">
                        <div class="flex flex-col md:flex-row md:items-end md:justify-between -mt-20 mb-6">
                            <div class="flex items-end gap-4 mb-4 md:mb-0">
                                ${getAvatarHTML(profile, 'w-28 h-28 border-4 border-white shadow-lg')}
                                <div class="pb-1">
                                    ${profile.company ? `
                                        <div class="flex items-center gap-2 mb-1">
                                            <h1 class="text-3xl font-bold text-gray-900">${profile.company}</h1>
                                            ${profile.registrarId ? '<svg class="w-6 h-6 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : ''}
                                        </div>
                                        <p class="text-lg text-gray-700">${profile.firstName} ${profile.lastName}${profile.title ? ` • ${profile.title}` : ''}</p>
                                    ` : `
                                        <h1 class="text-3xl font-bold text-gray-900 mb-1">${profile.firstName} ${profile.lastName}</h1>
                                        ${profile.title ? `<p class="text-lg text-gray-700">${profile.title}</p>` : ''}
                                    `}
                                    ${(profile.city || profile.state || profile.location) ? `
                                        <p class="text-sm text-gray-600 mt-1 flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            </svg>
                                            ${[profile.city, profile.state].filter(Boolean).join(', ') || profile.location}
                                        </p>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${isOwnProfile ? `
                                    <a href="/settings.html" class="px-5 py-2.5 border-2 border-gray-300 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-50 transition">
                                        <svg class="w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                        </svg>
                                        Edit Profile
                                    </a>
                                ` : `
                                    <a href="/messages.html?user=${profile._id}" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
                                        <svg class="w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                                        </svg>
                                        Message
                                    </a>
                                    <button onclick="window.print()" class="px-5 py-2.5 border-2 border-gray-300 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-50 transition">
                                        <svg class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                                        </svg>
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>

                    <!-- Stats Section (Indeed-style) -->
                    <div class="border-t border-gray-200 bg-gray-50">
                        <div class="grid grid-cols-2 md:grid-cols-4 divide-x divide-gray-200">
                            <div class="p-5 text-center hover:bg-white transition cursor-pointer">
                                <div class="flex flex-col items-center">
                                    <p class="text-3xl font-bold text-gray-900">${profile.rating ? profile.rating.toFixed(1) : '0.0'}</p>
                                    <div class="flex items-center gap-0.5 my-1">
                                        ${[1,2,3,4,5].map(i => `<svg class="w-5 h-5 ${i <= Math.round(profile.rating || 0) ? 'text-yellow-400' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}
                                    </div>
                                    <p class="text-sm text-gray-600 font-medium">${profile.reviewCount || 0} Review${(profile.reviewCount || 0) !== 1 ? 's' : ''}</p>
                                </div>
                            </div>
                            <div class="p-5 text-center hover:bg-white transition">
                                <p class="text-3xl font-bold text-blue-600">${profile.projectsCompleted || 0}</p>
                                <p class="text-sm text-gray-600 font-medium mt-1">Projects Completed</p>
                            </div>
                            <div class="p-5 text-center hover:bg-white transition">
                                <p class="text-3xl font-bold text-green-600">${profile.yearsExperience || 0}</p>
                                <p class="text-sm text-gray-600 font-medium mt-1">Years Experience</p>
                            </div>
                            <div class="p-5 text-center hover:bg-white transition">
                                ${profile.registrarId ? `
                                    <div class="flex flex-col items-center">
                                        <svg class="w-12 h-12 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                                        <p class="text-sm font-bold text-green-700 mt-1">Verified Business</p>
                                        <p class="text-xs text-gray-600 mt-0.5">${profile.registrarId}</p>
                                    </div>
                                ` : `
                                    <svg class="w-12 h-12 text-gray-300 mx-auto mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                    <p class="text-sm text-gray-500 font-medium">Not Verified</p>
                                `}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Content Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Left Column (Main Content) -->
                    <div class="lg:col-span-2 space-y-6">
                        ${profile.bio ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-xl font-bold text-gray-900 mb-4">About</h2>
                                <p class="text-gray-700 leading-relaxed whitespace-pre-line">${profile.bio}</p>
                            </div>
                        ` : ''}

                        ${profile.skills && profile.skills.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-xl font-bold text-gray-900 mb-4">Skills & Expertise</h2>
                                <div class="flex flex-wrap gap-2">
                                    ${profile.skills.map(skill => `<span class="px-4 py-2 bg-blue-50 text-blue-700 rounded-lg text-sm font-semibold border border-blue-200 hover:bg-blue-100 transition">${skill}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${profile.services && profile.services.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-xl font-bold text-gray-900 mb-4">Services Offered</h2>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    ${profile.services.map(service => `
                                        <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg border border-gray-200">
                                            <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                                            <span class="text-gray-900 font-medium">${service}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${profile.portfolio && profile.portfolio.length > 0 ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-xl font-bold text-gray-900 mb-4">Portfolio</h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${profile.portfolio.map(item => `
                                        <div class="border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow cursor-pointer">
                                            ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-48 object-cover">` : '<div class="w-full h-48 bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center"><svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg></div>'}
                                            <div class="p-4 bg-white">
                                                <h3 class="font-bold text-gray-900 mb-2">${item.title}</h3>
                                                ${item.description ? `<p class="text-sm text-gray-600 line-clamp-2 mb-2">${item.description}</p>` : ''}
                                                ${item.date ? `<p class="text-xs text-gray-500"><svg class="w-3 h-3 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>${formatDate(item.date)}</p>` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Reviews Section (Indeed-style - Main Area) -->
                        <div class="bg-white rounded-lg border border-gray-200 p-6" id="reviews-main-section">
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-xl font-bold text-gray-900">Reviews</h2>
                                ${!isOwnProfile && profile.company ? `
                                    <button onclick="scrollToReviewForm()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
                                        Write a Review
                                    </button>
                                ` : ''}
                            </div>
                            <div id="reviews-list-main" class="space-y-4">
                                <p class="text-sm text-gray-500">Loading reviews...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column (Sidebar) -->
                    <div class="space-y-6">
                        <!-- Contact Information -->
                        <div class="bg-white rounded-lg border border-gray-200 p-6">
                            <h2 class="text-lg font-bold text-gray-900 mb-4">Contact Info</h2>
                            <div class="space-y-3">
                                ${profile.email ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                        </svg>
                                        <div class="flex-1 min-w-0">
                                            <p class="text-xs text-gray-500 font-medium mb-0.5">Email</p>
                                            <p class="text-sm text-gray-900 break-all">${profile.email}</p>
                                        </div>
                                    </div>
                                ` : ''}
                                ${profile.phone ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                        </svg>
                                        <div class="flex-1">
                                            <p class="text-xs text-gray-500 font-medium mb-0.5">Phone</p>
                                            <p class="text-sm text-gray-900">${profile.phone}</p>
                                        </div>
                                    </div>
                                ` : ''}
                                ${(profile.city || profile.state || profile.location) ? `
                                    <div class="flex items-start gap-3">
                                        <svg class="w-5 h-5 text-gray-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        </svg>
                                        <div class="flex-1">
                                            <p class="text-xs text-gray-500 font-medium mb-0.5">Location</p>
                                            <p class="text-sm text-gray-900">${[profile.city, profile.state].filter(Boolean).join(', ') || profile.location}</p>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Links -->
                        ${(profile.links && (profile.links.website || profile.links.linkedin || profile.links.github)) ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 class="text-lg font-bold text-gray-900 mb-4">Links</h2>
                                <div class="space-y-2.5">
                                    ${profile.links.website ? `
                                        <a href="${profile.links.website}" target="_blank" rel="noopener" class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition group">
                                            <svg class="w-5 h-5 text-gray-600 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                                            </svg>
                                            <span class="text-sm font-medium text-gray-900 group-hover:text-blue-600">Website</span>
                                        </a>
                                    ` : ''}
                                    ${profile.links.linkedin ? `
                                        <a href="${profile.links.linkedin}" target="_blank" rel="noopener" class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition group">
                                            <svg class="w-5 h-5 text-gray-600 group-hover:text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M6.29 18.251c7.547 0 11.675-6.253 11.675-11.675 0-.178 0-.355-.012-.53A8.348 8.348 0 0020 3.92a8.19 8.19 0 01-2.357.646 4.118 4.118 0 001.804-2.27 8.224 8.224 0 01-2.605.996 4.107 4.107 0 00-6.993 3.743 11.65 11.65 0 01-8.457-4.287 4.106 4.106 0 001.27 5.477A4.073 4.073 0 01.8 7.713v.052a4.105 4.105 0 003.292 4.022 4.095 4.095 0 01-1.853.07 4.108 4.108 0 003.834 2.85A8.233 8.233 0 010 16.407a11.616 11.616 0 006.29 1.84"/>
                                            </svg>
                                            <span class="text-sm font-medium text-gray-900 group-hover:text-blue-600">LinkedIn</span>
                                        </a>
                                    ` : ''}
                                    ${profile.links.github ? `
                                        <a href="${profile.links.github}" target="_blank" rel="noopener" class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition group">
                                            <svg class="w-5 h-5 text-gray-600 group-hover:text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z" clip-rule="evenodd"/>
                                            </svg>
                                            <span class="text-sm font-medium text-gray-900 group-hover:text-blue-600">GitHub</span>
                                        </a>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Review Form (Indeed-style) -->
                        ${!isOwnProfile && profile.company ? `
                            <div class="bg-white rounded-lg border border-gray-200 p-6" id="review-form-card">
                                <h2 class="text-lg font-bold text-gray-900 mb-4">Write a Review</h2>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Your Rating</label>
                                        <div class="flex items-center gap-2" id="star-input">
                                            ${[1,2,3,4,5].map(n => `<button type="button" data-star="${n}" class="w-10 h-10 text-3xl text-gray-300 hover:text-yellow-400 transition focus:outline-none">★</button>`).join('')}
                                        </div>
                                        <p id="rating-text" class="text-sm text-gray-500 mt-1"></p>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">Your Review (Optional)</label>
                                        <textarea id="review-comment" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent" rows="4" placeholder="Share details about your experience working with this company..."></textarea>
                                        <p class="text-xs text-gray-500 mt-1">Be specific and honest. Your review helps others make informed decisions.</p>
                                    </div>
                                    <button id="submit-review" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
                                        Submit Review
                                    </button>
                                    <p id="review-hint" class="text-xs text-gray-600 text-center"></p>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;

            // Load reviews
            loadReviews(profile._id);

            // Setup review form if viewing someone else
            if (!isOwnProfile && profile.company) {
                setupReviewForm(profile);
            }
        }

        async function loadReviews(userId) {
            try {
                const res = await authFetch(`/api/users/${userId}/reviews`);
                const data = await res.json();
                const list = document.getElementById('reviews-list-main');
                
                if (!res.ok) { 
                    list.innerHTML = '<div class="text-center py-8"><p class="text-sm text-red-600">Failed to load reviews</p></div>'; 
                    return; 
                }
                
                if (!data.reviews || data.reviews.length === 0) { 
                    list.innerHTML = `
                        <div class="text-center py-12 bg-gray-50 rounded-lg">
                            <svg class="w-16 h-16 mx-auto text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
                            </svg>
                            <p class="text-gray-600 font-medium mb-1">No reviews yet</p>
                            <p class="text-sm text-gray-500">Be the first to leave a review!</p>
                        </div>
                    `; 
                    return; 
                }
                
                // Indeed-style reviews with more detail
                list.innerHTML = data.reviews.map(r => {
                    const isMyReview = r.reviewer && (r.reviewer._id || r.reviewer) === currentUser.id;
                    return `
                        <div class="border border-gray-200 rounded-lg p-5 hover:shadow-md transition ${isMyReview ? 'bg-blue-50 border-blue-200' : 'bg-white'}">
                            <div class="flex items-start gap-4">
                                ${getAvatarHTML(r.reviewer, 'w-12 h-12 flex-shrink-0')}
                                <div class="flex-1 min-w-0">
                                    <!-- Header -->
                                    <div class="flex items-start justify-between mb-2">
                                        <div>
                                            <a href="/profile.html?id=${r.reviewer._id}" class="font-semibold text-gray-900 hover:text-blue-600">
                                                ${r.reviewer.firstName} ${r.reviewer.lastName}
                                            </a>
                                            ${r.reviewer.company ? `<p class="text-sm text-gray-600">${r.reviewer.company}</p>` : ''}
                                        </div>
                                        <p class="text-xs text-gray-500 whitespace-nowrap ml-2">${formatDate(r.createdAt)}</p>
                                    </div>
                                    
                                    <!-- Rating -->
                                    <div class="flex items-center gap-1 mb-3">
                                        ${[1,2,3,4,5].map(i => `<svg class="w-5 h-5 ${i <= r.rating ? 'text-yellow-400' : 'text-gray-300'}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`).join('')}
                                        <span class="ml-2 text-sm font-semibold text-gray-700">${r.rating}.0</span>
                                    </div>
                                    
                                    <!-- Comment -->
                                    ${r.comment ? `
                                        <p class="text-gray-700 leading-relaxed mb-3">${r.comment}</p>
                                    ` : ''}
                                    
                                    <!-- Project Context -->
                                    ${r.project ? `
                                        <div class="flex items-center gap-2 text-xs text-gray-600 mb-3 bg-gray-50 rounded px-3 py-2">
                                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                            </svg>
                                            <span>Project: <span class="font-medium">${r.project.title}</span></span>
                                        </div>
                                    ` : ''}
                                    
                                    <!-- Actions -->
                                    ${isMyReview ? `
                                        <div class="flex gap-2 pt-3 border-t border-blue-200">
                                            <button onclick="editReview('${r._id}', ${r.rating}, ${JSON.stringify(r.comment || '')}, '${globalProfile._id}')" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-blue-700 bg-white border border-blue-300 rounded-lg hover:bg-blue-50 transition">
                                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                                </svg>
                                                Edit
                                            </button>
                                            <button onclick="deleteReview('${r._id}', '${globalProfile._id}')" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-red-700 bg-white border border-red-300 rounded-lg hover:bg-red-50 transition">
                                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                                </svg>
                                                Delete
                                            </button>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Error loading reviews:', e);
                document.getElementById('reviews-list-main').innerHTML = '<div class="text-center py-8"><p class="text-sm text-red-600">Failed to load reviews</p></div>';
            }
        }

        function setupReviewForm(profile) {
            const stars = document.querySelectorAll('#star-input [data-star]');
            let selectedRating = 0;
            
            const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
            
            stars.forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedRating = Number(btn.dataset.star);
                    stars.forEach(b => {
                        const starNum = Number(b.dataset.star);
                        b.classList.toggle('text-yellow-400', starNum <= selectedRating);
                        b.classList.toggle('text-gray-300', starNum > selectedRating);
                    });
                    document.getElementById('rating-text').textContent = selectedRating ? `${ratingLabels[selectedRating]} (${selectedRating} star${selectedRating > 1 ? 's' : ''})` : '';
                });
                
                btn.addEventListener('mouseenter', () => {
                    const hoverNum = Number(btn.dataset.star);
                    stars.forEach(b => {
                        const starNum = Number(b.dataset.star);
                        if (selectedRating === 0) {
                            b.classList.toggle('text-yellow-400', starNum <= hoverNum);
                            b.classList.toggle('text-gray-300', starNum > hoverNum);
                        }
                    });
                });
            });

            document.getElementById('star-input').addEventListener('mouseleave', () => {
                if (selectedRating === 0) {
                    stars.forEach(b => {
                        b.classList.add('text-gray-300');
                        b.classList.remove('text-yellow-400');
                    });
                }
            });

            document.getElementById('submit-review')?.addEventListener('click', async () => {
                try {
                    if (!selectedRating) { 
                        alert('Please select a star rating'); 
                        return; 
                    }
                    
                    // Find eligible completed project
                    const projectsRes = await authFetch(`/api/projects?status=completed`);
                    const projectsData = await projectsRes.json();
                    const eligible = (projectsData.projects || []).find(p => {
                        const me = currentUser.id;
                        const other = profile._id;
                        const ownerIsMe = p.owner && (p.owner._id ? p.owner._id : p.owner) === me;
                        const contractorIsMe = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === me;
                        const otherIsOwner = p.owner && (p.owner._id ? p.owner._id : p.owner) === other;
                        const otherIsContractor = p.acceptedContractor && (p.acceptedContractor._id ? p.acceptedContractor._id : p.acceptedContractor) === other;
                        return (ownerIsMe && otherIsContractor) || (contractorIsMe && otherIsOwner);
                    });
                    
                    if (!eligible) { 
                        alert('You can only review companies you\'ve completed projects with.'); 
                        return; 
                    }

                    const comment = document.getElementById('review-comment').value.trim();
                    const submitBtn = document.getElementById('submit-review');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    
                    const res = await authFetch('/api/reviews', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            reviewee: profile._id, 
                            projectId: eligible._id, 
                            rating: selectedRating, 
                            comment 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) { 
                        alert(data.error || 'Failed to submit review'); 
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Submit Review';
                        return; 
                    }
                    
                    alert('✅ Review submitted successfully!');
                    
                    // Reset form
                    selectedRating = 0;
                    stars.forEach(b => {
                        b.classList.add('text-gray-300');
                        b.classList.remove('text-yellow-400');
                    });
                    document.getElementById('review-comment').value = '';
                    document.getElementById('rating-text').textContent = '';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Review';
                    
                    // Reload reviews
                    loadReviews(profile._id);
                    
                    // Scroll to reviews
                    document.getElementById('reviews-main-section').scrollIntoView({ behavior: 'smooth' });
                } catch (e) {
                    console.error('Review submission error:', e);
                    alert('Failed to submit review. Please try again.');
                    document.getElementById('submit-review').disabled = false;
                    document.getElementById('submit-review').textContent = 'Submit Review';
                }
            });
        }

        async function editReview(reviewId, currentRating, currentComment, revieweeId) {
            try {
                const ratingStr = prompt(`Update rating (1-5 stars):`, String(currentRating));
                if (ratingStr === null) return;
                const rating = Number(ratingStr);
                if (Number.isNaN(rating) || rating < 1 || rating > 5) { 
                    alert('Invalid rating. Must be between 1 and 5.'); 
                    return; 
                }
                const comment = prompt('Update your review (optional):', currentComment || '') ?? '';

                const res = await authFetch(`/api/reviews/${reviewId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating, comment })
                });
                
                const data = await res.json();
                if (!res.ok) { 
                    alert(data.error || 'Failed to update review'); 
                    return; 
                }
                
                alert('✅ Review updated successfully!');
                loadReviews(revieweeId);
            } catch (e) {
                console.error('Edit review error:', e);
                alert('Failed to update review');
            }
        }

        async function deleteReview(reviewId, revieweeId) {
            try {
                if (!confirm('Are you sure you want to delete your review? This action cannot be undone.')) return;
                
                const res = await authFetch(`/api/reviews/${reviewId}`, { method: 'DELETE' });
                if (!res.ok) { 
                    const d = await res.json(); 
                    alert((d && d.error) || 'Failed to delete review'); 
                    return; 
                }
                
                alert('✅ Review deleted successfully');
                loadReviews(revieweeId);
            } catch (e) {
                console.error('Delete review error:', e);
                alert('Failed to delete review');
            }
        }

        function scrollToReviewForm() {
            document.getElementById('review-form-card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        loadProfile();
    </script>
</body>
</html>
